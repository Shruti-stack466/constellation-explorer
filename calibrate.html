<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figure Calibrator — figurePts</title>
<style>
  :root{--gold:#f4b740;--cy:#7dd3fc}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Nunito','Segoe UI',system-ui,sans-serif;background:#0a0e29;color:#e7ecf5;
    background:radial-gradient(900px 600px at 50% -10%,#1a2350,#0a0e29 70%)}
  header{padding:14px 18px;border-bottom:1px solid rgba(125,211,252,.18);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  h1{font-size:18px;margin:0;color:#fff}
  select,button{font:inherit;font-weight:800;border-radius:10px;border:1px solid rgba(125,211,252,.3);
    background:rgba(20,28,64,.8);color:#e7ecf5;padding:8px 12px;cursor:pointer}
  button.primary{background:linear-gradient(180deg,#ffd86b,#f7b93e);color:#2a1d05;border-color:rgba(255,235,160,.8)}
  .wrap{display:flex;gap:18px;padding:18px;align-items:flex-start;flex-wrap:wrap}
  .panel{background:rgba(15,23,42,.6);border:1px solid rgba(125,211,252,.18);border-radius:16px;padding:14px}
  .ref{width:300px;flex:0 0 auto}
  .ref svg{width:100%;height:auto;background:#070b22;border-radius:10px;display:block}
  .ref .rstar{fill:#8aa0c0}
  .ref .rstar.cur{fill:var(--gold)}
  .ref .rnum{fill:#fff;font-size:5px;font-weight:900}
  .ref .redge{stroke:rgba(125,211,252,.5);stroke-width:.7}
  .stagebox{flex:1 1 460px;min-width:340px}
  .imgwrap{position:relative;display:inline-block;line-height:0;border-radius:10px;overflow:hidden;
    background:#0b1030;cursor:crosshair;box-shadow:0 0 0 1px rgba(125,211,252,.2)}
  .imgwrap img{display:block;width:min(72vw,640px);height:auto;-webkit-user-drag:none;user-select:none}
  .marker{position:absolute;width:18px;height:18px;transform:translate(-50%,-50%);border-radius:50%;
    background:rgba(56,189,248,.85);border:2px solid #fff;box-shadow:0 0 8px rgba(56,189,248,.8);
    display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#06283a;pointer-events:none}
  .edgesvg{position:absolute;inset:0;pointer-events:none}
  .edgesvg line{stroke:#ffe07a;stroke-width:2;filter:drop-shadow(0 0 3px rgba(255,210,90,.7))}
  .hint{margin:10px 0;font-size:15px}
  .hint b{color:var(--gold)}
  .out{width:100%;margin-top:12px;font-family:ui-monospace,Consolas,monospace;font-size:12.5px;
    background:#070b22;border:1px solid rgba(125,211,252,.25);border-radius:10px;color:#cfe3ff;padding:10px;min-height:64px;white-space:pre-wrap;word-break:break-word}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .done{color:#67e8f9;font-weight:900}
  small{color:#9fb0d0}
</style>
</head>
<body>
<header>
  <h1>🎯 Figure Calibrator</h1>
  <label>Constellation:
    <select id="pick"></select>
  </label>
  <button id="undo">↶ Undo last</button>
  <button id="reset">⟲ Reset</button>
  <small>Click each star (in the highlighted order) onto the figure. The number tells you which body point.</small>
</header>

<div class="wrap">
  <div class="panel ref">
    <div style="font-weight:900;margin-bottom:8px">Reference shape</div>
    <svg id="refsvg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="hint" id="hint"></div>
  </div>

  <div class="panel stagebox">
    <div style="font-weight:900;margin-bottom:10px">Click on the figure → place the highlighted star</div>
    <div class="imgwrap" id="imgwrap">
      <img id="fig" alt="figure">
      <svg class="edgesvg" id="edgesvg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
    </div>
    <div class="out" id="out">figurePts will appear here…</div>
    <div class="row">
      <button class="primary" id="copy">📋 Copy figurePts</button>
      <span id="status"></span>
    </div>
  </div>
</div>

<script>
const NS="http://www.w3.org/2000/svg";
const CONFIG={
  cassiopeia:{ img:"Visuals/cassiopeia figure cutout.webp",
    stars:[{x:.14,y:.40},{x:.32,y:.62},{x:.50,y:.42},{x:.68,y:.63},{x:.86,y:.39}],
    edges:[[0,1],[1,2],[2,3],[3,4]],
    hints:["shoulder","chin / head","waist","knee","shin / foot"] },
  scorpius:{ img:"Visuals/scorpion cutout.webp",
    stars:[{x:.775,y:.198},{x:.895,y:.287},{x:.900,y:.431},{x:.667,y:.488},{x:.886,y:.564},
           {x:.100,y:.613},{x:.463,y:.618},{x:.312,y:.632},{x:.851,y:.675},{x:.138,y:.786},{x:.382,y:.802}],
    edges:[[0,1],[1,2],[2,3],[2,4],[4,8],[3,6],[6,10],[10,9],[9,5],[5,7]],
    hints:["claw tip (top)","claw","head / pincer base","front body","right leg",
           "STINGER tip (far end)","mid body","body","lower-right leg","tail curl","tail"] },
  orion:{ img:"Visuals/orion hunter cutout.webp",
    stars:[{x:.100,y:.158},{x:.764,y:.210},{x:.857,y:.302},{x:.166,y:.360},{x:.551,y:.377},
           {x:.900,y:.481},{x:.351,y:.487},{x:.594,y:.533},{x:.565,y:.660},{x:.857,y:.672},
           {x:.438,y:.695},{x:.348,y:.724},{x:.695,y:.808},{x:.279,y:.842}],
    edges:[[0,3],[3,6],[6,11],[11,13],[6,4],[4,7],[6,7],[7,5],[1,2],[2,5],[5,9],[7,8],[8,12],[8,10],[10,11]],
    hints:["club hand (raised)","shield top","shield right edge","raised-arm elbow","head / neck",
           "shield bottom","left shoulder","right shoulder","belt / dagger","shield-hand grip",
           "hip","back-leg knee","front foot","back foot"] },
};

let cur="orion", placed=[], idx=0;
const pick=document.getElementById("pick"), fig=document.getElementById("fig"),
      refsvg=document.getElementById("refsvg"), edgesvg=document.getElementById("edgesvg"),
      hint=document.getElementById("hint"), out=document.getElementById("out"),
      imgwrap=document.getElementById("imgwrap"), status=document.getElementById("status");

Object.keys(CONFIG).forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent=k; pick.appendChild(o); });
pick.value=cur;

function load(){
  const cfg=CONFIG[cur]; placed=[]; idx=0;
  fig.src=encodeURI(cfg.img);
  drawRef(); drawMarkers(); renderHint(); renderOut();
}
function drawRef(){
  const cfg=CONFIG[cur]; refsvg.innerHTML="";
  cfg.edges.forEach(([a,b])=>{ const l=document.createElementNS(NS,"line");
    l.setAttribute("x1",cfg.stars[a].x*100); l.setAttribute("y1",cfg.stars[a].y*100);
    l.setAttribute("x2",cfg.stars[b].x*100); l.setAttribute("y2",cfg.stars[b].y*100);
    l.setAttribute("class","redge"); refsvg.appendChild(l); });
  cfg.stars.forEach((s,i)=>{ const c=document.createElementNS(NS,"circle");
    c.setAttribute("cx",s.x*100); c.setAttribute("cy",s.y*100); c.setAttribute("r",i===idx?3.4:2.4);
    c.setAttribute("class","rstar"+(i===idx?" cur":"")); refsvg.appendChild(c);
    const t=document.createElementNS(NS,"text"); t.setAttribute("x",s.x*100+3); t.setAttribute("y",s.y*100-2);
    t.setAttribute("class","rnum"); t.textContent=i; refsvg.appendChild(t); });
}
function drawMarkers(){
  const cfg=CONFIG[cur];
  imgwrap.querySelectorAll(".marker").forEach(m=>m.remove());
  placed.forEach((p,i)=>{ const m=document.createElement("div"); m.className="marker";
    m.style.left=(p.x*100)+"%"; m.style.top=(p.y*100)+"%"; m.textContent=i; imgwrap.appendChild(m); });
  // draw skeleton edges between placed markers to verify the fit
  edgesvg.innerHTML="";
  cfg.edges.forEach(([a,b])=>{ if(placed[a]&&placed[b]){ const l=document.createElementNS(NS,"line");
    l.setAttribute("x1",placed[a].x*100); l.setAttribute("y1",placed[a].y*100);
    l.setAttribute("x2",placed[b].x*100); l.setAttribute("y2",placed[b].y*100); edgesvg.appendChild(l); } });
}
function renderHint(){
  const cfg=CONFIG[cur];
  if(idx>=cfg.stars.length){ hint.innerHTML='<span class="done">✓ All '+cfg.stars.length+' stars placed — copy the figurePts below.</span>'; return; }
  hint.innerHTML='Place <b>star '+idx+'</b> &nbsp;—&nbsp; <i>'+(cfg.hints[idx]||"")+'</i>';
}
function renderOut(){
  if(!placed.length){ out.textContent="figurePts will appear here…"; return; }
  out.textContent="figurePts:["+placed.map(p=>"{x:"+p.x.toFixed(3)+",y:"+p.y.toFixed(3)+"}").join(",")+"],";
}
imgwrap.addEventListener("click",e=>{
  const cfg=CONFIG[cur]; if(idx>=cfg.stars.length) return;
  const r=fig.getBoundingClientRect();
  const x=Math.min(1,Math.max(0,(e.clientX-r.left)/r.width));
  const y=Math.min(1,Math.max(0,(e.clientY-r.top)/r.height));
  placed[idx]={x,y}; idx++;
  drawRef(); drawMarkers(); renderHint(); renderOut();
});
document.getElementById("undo").onclick=()=>{ if(idx>0){ idx--; placed.pop(); drawRef(); drawMarkers(); renderHint(); renderOut(); } };
document.getElementById("reset").onclick=()=>load();
document.getElementById("copy").onclick=()=>{ navigator.clipboard.writeText(out.textContent).then(()=>{ status.textContent="copied!"; setTimeout(()=>status.textContent="",1500); }); };
pick.onchange=()=>{ cur=pick.value; load(); };
load();
</script>
</body>
</html>
