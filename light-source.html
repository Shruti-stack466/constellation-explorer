<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Build Your Own Light Source</title>
<style>
  :root{
    --copper:#d98a3d;
    --glow-green:#57e389;
    --panel:#fff7ec;
    --ink:#3a2a1a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif;}
  #game{
    position:fixed;inset:0;
    background:#2a2438 center/cover no-repeat;
    user-select:none;touch-action:none;
  }

  /* ---------- Wooden board removed: activity floats on the room background ---------- */
  #table{display:none;}

  /* ---------- Activity stage (on the board) ---------- */
  #stage{
    position:absolute;left:50%;top:48%;
    transform:translate(-50%,-50%);
    width:min(60vw,1000px);
    height:min(74vh,760px);
    display:flex;align-items:center;justify-content:center;
    padding:3%;
  }
  #game.portrait #stage{display:none;}

  /* ---------- Companion avatars (opposite lower sides) ---------- */
  #kabir,#meera{
    position:absolute;
    height:min(62vh,600px);
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.42));
    transition:transform .3s, filter .3s;
    z-index:25;pointer-events:none;
  }
  /* Kabir's PNG has ~8% more empty space below his feet than Meera's,
     so his bottom is set ~5vh lower to keep their feet on the same line. */
  #kabir{left:-14vw;bottom:-12vh;}
  #meera{right:-14vw;bottom:-7vh;}
  #game.portrait #kabir{left:22vw;bottom:-11vh;height:min(70vh,680px);}
  #game.portrait #meera{right:22vw;bottom:-11vh;height:min(70vh,680px);}
  /* Finale: larger characters pushed into the outer corners of the frosted panel */
  #game.finale #kabir{left:14vw;right:auto;bottom:auto;top:12vh;height:min(64vh,620px);}
  #game.finale #meera{right:14vw;left:auto;bottom:auto;top:12vh;height:min(64vh,620px);}
  #kabir.speaking,#meera.speaking{
    transform:translateY(-10px) scale(1.04);
    filter:drop-shadow(0 16px 20px rgba(0,0,0,.5)) drop-shadow(0 0 14px rgba(255,235,150,.65));
  }

  /* ---------- Common dialogue box (near the speaker) ---------- */
  #dialogue{
    position:absolute;z-index:30;cursor:pointer;
    width:min(18vw,230px);
    background:var(--panel);
    border:2px solid #f0d9b5;
    border-radius:14px;
    padding:7px 20px 7px 11px;
    box-shadow:0 8px 20px rgba(0,0,0,.34);
    transition:opacity .25s;
    left:1.5vw;bottom:46vh;
  }
  #dialogue::after{ /* little pointer tail */
    content:"";position:absolute;bottom:-11px;width:0;height:0;
    border-left:10px solid transparent;border-right:10px solid transparent;
    border-top:12px solid var(--panel);
    left:26px;
  }
  #dialogue.anchor-right::after{left:auto;right:26px;}
  #dialogue.anchor-center::after{left:50%;transform:translateX(-50%);}
  #dialogue .speaker{font-weight:800;color:#c86b1a;font-size:clamp(11px,1vw,13px);margin-bottom:2px;}
  #dialogue .line{color:var(--ink);font-size:clamp(12px,1.15vw,15px);line-height:1.28;min-height:1.28em;}
  #dialogue .next{position:absolute;right:10px;bottom:6px;color:#c86b1a;font-size:17px;animation:bob 1s infinite;}
  @keyframes bob{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
  #dialogue.hide{opacity:0;pointer-events:none;}

  /* ---------- Action button ---------- */
  #actionbar{position:absolute;left:50%;bottom:5vh;transform:translateX(-50%);z-index:40;display:flex;gap:12px;}
  #game.portrait #actionbar{bottom:16vh;}
  #game.finale #actionbar{bottom:18vh;}   /* Continue sits at the panel's bottom-center */
  .btn{
    background:linear-gradient(#ffd36b,#f0a833);
    color:#4a2f00;font-weight:800;font-size:clamp(16px,1.9vw,22px);
    border:none;border-radius:999px;padding:15px 40px;
    box-shadow:0 8px 22px rgba(0,0,0,.38);cursor:pointer;
    transition:transform .12s, box-shadow .12s;animation:btnIn .4s ease-out;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(1px);box-shadow:0 4px 10px rgba(0,0,0,.3);}
  @keyframes btnIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

  /* ---------- Instruction banner ---------- */
  #instruction{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.94);color:var(--ink);
    padding:9px 24px;border-radius:999px;
    font-size:clamp(14px,1.7vw,20px);font-weight:700;
    box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:70vw;text-align:center;
    transition:opacity .3s;z-index:28;
  }
  #instruction.hide{opacity:0;pointer-events:none;}

  /* ---------- Drag ghost ---------- */
  .drag-ghost{position:fixed;z-index:999;pointer-events:none;width:96px;height:96px;
    background:rgba(255,255,255,.94);border-radius:18px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 30px rgba(0,0,0,.4);transform:translate(-50%,-50%) scale(1.1);}
  .drag-ghost img{width:82%;height:82%;object-fit:contain;}
  @keyframes bounceBack{0%{transform:scale(1.1)}60%{transform:scale(.9)}100%{transform:scale(1)}}

  /* =========================================================
     PART A : toolbox + circuit box, side by side on the board
     ========================================================= */
  .stage-a{
    gap:3%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.14);
    border-radius:30px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:none;
  }
  .toolbox{
    width:47%;height:88%;
    background:rgba(120,72,36,.28);
    border:3px solid rgba(255,255,255,.35);
    border-radius:20px;padding:14px;
    display:flex;flex-direction:column;
    box-shadow:inset 0 2px 12px rgba(0,0,0,.25);
  }
  .box-title{color:#fff;font-weight:800;font-size:clamp(13px,1.5vw,18px);text-align:center;
    letter-spacing:.6px;text-shadow:0 2px 6px rgba(0,0,0,.6);margin-bottom:8px;}
  .toolgrid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-content:center;overflow:hidden;}
  .titem{position:relative;aspect-ratio:1/1;background:rgba(255,255,255,.9);border-radius:12px;
    border:1px solid rgba(255,255,255,.6);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 10px rgba(255,255,255,.45), 0 3px 7px rgba(0,0,0,.22);
    cursor:grab;touch-action:none;transition:transform .15s, box-shadow .2s;}
  .titem:hover{box-shadow:0 0 16px rgba(255,255,255,.7), 0 3px 9px rgba(0,0,0,.25);}
  .titem img{width:94%;height:94%;object-fit:contain;pointer-events:none;margin-top:-10px;}
  .titem .cap{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:clamp(11px,0.85vw,14px);font-weight:700;color:#5a4632;}
  .titem:active{cursor:grabbing;transform:scale(1.06);}
  .titem.locked{pointer-events:none;opacity:.85;}

  .circuitbox{
    width:47%;height:88%;
    border:2px solid rgba(255,224,150,.75);border-radius:20px;
    background:radial-gradient(circle at 50% 38%, rgba(255,243,210,.42), rgba(255,214,130,.24)); /* warm cream/gold */
    box-shadow:inset 0 0 34px rgba(255,228,160,.3), 0 0 26px rgba(255,208,120,.35);
    display:flex;flex-direction:column;padding:14px;
    transition:box-shadow .4s,border-color .4s,background .4s;
  }
  .circuitbox .cb-title{color:#8a5a1e;text-shadow:0 1px 1px rgba(255,255,255,.45);}
  .cb-drop{flex:1;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:12px;width:100%;overflow:hidden;}
  .circuitbox.hot{border-color:rgba(255,235,180,.95);box-shadow:inset 0 0 34px rgba(255,228,160,.4), 0 0 34px rgba(255,208,120,.5);}
  .circuitbox.done{border-color:var(--glow-green);box-shadow:0 0 44px rgba(87,227,137,.55);}
  .circuitbox .slotitem{width:104px;height:104px;background:#fff;border-radius:14px;display:flex;
    align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.2);animation:pop .35s ease-out;}
  .circuitbox .slotitem img{width:80%;height:80%;object-fit:contain;}
  .circuitbox .slotitem.glow{box-shadow:0 0 18px rgba(87,227,137,.85);}
  .circuitbox .cap{color:#8a5a1e;font-weight:800;opacity:.9;text-align:center;width:100%;text-shadow:0 1px 1px rgba(255,255,255,.4);}
  @keyframes pop{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  /* =========================================================
     PART B : component tray + circuit board on the board
     ========================================================= */
  /* Part B lives inside one frosted-glass rectangle: circuit on top, parts along the bottom */
  .stage-b{
    flex-direction:column;gap:1.5%;padding:2.2% 3%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.14);
    border-radius:30px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  #btray-bottom{display:flex;justify-content:center;align-items:center;gap:4%;
    width:100%;height:22%;border-top:1px solid rgba(255,255,255,.18);padding-top:8px;}
  .tray-comp{height:94%;aspect-ratio:1/1;background:rgba(255,255,255,.92);border-radius:14px;
    border:1px solid rgba(255,255,255,.6);
    box-shadow:0 0 10px rgba(255,255,255,.45), 0 4px 9px rgba(0,0,0,.3);
    display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;
    transition:transform .15s, box-shadow .2s;}
  .tray-comp:hover{box-shadow:0 0 16px rgba(255,255,255,.7), 0 4px 11px rgba(0,0,0,.33);}
  .tray-comp:active{transform:scale(1.08);}
  .tray-comp img{width:92%;height:92%;object-fit:contain;pointer-events:none;}
  .tray-comp.locked{opacity:.4;pointer-events:none;filter:grayscale(.4);}
  /* short function hints inside the placeholders (never the component's name) */
  .ph-hint{font-size:clamp(14px,1.9vw,28px);line-height:1;text-align:center;opacity:.95;}
  .ph-icon{width:clamp(18px,2.2vw,36px);height:auto;object-fit:contain;}
  .ph-icon.knockout{mix-blend-mode:multiply;}      /* hides the white JPEG background */
  /* wire icon sits ON the loop's left edge (the placeholder line itself) */
  #wire-hint{position:absolute;left:14%;top:50%;transform:translate(-50%,-50%);text-align:center;line-height:1;z-index:4;}
  /* thin white-gold loop = the wire placeholder (softly rounded corners) */
  #loop-ph{fill:none;stroke:rgba(255,241,205,.5);stroke-width:3.5;stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 0 2px rgba(255,221,150,.55));transition:opacity .4s;}
  #loop-ph.hide{opacity:0;}
  #board{position:relative;width:100%;flex:1;}
  #board svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
  .seg,.switchlink{fill:none;stroke:var(--copper);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));
    stroke-dasharray:1400;stroke-dashoffset:1400;transition:stroke-dashoffset .55s ease;}
  .seg.on,.switchlink.on{stroke-dashoffset:0;}
  /* energised circuit: soft solid golden glow on the loop + a small golden ball that
     flows continuously around it (no dashed/marching-ants line) */
  #current{fill:none;stroke:rgba(255,236,140,.6);stroke-width:5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .3s;
    filter:drop-shadow(0 0 6px #ffe14d) drop-shadow(0 0 10px #ffd21a);}
  #current.flow{opacity:1;}
  #current-ball{fill:#fff3a0;opacity:0;transition:opacity .3s;
    filter:drop-shadow(0 0 5px #ffe14d) drop-shadow(0 0 12px #ffd21a);}
  #current-ball.flow{opacity:1;}
  #gap-spark{opacity:0;transition:opacity .2s;}
  #gap-spark line{stroke:#ff5a5a;stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 4px #ff5a5a);}
  #gap-spark.show{opacity:1;}
  #gap-spark.show line{animation:crossPulse .8s ease-in-out infinite;}
  @keyframes crossPulse{0%,100%{filter:drop-shadow(0 0 3px #ff5a5a)}50%{filter:drop-shadow(0 0 11px #ff8a8a)}}

  .comp{position:absolute;transform:translate(-50%,-50%);aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;z-index:5;}
  .comp .socket{position:absolute;inset:0;border:1.5px solid rgba(255,240,205,.6);border-radius:16px;background:rgba(255,249,235,.28);
    box-shadow:0 0 10px rgba(255,235,190,.25);display:flex;align-items:center;justify-content:center;}
  .comp .flipwrap{position:relative;width:100%;height:100%;display:none;align-items:center;justify-content:center;transition:transform .55s ease;}
  .comp.filled .flipwrap{display:flex;}
  .comp.filled .socket{display:none;}
  .comp .cimg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));}
  .comp.wrong .flipwrap{transform:scaleX(-1);}
  .comp.correct .cimg{filter:drop-shadow(0 0 16px var(--glow-green));}
  .comp.glowtap{cursor:pointer;}
  .comp.glowtap .flipwrap{animation:tapPulse 1.1s ease-in-out infinite;}
  .comp.glowtap .socket{animation:tapPulse 1.1s ease-in-out infinite;}
  @keyframes tapPulse{0%,100%{filter:drop-shadow(0 0 4px rgba(255,224,138,.5))}50%{filter:drop-shadow(0 0 22px rgba(255,224,138,.95))}}
  /* enlarged observation view: no card, ~50% bigger, lifted above everything */
  .comp.inspect{transform:translate(-50%,-50%) scale(1.5);z-index:40;transition:transform .3s ease;}
  #battery.inspect,#led.inspect{transform:translate(-50%,-50%) scale(3);}
  #battery.grow,#led.grow{transform:translate(-50%,-50%) scale(1.75);z-index:40;transition:transform .4s ease;}
  .comp.inspect .cimg{filter:drop-shadow(0 8px 18px rgba(0,0,0,.5));}
  .comp.flashgreen .flipwrap{animation:flashGreen .9s ease-out;}
  @keyframes flashGreen{0%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}40%{filter:drop-shadow(0 0 26px rgba(87,227,137,1))}100%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}}

  /* battery + / – terminals (readable in both positions) */
  .term{position:absolute;top:50%;transform:translateY(-50%);
    width:1.3em;height:1.3em;line-height:1.24em;text-align:center;border-radius:50%;
    color:#fff;font-weight:900;font-size:clamp(13px,1.6vw,22px);
    border:2px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.5);z-index:2;}
  .term.neg{left:20%;background:#2f6bd8;}
  .term.pos{right:20%;background:#e23b3b;}

  /* LED glow */
  .ledglow{position:absolute;inset:-45%;border-radius:50%;pointer-events:none;z-index:-1;opacity:0;transition:opacity .4s;
    background:radial-gradient(circle,rgba(255,243,150,.95) 0%,rgba(255,220,80,.5) 35%,rgba(255,210,40,0) 70%);}
  .comp.lit .ledglow{opacity:1;animation:pulseGlow 1.4s ease-in-out infinite;}
  @keyframes pulseGlow{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.12);opacity:1}}

  /* switch badge */
  .switch-badge{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    background:#888;color:#fff;font-weight:800;font-size:12px;padding:2px 12px;border-radius:999px;
    box-shadow:0 3px 6px rgba(0,0,0,.3);letter-spacing:1px;transition:background .2s;z-index:3;}
  .comp.switch-on .switch-badge{background:var(--glow-green);}

  /* wire-set drop zone — invisible hit target; the white-gold loop + wire icon is the visible cue */
  #wirezone{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:58%;height:56%;z-index:3;pointer-events:none;}

  .board-greenpulse{animation:boardPulse .9s ease-out;}
  @keyframes boardPulse{0%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}45%{filter:drop-shadow(0 0 30px rgba(87,227,137,.9))}100%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}}

  .confetti{position:absolute;width:10px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards;z-index:61;}
  @keyframes fall{to{transform:translateY(105vh) rotate(600deg);opacity:.4;}}

  /* ---------- Storybook intro (full-screen flipbook) ---------- */
  #storybook{position:absolute;inset:0;z-index:70;display:none;}
  #storybook.show{display:block;animation:fadeIn .3s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  #book{position:absolute;inset:0;perspective:2600px;overflow:hidden;background:#000;}
  #sb-base{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* the turning page: hinged at the left spine, curls over like a real page */
  .sb-flip{position:absolute;inset:0;transform-origin:left center;transform:rotateY(0deg);
    transition:transform .82s cubic-bezier(.4,.05,.3,1);backface-visibility:hidden;overflow:hidden;
    box-shadow:0 0 46px rgba(0,0,0,.55);z-index:2;}
  .sb-flip img{width:100%;height:100%;object-fit:cover;}
  .sb-flip::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.08) 26%,rgba(255,255,255,.12) 100%);}
  /* small sophisticated narration / dialogue bubbles over each story scene */
  #sb-text{position:absolute;left:50%;bottom:13vh;transform:translateX(-50%);z-index:3;
    display:flex;flex-direction:column;gap:9px;align-items:center;width:min(76vw,840px);pointer-events:none;}
  .sb-bubble{background:rgba(18,14,28,.66);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);
    color:#f4eee6;border:1px solid rgba(255,255,255,.22);border-radius:15px;
    padding:9px 18px;font-size:clamp(13px,1.4vw,18px);line-height:1.35;
    box-shadow:0 10px 26px rgba(0,0,0,.45);max-width:100%;animation:sbFade .45s ease-out;}
  .sb-bubble .sb-who{font-weight:800;color:#ffd36b;margin-right:8px;}
  .sb-bubble.narration{font-style:italic;text-align:center;background:rgba(18,14,28,.55);color:#e9e2d6;}
  @keyframes sbFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  #sb-controls{position:absolute;inset:0;z-index:3;pointer-events:none;}
  #sb-dots{display:none;}                    /* no page dots between the buttons */
  #sb-next,#sb-back{position:absolute;bottom:4vh;pointer-events:auto;
    padding:8px 18px;font-size:clamp(12px,1.2vw,15px);box-shadow:0 5px 14px rgba(0,0,0,.35);}
  #sb-back{left:3vw;}                          /* Back → bottom-left corner */
  #sb-next{right:3vw;}                         /* Next → bottom-right corner */

  /* ---------- Intro video (Activity 2 opening scene) ---------- */
  #introvideo{position:absolute;inset:0;z-index:70;display:none;background:#000;}
  #introvideo.show{display:block;animation:fadeIn .3s;}
  #iv-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
  #iv-skip{position:absolute;right:3vw;bottom:4vh;z-index:3;
    padding:12px 28px;font-size:clamp(15px,1.7vw,20px);box-shadow:0 5px 14px rgba(0,0,0,.35);}
  #iv-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;display:none;
    padding:16px 40px;font-size:clamp(18px,2.4vw,28px);box-shadow:0 8px 22px rgba(0,0,0,.5);
    animation:tapPulse 1.2s ease-in-out infinite;}
  /* video subtitles */
  .videocap{position:absolute;left:50%;bottom:11vh;transform:translateX(-50%);z-index:4;
    max-width:80vw;text-align:center;pointer-events:none;opacity:0;transition:opacity .15s;
    color:#fff;font-size:clamp(15px,2vw,24px);line-height:1.35;font-weight:600;
    text-shadow:0 2px 4px rgba(0,0,0,.9);
    background:rgba(0,0,0,.5);padding:6px 16px;border-radius:10px;}

  /* ---------- Closing scenes (after the finale) ---------- */
  #finalbook{position:absolute;inset:0;z-index:70;display:none;background:#000;}
  #finalbook.show{display:block;animation:fadeIn .3s;}
  /* keep the bottom of the closing frame in view: bias the cover-crop upward so the
     overflow is taken almost entirely from the TOP, not split top/bottom */
  #fb-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 88%;background:#000;}
  #fb-restart{position:absolute;left:3vw;bottom:4vh;z-index:3;display:none;
    padding:8px 18px;font-size:clamp(12px,1.2vw,15px);box-shadow:0 5px 14px rgba(0,0,0,.35);}
  #fb-restart.glowbtn{animation:btnGlow 1.2s ease-in-out infinite;}
  @keyframes btnGlow{0%,100%{box-shadow:0 5px 14px rgba(0,0,0,.35);transform:scale(1)}
    50%{box-shadow:0 0 24px rgba(255,211,107,.95),0 5px 14px rgba(0,0,0,.4);transform:scale(1.07)}}
  #sb-dots{display:flex;gap:8px;}
  .sb-dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s,transform .2s;}
  .sb-dot.on{background:#ffd36b;transform:scale(1.25);}
  .btn-sec{background:rgba(255,255,255,.9);color:#5a4632;padding:12px 26px;font-size:clamp(14px,1.6vw,18px);}
  .btn-sec[hidden]{display:none;}
</style>
</head>
<body>
<div id="game">
  <div id="table"></div>
  <div id="stage"></div>

  <img id="kabir" alt="Kabir">
  <img id="meera" alt="Meera">

  <div id="instruction"></div>

  <div id="dialogue" class="hide">
    <div class="speaker"></div>
    <div class="line"></div>
    <span class="next">▶</span>
  </div>

  <div id="actionbar"></div>

  <div id="introvideo">
    <video id="iv-video" playsinline preload="auto"></video>
    <div id="iv-cap" class="videocap"></div>
    <button class="btn" id="iv-skip">Skip ▶</button>
  </div>

  <div id="finalbook">

"use strict";

/* ============ Assets ============ */
const V = n => `Visuals/${n}`;
const A = n => `Audio/${n}`;

/* ---- Voice-over playback (recorded .wav clips for narration & dialogue) ---- */
let curVoice = null, voiceUnlocked = false;
function stopVoice(){
  if(curVoice){ try{ curVoice.onended = null; curVoice.pause(); }catch(e){} curVoice = null; }
}
function playVoice(file, onEnd, noFallback){
  stopVoice();
  clearDlgTimer();
  if(!file){ if(onEnd && !noFallback){ dlgTimer = setTimeout(onEnd, 2200); } return; }
  let done = false;
  const go = ()=>{ if(done) return; done = true; if(onEnd) onEnd(); };
  try{
    curVoice = new Audio(A(file));
    if(onEnd){
      curVoice.onended = go;
      dlgTimer = setTimeout(go, 15000);                 // safety if the clip never ends
    }
    curVoice.play().then(()=>{ voiceUnlocked = true; }).catch(()=>{
      clearDlgTimer();
      // blocked/missing: game dialogue falls back to a timer; scenes wait for a gesture.
      if(onEnd && !noFallback){ dlgTimer = setTimeout(go, 2600); }
    });
  }catch(e){ clearDlgTimer(); if(onEnd && !noFallback){ dlgTimer = setTimeout(go, 2600); } }
}
const POSE = {
  kabirHappy:     V("kabir standing.png"),
  kabirThink:     V("kabir thinking.png"),
  kabirCelebrate: V("kabir celebrating.png"),

};

/* ============ Sound (synthesised, soft) ============ */
let AC;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq, dur, type="sine", vol=0.14, delay=0){
  const c = ac(); if(!c) return;
  const t = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t+dur+0.02);
}
const snd = {
  click:   ()=>beep(520,0.08,"triangle",0.12),
  success: ()=>{ beep(660,0.12,"sine",0.15); beep(880,0.16,"sine",0.15,0.1); },
  bigwin:  ()=>{ beep(660,0.14,"sine",0.16); beep(880,0.14,"sine",0.16,0.12); beep(1175,0.24,"sine",0.16,0.24); },
  confused:()=>{ beep(400,0.16,"sawtooth",0.10); beep(300,0.22,"sawtooth",0.10,0.14); },
  bounce:  ()=>beep(240,0.12,"square",0.08),
  off:     ()=>beep(320,0.14,"sine",0.10),
};

/* ============ Game state ============ */

/* ============ DOM refs ============ */

/* ============ Dialogue ============ */
let dlgQueue = [], dlgDone = null;
function positionDialogue(who){
  dlgBox.classList.remove("anchor-right","anchor-center");
  dlgBox.style.transform = "";
  if(sceneMode === "finale"){
    // Finale screen: bubble centered between the two characters, clear of their faces.
    dlgBox.classList.add("anchor-center");
    dlgBox.style.left = "50%"; dlgBox.style.right = "auto";
    dlgBox.style.top = "auto"; dlgBox.style.bottom = "58vh";
    dlgBox.style.transform = "translateX(-50%)";
    return;
  }
  if(sceneMode === "portrait"){
    dlgBox.classList.add("anchor-center");

    dlgBox.style.transform = "translateX(-50%)";

}
function setDialogue(lines, onDone){
  dlgQueue = lines.slice(); dlgDone = onDone || null;
  dlgBox.classList.remove("hide");
  showNextLine();
}
let dlgTimer = null;
function clearDlgTimer(){ if(dlgTimer){ clearTimeout(dlgTimer); dlgTimer = null; } }
function showNextLine(){
  clearDlgTimer();
  if(dlgQueue.length === 0){
    dlgNext.style.display = "none";
    const cb = dlgDone; dlgDone = null;
    if(cb) cb();
    return;
  }
  const l = dlgQueue.shift();
  dlgSpeaker.textContent = l.who;
  dlgLine.textContent = l.text;
  speakingIs(l.who);
  if(l.kabir) curKabir = l.kabir;
  if(l.meera) curMeera = l.meera;
  setCompanions(curKabir, curMeera);
  positionDialogue(l.who);
  const more = dlgQueue.length || dlgDone;
  dlgNext.style.display = more ? "inline" : "none";
  // Auto-advance: every line (and its closing callback) plays on its own — the child
  // never has to tap to continue. A voiced line advances when its clip ends; an
  // unvoiced line advances on a reading-time timer scaled to its length.
  if(l.voice){
    playVoice(l.voice, more ? showNextLine : null);   // also schedules its own advance
  } else {
    stopVoice();
    if(more){
      const delay = Math.min(7000, Math.max(2000, l.text.length*70 + 900));
      dlgTimer = setTimeout(showNextLine, delay);
    }
  }
  try{ beep(l.who==="Kabir"?430:560, 0.06, "sine", 0.06); }catch(e){}
}

/* ============ Drag system ============ */
let dragCtx = null, dropHandler = null;
function beginDrag(e, meta, sourceEl){
  if(dragCtx) return;
  const ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.innerHTML = `<img src="${meta.img}" alt="">`;
  document.body.appendChild(ghost);
  sourceEl.style.opacity = "0.35";
  dragCtx = { meta, ghost, sourceEl, pointerId:e.pointerId };
  moveGhost(e.clientX, e.clientY);
  window.addEventListener("pointermove", onDragMove);
  window.addEventListener("pointerup", onDragEnd);
  window.addEventListener("pointercancel", onDragEnd);
}
function moveGhost(x,y){ if(dragCtx){ dragCtx.ghost.style.left=x+"px"; dragCtx.ghost.style.top=y+"px"; } }
function onDragMove(e){ if(dragCtx && e.pointerId===dragCtx.pointerId) moveGhost(e.clientX, e.clientY); }
function onDragEnd(e){
  if(!dragCtx) return;
  const { meta, ghost, sourceEl } = dragCtx;
  window.removeEventListener("pointermove", onDragMove);
  window.removeEventListener("pointerup", onDragEnd);
  window.removeEventListener("pointercancel", onDragEnd);
  const x=e.clientX, y=e.clientY;
  ghost.remove(); sourceEl.style.opacity = ""; dragCtx = null;
  if(dropHandler) dropHandler(meta, x, y, sourceEl);
}
function pointInRect(x,y,el,pad=0){
  if(!el) return false;
  const r = el.getBoundingClientRect();
  return x>=r.left-pad && x<=r.right+pad && y>=r.top-pad && y<=r.bottom+pad;
}
function bounceItem(el){ if(!el) return; el.style.animation="bounceBack .4s"; setTimeout(()=>el.style.animation="",420); }

let board = null;

/* bottom parts strip: bare draggable images, no cards, no names */
function renderBTray(draggableTypes){
  const t = $("#btray-bottom");
  if(!t) return;

function updateBoard(){
  if(!board) return;
  const bEl = board.querySelector("#battery"),
        lEl = board.querySelector("#led"),
        sEl = board.querySelector("#switch");

  bEl.classList.toggle("filled", game.placed.battery);
  lEl.classList.toggle("filled", game.placed.led);
  sEl.classList.toggle("filled", game.placed.switch);

  bEl.classList.toggle("wrong", game.placed.battery && !game.batteryCorrect);
  bEl.classList.toggle("correct", game.batteryCorrect);
  lEl.classList.toggle("wrong", game.placed.led && !game.ledCorrect);
  lEl.classList.toggle("correct", game.ledCorrect);

  sEl.classList.toggle("switch-on", game.switchOn);
  const badge = sEl.querySelector(".switch-badge");
  if(badge) badge.textContent = game.switchOn ? "ON" : "OFF";

  const wires = game.placed.wires;
  board.querySelector("#loop-ph").classList.toggle("hide", wires);
  const wh = board.querySelector("#wire-hint"); if(wh) wh.style.display = wires ? "none" : "block";
  board.querySelector("#segL").classList.toggle("on", wires);
  board.querySelector("#segRtop").classList.toggle("on", wires);
  board.querySelector("#segRbot").classList.toggle("on", wires);
  board.querySelector("#switchlink").classList.toggle("on", game.placed.switch && game.switchOn);
  // broken-path spark shows when switch is placed, wires present, but switch is off
  board.querySelector("#gap-spark").classList.toggle("show", game.placed.switch && wires && !game.switchOn);

  const working = isWorking();
  lEl.classList.toggle("lit", working);
  board.querySelector("#current").classList.toggle("flow", working);
  const cball = board.querySelector("#current-ball");
  if(cball) cball.classList.toggle("flow", working);   // golden ball flows continuously while lit
}
function isWorking(){
  return game.placed.battery && game.placed.led && game.placed.switch && game.placed.wires &&
         game.batteryCorrect && game.ledCorrect && game.switchOn;
}
function greenPulseBoard(){

function isPlaced(type){ return type==="wire" ? game.placed.wires : game.placed[type]; }
function placeComponent(type){
  if(type==="battery")      game.placed.battery = true;   // seated wrong polarity by default
  else if(type==="led")     game.placed.led = true;       // seated wrong polarity by default
  else if(type==="switch"){ game.placed.switch = true; game.switchOn = true; }  // seated ON
  else if(type==="wire"){   game.placed.wires = true; $("#wirezone").classList.remove("active"); }
  updateBoard();
  renderBTray(BUILD_TYPES);
  checkAllPlaced();
}
function checkAllPlaced(){
  if(game.state!=="placeParts") return;
  if(game.placed.battery && game.placed.led && game.placed.switch && game.placed.wires){
    dropHandler = null;
    setInstruction(null);
    goto("circuitDoesNotWork");
  }
}

/* ============ Tap handlers ============ */
function onBatteryTap(){
  if(game.state!=="circuitDoesNotWork" || !game.awaitBatteryTap || game.batteryCorrect) return;
  const bEl = board.querySelector("#battery");
  if(!game.batteryInspecting){
    // First tap: enlarge (no card, +50%) so the child observes the + and – sides
    game.batteryInspecting = true;
    bEl.classList.remove("glowtap");
    bEl.classList.add("inspect");
    snd.click();
    setDialogue([{who:"Meera", text:"Look closely. Tap again to turn it.", meera:"meeraThink", voice:"look closely. tap again to turn it.wav"}]);
    return;
  }
  // Second tap: reverse polarity WHILE still enlarged. The LED is already correct and the
  // switch is ON, so the circuit lights up the instant the battery is turned the right way.
  game.batteryInspecting = false;
  game.awaitBatteryTap = false;
  game.batteryCorrect = true;
  bEl.classList.add("flashgreen");
  snd.success();
  updateBoard();                              // battery correct -> circuit glows, current flows
  setInstruction(null);
  setTimeout(()=>bEl.classList.remove("flashgreen"), 950);
  const lEl = board.querySelector("#led");
  curKabir="kabirCelebrate"; curMeera="meeraHappy";
  setCompanions("kabirCelebrate","meeraHappy");
  setDialogue([
    {who:"Kabir", text:"It's working!", kabir:"kabirCelebrate", voice:"its working.wav"},
    {who:"Meera", text:"Look closely! It works only when the battery's + side meets the LED's + side.", meera:"meeraHappy", voice:"look closely! it only works.wav"},
  ]);
  // It stays reversed & enlarged for a moment, then fits back into the circuit...
  setTimeout(()=>bEl.classList.remove("inspect"), 1200);
  // ...1s after it settles, grow battery & LED to 175% for 10s, then back to normal.
  setTimeout(()=>{ bEl.classList.add("grow"); lEl.classList.add("grow"); }, 2200);
  setTimeout(()=>{
    bEl.classList.remove("grow");
    lEl.classList.remove("grow");
    goto("lightSourceWorking");
  }, 12200);
}
function onSwitchTap(){
  if(game.state!=="lightSourceWorking") return;
  const sEl = board.querySelector("#switch");
  if(game.playStep===0){
    if(game.switchOn===false) return;
    game.switchOn = false; game.playStep = 1;
    sEl.classList.remove("glowtap");
    snd.off(); updateBoard();                 // current stops, LED off, path breaks at switch
    setDialogue([
      {who:"Meera", text:"The current stopped — the path is broken.", meera:"meeraThink", voice:"current stopped path is broken.wav"},
      {who:"Kabir", text:"Let's switch it on again.", kabir:"kabirHappy", voice:"lets switch it on again.wav"},
    ], armSwitchOn);
  } else if(game.playStep===1){
    if(game.switchOn===true) return;
    game.switchOn = true; game.playStep = 2;
    sEl.classList.remove("glowtap");
    snd.success(); updateBoard();             // path restores, current flows, LED glows
    setDialogue([
      {who:"Meera", text:"On again — the current flows and it glows.", meera:"meeraHappy", voice:"on again.wav"},
      {who:"Kabir", text:"The switch helps control the light.", kabir:"kabirHappy", voice:"switch helps to control.wav"},
    ], ()=> goto("projectorCompletionPrompt"));
  }
}
function armSwitchOff(){ board.querySelector("#switch").classList.add("glowtap"); }
function armSwitchOn(){ board.querySelector("#switch").classList.add("glowtap"); }

/* ============ STATE MACHINE ============ */
function goto(state){
  game.state = state;
  dropHandler = null;
  clearAction();
  clearDlgTimer();
  setInstruction(null);
  STATES[state]();
}

/* ---- Part A guided collection order: LED -> battery -> (switch & wire) ---- */
function nextNeeded(){
  if(!game.collected.led)     return ["led"];
  if(!game.collected.battery) return ["battery"];
  const rem = [];
  if(!game.collected.switch)  rem.push("switch");
  if(!game.collected.wire)    rem.push("wire");
  return rem;
}
function collectNudge(){
  const n = nextNeeded();
  if(n.includes("led"))     return {who:"Kabir", text:"Find something that glows first.", kabir:"kabirThink"};
  if(n.includes("battery")) return {who:"Meera", text:"We need something to power it.", meera:"meeraThink", voice:"something to power it.wav"};
  return {who:"Kabir", text:"Now the switch and the wire.", kabir:"kabirThink"};
}
function nextCollectPrompt(type){
  if(type==="led")     setDialogue([{who:"Meera", text:"Now something to power it.", meera:"meeraHappy", voice:"something to power it.wav"}]);
  else if(type==="battery") setDialogue([{who:"Kabir", text:"Now something to switch it on/off, and something to connect it all.", kabir:"kabirHappy", voice:"now something to switch it onoff.wav"}]);
}
function finishPartA(){
  const box = $("#circuitbox");
  if(box){ box.classList.remove("hot"); box.classList.add("done"); }
  snd.bigwin();
  setInstruction(null);
  dropHandler = null;
  setDialogue([{who:"Meera", text:"All found! Let's connect them.", meera:"meeraHappy", voice:"all found lets connect them.wav"}], ()=> goto("buildIntro"));
}

/* ---- Part B guided placement order: battery -> LED -> (switch & wire) ---- */
function nextPlace(){
  if(!game.placed.battery) return ["battery"];
  if(!game.placed.led)     return ["led"];
  const rem = [];
  if(!game.placed.switch)  rem.push("switch");
  if(!game.placed.wires)   rem.push("wire");
  return rem;
}
function placeNudge(){
  const n = nextPlace();
  if(n.includes("battery")) return {who:"Kabir", text:"Connect the power source first.", kabir:"kabirThink"};
  if(n.includes("led"))     return {who:"Meera", text:"Now add the part that glows.", meera:"meeraThink", voice:"now add part that glows.wav"};
  return {who:"Kabir", text:"Now the switch and the wire.", kabir:"kabirThink"};
}
function onPlaced(type){
  if(game.state!=="placeParts") return;              // all-placed case handled by checkAllPlaced
  if(type==="battery") setDialogue([{who:"Meera", text:"Now add the part that glows.", meera:"meeraHappy", voice:"now add part that glows.wav"}]);
  else if(type==="led") setDialogue([{who:"Kabir", text:"Now add the switch and wire.", kabir:"kabirHappy", voice:"now add switch and wire.wav"}]);
}

const STATES = {

  /* ---------- NEW opening ---------- */
  lightSourceIntroScreen(){
    setPortrait(true);
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    setDialogue([
      {who:"Kabir", text:"It's time to build our own light source for our projector!", kabir:"kabirHappy"},
    ]);
    setAction("Let's Go", ()=>goto("partsIntro"));
  },

  /* ---------- PART A : selection opening ---------- */
  partsIntro(){
    setPortrait(false);
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    buildStageA(false);                       // items visible but locked
    setDialogue([
      {who:"Kabir", text:"Let's build it together!", kabir:"kabirHappy", voice:"lets build it together.wav"},
    ], ()=> goto("chooseParts") );            // auto-flows into collection, no manual Start
  },

  /* ---------- PART A : selection interaction ---------- */
  chooseParts(){
    setInstruction(null);
    hintIdx = 0;
    game.collected = { battery:0, led:0, switch:0, wire:0 };
    buildStageA(true);                        // draggable
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    setDialogue([
      {who:"Kabir", text:"Let's collect the parts for our light source.", kabir:"kabirHappy", voice:"lets collect parts for our light source.wav"},
      {who:"Meera", text:"Drag parts from Spark Supplies to the Light Launchpad.", meera:"meeraHappy", voice:"drag from spark supplies.wav"},
      {who:"Kabir", text:"First, something that can glow.", kabir:"kabirHappy", voice:"first something that glows.wav"},
    ]);
    const box = $("#circuitbox");
    dropHandler = (meta, x, y, srcEl)=>{
      if(!pointInRect(x,y,box,20)){ bounceItem(srcEl); return; }
      const need = nextNeeded();
      if(need.includes(meta.type)){
        game.collected[meta.type]++;
        snd.success();
        const si = document.createElement("div");
        si.className="slotitem glow";
        si.innerHTML = `<img src="${meta.img}" alt="${meta.label}">`;
        $("#cbdrop").appendChild(si);
        setTimeout(()=>si.classList.remove("glow"), 900);
        srcEl.remove();
        if(game.collected.battery && game.collected.led && game.collected.switch && game.collected.wire){
          finishPartA();
        } else {
          nextCollectPrompt(meta.type);
        }
      } else if(USEFUL.includes(meta.type)){
        snd.bounce(); bounceItem(srcEl);
        setDialogue([collectNudge()]);        // right kind of part, but not the one we need yet
      } else {
        snd.bounce(); bounceItem(srcEl);
        const h = HINTS[hintIdx % HINTS.length]; hintIdx++;
        setDialogue([h]);
      }
    };
  },

  /* ---------- PART B ---------- */
  buildIntro(){
    setPortrait(false);
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    game.placed = { battery:false, led:false, switch:false, wires:false };
    game.batteryCorrect=false; game.ledCorrect=true; game.switchOn=false;
    game.awaitBatteryTap=false; game.playStep=0;
    game.batteryInspecting=false;
    buildStageB();
    renderBTray([]);
    updateBoard();
    goto("placeParts");                        // Part B starts straight into building
  },

  /* Guided placement order: power source -> LED -> switch & wire */
  placeParts(){
    setInstruction(null);                      // no top banner text on the build screen
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    renderBTray(BUILD_TYPES);                  // all components draggable
    $("#wirezone").classList.add("active");
    setDialogue([{who:"Kabir", text:"First, connect the power source.", kabir:"kabirHappy", voice:"first connect power source.wav"}]);
    dropHandler = (meta, x, y, srcEl)=>{
      const need = nextPlace();
      const target = PLACE_TARGET[meta.type];
      const onSpot = target && pointInRect(x,y,board.querySelector(target),40);
      if(!need.includes(meta.type)){          // not the part we need next
        snd.bounce(); bounceItem(srcEl); setDialogue([placeNudge()]); return;
      }
      if(isPlaced(meta.type) || !onSpot){      // right part, wrong spot
        snd.bounce(); bounceItem(srcEl);
        setDialogue([{who:"Meera", text:"Drop it on its own spot.", meera:"meeraThink"}]);
        return;
      }
      snd.click();
      placeComponent(meta.type);
      onPlaced(meta.type);
    };
  },

  circuitDoesNotWork(){
    setInstruction(null);
    curKabir="kabirThink"; curMeera="meeraThink";
    setCompanions("kabirThink","meeraThink");
    snd.confused();
    setDialogue([
      {who:"Kabir", text:"Why is it not glowing?", kabir:"kabirThink", voice:"why is it not glowing.wav"},
      {who:"Meera", text:"Let's check the battery first.", meera:"meeraThink", voice:"lets check the battery first.wav"},
    ], ()=>{
      // guide the child: make the battery glow/pulse; tapping it fixes polarity
      game.awaitBatteryTap = true;
      board.querySelector("#battery").classList.add("glowtap");
    });
  },

  lightSourceWorking(){
    setInstruction(null);
    curKabir="kabirCelebrate"; curMeera="meeraHappy";
    setCompanions("kabirCelebrate","meeraHappy");
    updateBoard();
    snd.bigwin(); confetti();
    game.playStep = 0;
    setDialogue([
      {who:"Kabir", text:"Let's turn the switch off.", kabir:"kabirHappy", voice:"lets turn switch of.wav"},
    ], armSwitchOff);
  },

  /* ---------- FINAL transition ---------- */
  projectorCompletionPrompt(){
    setPortrait(false);
    gameEl.classList.add("finale");
    sceneMode = "finale";
    stage.className = "stage-a";          // show the frosted-glass panel (empty)
    stage.style.display = "flex";
    stage.innerHTML = "";
    curKabir="kabirHappy"; curMeera="meeraHappy";
    setCompanions("kabirHappy","meeraHappy");
    confetti();
    setDialogue([
      {who:"Meera", text:"We have our light source! Let's finish the projector.", meera:"meeraHappy", voice:"we have our light source.wav"},
    ]);
    setAction("Continue", ()=>{
      // Continue into the two closing scenes.
      clearAction();
      gameEl.classList.remove("finale");
      showFinalScenes();
    });
  },
};

/* ============ Intro video (Activity 2 opening scene) ============ */
/* Subtitles: fill each entry with {t: startSeconds, e: endSeconds, text:"..."} */
const INTRO_CUES = [
  // { t:0, e:4, text:"..." },
];
function bindCaptions(vid, capEl, cues){
  if(!capEl) return;
  capEl.textContent = ""; capEl.style.opacity = "0";
  vid.addEventListener("timeupdate", ()=>{
    const ct = vid.currentTime;
    const cue = cues.find(c=> ct>=c.t && ct<c.e);
    capEl.textContent = cue ? cue.text : "";
    capEl.style.opacity = cue ? "1" : "0";
  });
}
function playIntroVideo(){
  stopVoice(); clearDlgTimer();
  const box = $("#introvideo"), vid = $("#iv-video");
  box.classList.add("show");
  let done = false;
  const finish = ()=>{
    if(done) return; done = true;
    try{ vid.pause(); vid.removeAttribute("src"); vid.load(); }catch(e){}
    box.classList.remove("show");
    // warm the cache for the closing video while the child plays, so it starts instantly
    try{ fetch(encodeURI("videos/final scene activity 2.mp4")).catch(()=>{}); }catch(e){}
    goto("partsIntro");
  };
  if(!vid.getAttribute("src")) vid.src = "videos/inital scene activity 2.mp4";   // may already be buffered by the boot preload
  bindCaptions(vid, $("#iv-cap"), INTRO_CUES);
  vid.addEventListener("ended", finish, { once:true });
  vid.addEventListener("error", ()=>{ if(vid.getAttribute("src")) finish(); });   // missing/broken clip → straight into the game
  $("#iv-skip").onclick = ()=>{ ac(); snd.click(); finish(); };
  const p = vid.play();
  if(p && p.catch) p.catch(()=>{                 // autoplay blocked -> start on first gesture
    const kick = ()=>{ vid.play().catch(()=>{}); };
    window.addEventListener("pointerdown", kick, { once:true });
  });
}

/* ============ Closing scene (shown after the finale's Continue) ============ */
function showFinalScenes(){
  stopVoice(); clearDlgTimer();
  const box = $("#finalbook"), vid = $("#fb-video"), restartBtn = $("#fb-restart");
  restartBtn.style.display = "none";
  restartBtn.classList.remove("glowbtn");
  box.classList.add("show");
  const reveal = ()=>{
    restartBtn.style.display = "inline-block";
    restartBtn.classList.add("glowbtn");
  };
  vid.src = "videos/final scene activity 2.mp4";
  vid.addEventListener("ended", reveal, { once:true });
  vid.addEventListener("error", ()=>{ if(vid.getAttribute("src")) reveal(); });   // missing/broken clip → still show Restart
  const p = vid.play();
  if(p && p.catch) p.catch(()=>{                 // autoplay blocked -> start on first gesture
    const kick = ()=>{ vid.play().catch(()=>{}); };
    window.addEventListener("pointerdown", kick, { once:true });
  });
}
$("#fb-restart").addEventListener("click", ()=>{
  try{ $("#fb-video").pause(); }catch(e){}
  // embedded in the constellation game (iframe) → ask it to restart; else navigate.
  if(window.self !== window.top){ window.parent.postMessage("ls-restart","*"); }
  else { window.location.href="index.html"; }
});

/* ============ Boot ============ */
/* Embedded in the constellation game: the parent preloads this page invisibly behind
   its Continue gate. On load we BUFFER the intro video (nothing plays) and report
   "ls-ready"; the intro only starts on "ls-start" — the child's Continue click — so
   Activity 2 opens instantly, with autoplay + sound still allowed by that click.
   Opened standalone: play on load, exactly as before. */
if(window.self !== window.top){
  let started = false;
  window.addEventListener("message", e=>{
    if(e.data==="ls-start" && !started){ started = true; playIntroVideo(); }
  });
  window.addEventListener("load", ()=>{
    const vid = $("#iv-video");
    if(!vid.getAttribute("src")){ vid.src = "videos/inital scene activity 2.mp4"; try{ vid.load(); }catch(e){} }  // buffer only
    try{ window.parent.postMessage("ls-ready","*"); }catch(e){}
  });
} else {
  window.addEventListener("load", playIntroVideo);
}
</script>
