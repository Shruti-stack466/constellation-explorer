<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Constellation Explorers — Discover the Pictures Hidden in the Night Sky</title>
<!-- Display fonts: Baloo 2 (rounded headings) + Nunito (body). Loaded when online;
     falls back to rounded system fonts offline, so nothing breaks either way. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
/* ============================================================
   STAR EXPLORER  —  single-file, offline, no external deps
   Palette & type per GDD §10. Colour never carries meaning alone.
   ============================================================ */
:root{
  --indigo-900:#0a0e24;
  --indigo-800:#121738;
  --indigo-700:#1c2350;
  --indigo-card:#202a5e;
  --indigo-line:#39427f;
  --gold:#ffd45e;
  --gold-deep:#f4b740;
  --text:#eef1ff;
  --muted:#aeb6e6;
  --coral:#ff9a86;
  --coral-deep:#ff7a63;
  --green:#83e8b2;
  --star:#fff7e0;
  --radius:22px;
  --pill:999px;
  --font:'Nunito','Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(1200px 820px at 82% 8%, rgba(190,72,200,.20), transparent 60%),
    radial-gradient(1000px 760px at 12% 22%, rgba(118,66,206,.15), transparent 60%),
    radial-gradient(1100px 800px at 50% 56%, rgba(4,3,14,.45), transparent 70%),
    linear-gradient(160deg,#160e30 0%,#0b0922 45%,#060512 78%,#000 100%);
  font-size:18px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
#app{min-height:100%;display:flex;flex-direction:column}

/* ---------- top chrome: progress + coins + narration ---------- */
#chrome{
  display:flex;align-items:center;gap:14px;
  padding:12px 18px;
  background:rgba(10,14,36,.55);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--indigo-line);
  position:sticky;top:0;z-index:40;
  flex-wrap:wrap;
}
#chrome.hidden{display:none}
.progress{display:flex;align-items:center;gap:6px;flex:1;min-width:240px;flex-wrap:wrap}
.milestone{display:flex;align-items:center;gap:6px}
.dot{
  width:16px;height:16px;border-radius:50%;
  background:var(--indigo-line);border:2px solid var(--indigo-line);
  flex:none;transition:.3s;
}
.milestone.done .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px var(--gold-deep)}
.milestone.current .dot{border-color:var(--gold);animation:pulse 1.6s infinite}
.mlabel{font-size:13px;color:var(--muted);white-space:nowrap}
.milestone.done .mlabel,.milestone.current .mlabel{color:var(--text)}
.track{width:26px;height:3px;background:var(--indigo-line);border-radius:3px}
.track.done{background:var(--gold)}

/* premium "Sky Stars" HUD pill (shown in the explorer scenes) */
.coins{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg,rgba(40,48,104,.9),rgba(22,28,64,.92));
  border:1px solid rgba(255,212,94,.4);
  padding:7px 15px;border-radius:var(--pill);font-weight:900;font-size:18px;color:var(--gold);
  box-shadow:0 6px 16px rgba(0,0,0,.35),inset 0 0 16px rgba(255,212,94,.12),0 0 14px rgba(255,212,94,.18);
}
.coins.hidden{display:none}
.coins .ico{font-size:18px}
.coins .coin-label{font-size:12.5px;font-weight:800;color:var(--muted);letter-spacing:.3px}
.coins #coinval{font-size:19px;color:#fff}
.coins .coin-rank{font-size:13px;letter-spacing:1px;color:var(--gold)}
.coins.spend{animation:tickdown .5s ease}
@keyframes tickdown{0%{transform:translateY(0)}40%{transform:translateY(4px);color:var(--coral)}100%{transform:translateY(0)}}
.coins.earn{animation:tickup .5s ease}
@keyframes tickup{0%{transform:translateY(0)}40%{transform:translateY(-4px);color:var(--gold)}100%{transform:translateY(0)}}

/* sound on/off — a single round speaker icon button */
.snd-toggle{
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  width:48px;height:48px;border-radius:50%;
  background:var(--indigo-card);border:1px solid var(--indigo-line);color:var(--text);
}
.snd-toggle .snd-ico{font-size:22px;line-height:1}
.snd-toggle:not(.on){filter:grayscale(.7) brightness(.8)}
.snd-toggle:focus-visible{outline:3px solid var(--gold);outline-offset:2px}

/* ---------- scene host ---------- */
#screen{flex:1;display:flex;flex-direction:column;position:relative;min-height:0}
.scene{flex:1;display:flex;flex-direction:column;animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- buttons ---------- */
.btn{
  font-family:var(--font);font-weight:800;font-size:19px;
  color:#241a00;background:linear-gradient(180deg,var(--gold),var(--gold-deep));
  border:none;border-radius:var(--pill);
  padding:14px 30px;min-height:52px;min-width:52px;cursor:pointer;
  box-shadow:0 6px 18px rgba(244,183,64,.35);
  transition:transform .12s, box-shadow .2s, filter .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 9px 24px rgba(244,183,64,.5)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:3px solid #fff;outline-offset:3px}
.btn.pulse{animation:pulse 1.8s infinite}
.btn[disabled]{filter:grayscale(.6) brightness(.7);cursor:not-allowed;box-shadow:none;transform:none}
.btn.ghost{
  background:transparent;color:var(--text);border:2px solid var(--indigo-line);box-shadow:none;font-weight:700;
}
.btn.ghost:hover{border-color:var(--gold);background:rgba(255,212,94,.08)}
.btn.small{font-size:16px;padding:11px 20px;min-height:48px}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,212,94,.55)}70%{box-shadow:0 0 0 14px rgba(255,212,94,0)}100%{box-shadow:0 0 0 0 rgba(255,212,94,0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ---------- dialogue bubble ---------- */
.dialogue{
  display:flex;gap:14px;align-items:flex-start;
  background:rgba(16,21,52,.92);border:1px solid var(--indigo-line);
  border-radius:var(--radius);padding:16px 18px;max-width:760px;margin:0 auto;width:100%;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}
.dialogue .avatar{width:60px;height:60px;flex:none}
img.avatar{border-radius:50%;object-fit:cover;object-position:50% 12%;
  background:radial-gradient(circle at 50% 30%,#2a3470,#141a3a);border:2px solid var(--indigo-line)}
.duo{display:flex;gap:18px;align-items:flex-end;justify-content:center;margin:4px 0}
.duo img{height:clamp(120px,22vh,190px);width:auto;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45))}
.duo img:first-child{animation:bobA 3.2s ease-in-out infinite}
.duo img:last-child{animation:bobB 3.6s ease-in-out infinite}
@keyframes bobA{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bobB{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.dialogue .who{font-weight:800;font-size:15px;margin-bottom:2px}
.dialogue .who.kabir{color:#ffce6b}
.dialogue .who.meera{color:#9fe0ff}
.dialogue .who.narr{color:var(--muted)}
.dialogue .line{font-size:21px;line-height:1.5}
.dialogue .next{
  margin-left:auto;align-self:center;background:var(--gold);color:#241a00;border:none;
  width:48px;height:48px;border-radius:50%;font-size:22px;cursor:pointer;flex:none;font-weight:900;
}
.dialogue .next:focus-visible{outline:3px solid #fff;outline-offset:2px}

/* ---------- centered hero layouts ---------- */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:18px}
h1.title{font-size:clamp(40px,8vw,78px);margin:0;letter-spacing:1px;
  background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 2px 30px rgba(255,212,94,.25)}
.subtitle{font-size:clamp(18px,3vw,24px);color:var(--muted);margin:0}
.scene-pad{padding:18px 18px 24px;display:flex;flex-direction:column;gap:16px;flex:1}

/* ---------- backgrounds (CSS/SVG) ---------- */
.sky-bg{position:absolute;inset:0;overflow:hidden;z-index:-1}
.twinkle{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.8;animation:tw 3s infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* ---------- star field ---------- */
.fieldwrap{position:relative;flex:1;min-height:300px;border-radius:var(--radius);
  background:radial-gradient(120% 120% at 50% 0%, #161d49 0%, #0c1130 80%);
  border:1px solid var(--indigo-line);overflow:hidden}
svg.field{width:100%;height:100%;display:block;touch-action:manipulation}
.starnode{transition:transform .15s ease}
.starshape{fill:var(--star);stroke:#fff;stroke-width:.25;
  filter:drop-shadow(0 0 1.6px rgba(255,247,224,.85));transition:fill .15s,filter .15s}
.starnode.bright .starshape{fill:var(--gold);stroke:#fff6cf;
  filter:drop-shadow(0 0 3px var(--gold-deep))}
.starnode.sel .starshape,.starnode.used .starshape,.starnode:hover .starshape{fill:var(--gold);stroke:#fff6cf;
  filter:drop-shadow(0 0 1.6px var(--gold))}
.starhit{cursor:pointer;fill:transparent;outline:none}
.starhit:focus-visible{outline:1px solid rgba(255,255,255,.85);outline-offset:2px;border-radius:4px}
/* selected star: a small square outline with a thin border (no scale-up, no thick ring) */
.starnode .selbox{display:none;fill:none;stroke:rgba(255,255,255,.9);stroke-width:.28;pointer-events:none}
.starnode.sel .selbox{display:block}
.starnode.hint .starshape{animation:starpulse 1.05s ease-in-out infinite;
  transform-box:fill-box;transform-origin:center}
@keyframes starpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.55)}}
.edge{stroke:var(--gold);stroke-width:1.1;stroke-linecap:round;filter:drop-shadow(0 0 3px var(--gold-deep))}
/* lines the child draws to connect stars (Activity 1 hunt + Activity 2 trace): thin & white */
.field .edge{stroke:#fff;stroke-width:.5;filter:none}
.edge.draw{animation:dash .13s linear}
@keyframes dash{from{stroke-dasharray:120;stroke-dashoffset:120}to{stroke-dashoffset:0}}
.ghost{stroke:var(--gold);stroke-width:1;stroke-dasharray:2.5 2.5;opacity:.55}

/* ---------- HUD row inside activities ---------- */
.hud{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-weight:800}
.hud .pill{background:var(--indigo-card);border:1px solid var(--indigo-line);padding:8px 16px;border-radius:var(--pill);font-size:17px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
.feedback{min-height:30px;font-size:19px;font-weight:800;text-align:center;transition:.2s}
.nameinput{font:inherit;font-size:17px;padding:11px 16px;border-radius:var(--pill);
  border:2px solid var(--indigo-line);background:var(--indigo-card);color:var(--text);min-height:48px;min-width:190px}
.nameinput::placeholder{color:var(--muted)}
.nameinput:focus-visible{outline:3px solid var(--gold);outline-offset:1px}
.chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%}
.chip{font:inherit;font-weight:700;font-size:14px;padding:8px 14px;border-radius:var(--pill);
  border:1px solid var(--indigo-line);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;min-height:40px}
.chip:hover{border-color:var(--gold);background:rgba(255,212,94,.12)}
.chip:focus-visible{outline:3px solid var(--gold);outline-offset:1px}
.feedback.good{color:var(--green)}
.feedback.bad{color:var(--coral)}

/* ---------- tracing split ---------- */
.split{display:grid;grid-template-columns:0.8fr 2fr;gap:16px;flex:1;min-height:0}
@media(max-width:760px){.split{grid-template-columns:1fr;grid-auto-rows:minmax(220px,auto)}}
.panel{display:flex;flex-direction:column;gap:8px;min-height:0}
.panel h3{margin:0;font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.reference{background:radial-gradient(120% 120% at 50% 0%, #182052 0%, #0c1130 80%);
  border:1px dashed var(--indigo-line);border-radius:var(--radius);flex:1;min-height:0}
.reference svg{width:100%;height:100%}
.hints{display:flex;gap:10px;flex-wrap:wrap}

/* ---------- gallery cards ---------- */
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:720px;margin:0 auto;width:100%}
@media(max-width:520px){.cards{grid-template-columns:1fr}}
.card{
  background:var(--indigo-card);border:1px solid var(--indigo-line);border-radius:var(--radius);
  padding:14px;display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center;
  box-shadow:0 8px 22px rgba(0,0,0,.3);animation:cardin .5s ease both;
}
@keyframes cardin{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.card svg{width:100%;height:120px;background:radial-gradient(120% 120% at 50% 0%, #141b48, #0b0f2c);border-radius:14px}
.card .cname{font-weight:800;font-size:20px}
.card .cdesc{color:var(--gold);font-size:15px;font-weight:700}
.card .cwhy{color:var(--muted);font-size:14px;line-height:1.45}
.card.clickable{cursor:pointer;transition:transform .15s,border-color .15s}
.card.clickable:hover{transform:translateY(-3px);border-color:var(--gold)}
.card.clickable:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.card.clickable::after{content:"🔊 tap to hear";font-size:12px;color:var(--muted);margin-top:2px}

/* ---------- reward / ceremony ---------- */
.badges{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:680px}
.badge{display:flex;flex-direction:column;align-items:center;gap:6px;width:120px;animation:cardin .6s ease both}
.badge .disc{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:32px;background:radial-gradient(circle at 35% 30%, #fff3c4, var(--gold-deep));
  color:#3a2a00;box-shadow:0 6px 18px rgba(244,183,64,.45)}
.badge .blabel{font-size:14px;font-weight:800;line-height:1.2}
.badge .bsub{font-size:12px;color:var(--muted)}
.titleband{font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--gold)}
.statline{display:flex;gap:22px;flex-wrap:wrap;justify-content:center;font-weight:800;font-size:18px}

.reveal{font-size:clamp(34px,7vw,62px);font-weight:900;letter-spacing:2px;color:var(--gold);
  text-shadow:0 0 30px var(--gold-deep);animation:reveal 1.2s ease both}
@keyframes reveal{0%{opacity:0;transform:scale(.6);letter-spacing:14px}100%{opacity:1;transform:none}}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ---------- single Clue button (tracing, top-right of the HUD) ---------- */
.cuebtn{margin-left:auto;background:rgba(255,212,94,.12);border-color:var(--gold-deep);color:var(--gold);font-weight:800}
.cuebtn:hover:not([disabled]){background:rgba(255,212,94,.22)}

/* ---------- glowing constellation diagram (gallery) ---------- */
.glow-diagram svg .edge{animation:edgeGlow 1.9s ease-in-out infinite}
.glow-diagram svg .starshape{animation:starGlow 1.9s ease-in-out infinite}
@keyframes edgeGlow{0%,100%{filter:drop-shadow(0 0 2px var(--gold-deep));opacity:.75}50%{filter:drop-shadow(0 0 9px var(--gold)) drop-shadow(0 0 16px var(--gold-deep));opacity:1}}
@keyframes starGlow{0%,100%{filter:drop-shadow(0 0 2px rgba(255,247,224,.8))}50%{filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 14px var(--gold-deep))}}

/* ---------- gallery: one constellation at a time ---------- */
.scene-pad.gallery-one{overflow:hidden;justify-content:center;gap:10px}
.ghead{flex:0;width:100%;text-align:center}
.gstage{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%}
.gcard{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;
  width:100%;max-width:580px;background:var(--indigo-card);border:1px solid var(--indigo-line);
  border-radius:var(--radius);padding:18px 22px 16px;box-shadow:0 12px 34px rgba(0,0,0,.4);animation:cardin .45s ease both}
.gdiagram{width:100%;max-width:340px}
.gdiagram svg{width:100%;height:190px;background:radial-gradient(120% 120% at 50% 0%, #141b48, #0b0f2c);border-radius:16px}
.gcard .gname{font-weight:900;font-size:clamp(24px,3.6vw,32px);color:var(--text)}
.gcard .gdesc{color:var(--gold);font-size:17px;font-weight:800}
.gcard .gwhy{color:var(--muted);font-size:15px;line-height:1.45;max-width:520px}
.gcard .gcount{font-size:14px;font-weight:800;color:var(--muted);margin-top:2px}
.gcard .ghear{position:absolute;top:10px;right:12px;min-width:44px;padding:0 12px;min-height:40px}
.gnav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px}
.gnav .navbtn{background:var(--indigo-700);color:var(--text);border:2px solid var(--gold-deep);
  box-shadow:none;font-weight:800;min-width:124px}
.gnav .navbtn:hover:not([disabled]){background:rgba(255,212,94,.16);border-color:var(--gold)}
.gnav .navbtn[disabled]{opacity:.4;filter:none}
.gnav .gostart{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#241a00;border-color:transparent}

/* ---------- Pattern Hunt: reference shape cards ---------- */
.shapebar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;width:100%;max-width:860px;margin:0 auto}
.shapetab{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;cursor:pointer;
  width:96px;padding:8px 6px 6px;border-radius:16px;font:inherit;
  background:var(--indigo-card);border:2px solid var(--indigo-line);color:var(--text);transition:.15s}
.shapetab:hover{border-color:var(--gold);transform:translateY(-2px)}
.shapetab:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.shapetab .sicon{width:46px;height:46px}
.shapetab .slabel{font-size:13px;font-weight:800}
.shapetab .scheck{position:absolute;top:4px;right:6px;color:var(--green);font-weight:900;font-size:18px;opacity:0;transform:scale(.5);transition:.2s}
.shapetab.done{border-color:var(--green);background:rgba(131,232,178,.12)}
.shapetab.done .scheck{opacity:1;transform:scale(1)}
.shapetab.done .sicon{opacity:.55}
.shapetab[disabled]{cursor:default}

/* ---------- Pattern Hunt: full-screen redesign ---------- */
.hunt-stage{position:relative;overflow:hidden}
.huntfield{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(130% 120% at 50% 0%, #0c0c12 0%, #000 80%)}
.huntfield .starshape{fill:#fff;stroke:#fff}                 /* every star plain white */
/* foreground (interactive) stars twinkle */
.huntfield .starnode .starshape{animation:twinkle 3.4s ease-in-out infinite}
.huntfield .starnode:nth-child(2n) .starshape{animation-duration:4.2s;animation-delay:.6s}
.huntfield .starnode:nth-child(3n) .starshape{animation-duration:2.8s;animation-delay:1.2s}
/* decorative layers: faint background + medium middle stars, and a soft Milky Way band */
.hf-deco{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
/* .star-dust-layer : a faint diagonal star-dust trail (lavender → magenta → lavender) */
.hf-milkyway{position:absolute;left:-18%;right:-18%;top:10%;height:70%;transform:rotate(-17deg);
  filter:blur(40px);opacity:.6;
  background:linear-gradient(110deg,transparent 0%,rgba(205,175,255,.06) 26%,rgba(236,150,220,.13) 50%,rgba(205,175,255,.06) 74%,transparent 100%)}
/* .background-stars : many tiny, dim stars in white / pale lavender / pale pink (~40–60% opacity) */
.hf-star{position:absolute;border-radius:50%;background:#fff}
.hf-star.tiny{width:1.5px;height:1.5px;animation:twFaint 3s ease-in-out infinite}
.hf-star.med{width:2.6px;height:2.6px;box-shadow:0 0 4px rgba(222,200,255,.5);
  animation:twMed 3s ease-in-out infinite,driftDust 17s ease-in-out infinite}        /* medium dust gently drifts */
.hf-star.tiny:nth-child(3n){background:#e7dbff}      /* pale lavender */
.hf-star.tiny:nth-child(5n){background:#ffd9ec}      /* pale pink */
.hf-star.tiny:nth-child(4n){animation:twFaint 3s ease-in-out infinite,driftDust 23s ease-in-out infinite}  /* some tiny dust drifts too */
.hf-star.tiny:nth-child(7n){animation:twFaint 3s ease-in-out infinite,driftDust 19s ease-in-out infinite}
.hf-star.med:nth-child(4n){background:#efe6ff}
@keyframes twFaint{0%,100%{opacity:.5}50%{opacity:.22}}
@keyframes twMed{0%,100%{opacity:.55}50%{opacity:.28}}
@keyframes driftDust{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-5px)}}
/* Mission panel: the shape cards become a mission tracker, top-left */
.mission-panel{position:absolute;left:12px;top:14px;z-index:4;width:182px;max-height:90%;
  display:flex;flex-direction:column;border-radius:16px;overflow:hidden;
  background:linear-gradient(180deg,rgba(32,40,96,.94),rgba(16,22,56,.94));
  border:1px solid var(--indigo-line);box-shadow:0 12px 30px rgba(0,0,0,.5);backdrop-filter:blur(4px)}

.tracefield .starnode:nth-child(2n) .starshape{animation-duration:4.1s;animation-delay:.7s}
.tracefield .starnode:nth-child(3n) .starshape{animation-duration:2.6s;animation-delay:1.3s}
.tracefield .starnode:nth-child(5n) .starshape{animation-duration:3.7s;animation-delay:.35s}
.tracefield .starnode.hint .starshape{animation:starpulse 1.05s ease-in-out infinite}
.figoverlay-wrap{position:absolute;inset:0;z-index:3;pointer-events:none}
.figoverlay{opacity:0;animation:figin 1.1s ease forwards}
.figimg{opacity:0;animation:figimgin 1.1s ease forwards, figglow 2.6s ease-in-out 1.1s infinite;
  filter:drop-shadow(0 0 9px rgba(175,212,255,1)) drop-shadow(0 0 20px rgba(135,185,255,.85)) drop-shadow(0 0 34px rgba(120,170,255,.6))}
@keyframes figimgin{to{opacity:.5}}
@keyframes figglow{
  0%,100%{filter:drop-shadow(0 0 8px rgba(175,212,255,.9)) drop-shadow(0 0 18px rgba(135,185,255,.65)) drop-shadow(0 0 30px rgba(120,170,255,.45))}
  50%{filter:drop-shadow(0 0 16px rgba(200,228,255,1)) drop-shadow(0 0 34px rgba(145,195,255,.95)) drop-shadow(0 0 52px rgba(120,170,255,.75))}}
/* reveal WOW: slightly dim the sky behind the figure + soft floating particles */
.reveal-dim{position:absolute;inset:0;z-index:2;pointer-events:none;background:rgba(5,8,24,.38);opacity:0;animation:revealDim 1.1s ease forwards}
@keyframes revealDim{to{opacity:1}}
.reveal-spark{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff7d6;pointer-events:none;z-index:4;
  transform:translate(-50%,-50%);box-shadow:0 0 6px 2px rgba(255,212,94,.8);animation:revealSpark var(--sd,2s) ease-in-out infinite}
@keyframes revealSpark{0%,100%{opacity:0;transform:translate(-50%,-50%) scale(.35)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1)}}
/* translucent silhouette parts (a ghostly blue figure over the gold star-lines) */
.fb{fill:rgba(150,190,255,.17);stroke:rgba(200,220,255,.5);stroke-width:.6;stroke-linejoin:round}
.fl{fill:none;stroke:rgba(160,196,255,.30);stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
.fbody{fill:none;stroke:rgba(160,196,255,.24);stroke-width:9;stroke-linecap:round;stroke-linejoin:round}
.fthin{fill:none;stroke:rgba(160,196,255,.30);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
@media (prefers-reduced-motion: reduce){.discover-coach .dc-say,.discover-coach .dc-fig,.guess-box,.choice-tray{animation:none}.discover-dock{animation:huntFieldIn .6s ease .2s both}.figoverlay{opacity:1;animation:none}.figimg{opacity:.5;animation:none}}
/* "Star Thought Card" — light, magical response bar (slides up only when needed) */
.guess-box{position:absolute;left:54%;bottom:10%;transform:translateX(-50%);z-index:9;
  display:flex;flex-direction:column;gap:8px;align-items:stretch;text-align:left;
  background:linear-gradient(180deg,rgba(30,17,56,.80),rgba(42,23,68,.68));
  border:1px solid rgba(190,140,255,.32);border-radius:18px;padding:11px 16px;
  backdrop-filter:blur(12px) saturate(1.05);-webkit-backdrop-filter:blur(12px) saturate(1.05);
  box-shadow:0 14px 34px rgba(0,0,0,.42),0 0 22px rgba(168,85,247,.22),inset 0 1px 0 rgba(255,255,255,.09);
  width:min(92vw,430px);animation:guessUp .42s cubic-bezier(.2,.9,.2,1) both}
@keyframes guessUp{from{opacity:0;transform:translate(-50%,24px) scale(.97)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
.gb-label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:#e7dcff;letter-spacing:.01em;padding-left:2px}
.gb-label .gb-star{color:#fde68a;font-size:13px;filter:drop-shadow(0 0 5px rgba(250,204,21,.5))}
.gb-row{display:flex;gap:13px;align-items:center;justify-content:center;flex-wrap:nowrap}
/* input — misty blue-lavender fill, gold edge, soft inner glow, readable white text */
.guess-input{flex:1 1 auto;min-width:0;height:42px;font-size:clamp(14px,1.8vw,17px);padding:0 14px;border-radius:12px;font-weight:700;color:#fff;
  border:1.5px solid rgba(255,216,120,.7);background:rgba(238,230,255,.12);
  backdrop-filter:blur(8px) saturate(1.05);-webkit-backdrop-filter:blur(8px) saturate(1.05);outline:none;
  box-shadow:inset 0 1px 6px rgba(255,255,255,.07),0 0 10px rgba(168,85,247,.16);transition:border-color .2s,box-shadow .2s,background .2s}
.guess-input::placeholder{color:rgba(232,224,255,.6);font-weight:600}
.guess-input:focus{background:rgba(244,238,255,.18);border-color:rgba(255,222,130,1);
  box-shadow:0 0 0 3px rgba(255,210,80,.16),0 0 16px rgba(255,220,110,.30)}
/* soft "submit star" — gold gradient, dark readable text, calm shadow (not a loud tab) */
.guess-box .guess-go{flex:0 0 auto;white-space:nowrap;height:42px;min-height:42px;padding:0 15px;border-radius:13px;font-size:13.5px;font-weight:900;
  background:linear-gradient(180deg,#FFD86B,#F7B93E);color:#2A1D05;border:1px solid rgba(255,235,160,.8);
  box-shadow:0 4px 12px rgba(255,190,60,.28)}
.guess-box .guess-go:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,200,70,.38)}
/* smaller variant for the reason step */
.guess-box.compact{padding:10px 15px;gap:7px}
.guess-box.compact .gb-label{font-size:12px}
.guess-box.compact .guess-input{height:38px;font-size:clamp(13px,1.7vw,15px)}
.guess-box.compact .guess-go{height:38px;min-height:38px;font-size:13px;padding:0 15px}
/* "thinking choices" — raised magical answer buttons (equal weight) */
/* Same / Different tray + tabs — identical look to the bottom control dock (.discover-dock .seg) */
.choice-tray{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:9;display:flex;align-items:stretch;gap:2px;
  padding:5px;border-radius:16px;
  background:linear-gradient(180deg,rgba(30,17,56,.78),rgba(48,26,76,.58));border:1px solid rgba(255,234,185,.42);
  backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 16px 40px rgba(0,0,0,.36),0 0 13px rgba(255,233,180,.26),0 0 26px rgba(168,85,247,.20),inset 0 1px 0 rgba(255,255,255,.13);
  animation:guessUp .42s cubic-bezier(.2,.9,.2,1) both}
.choice-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:120px;height:58px;padding:0 20px;border:0;cursor:pointer;
  background:transparent;color:#e7ecf5;border-radius:14px;font:inherit;
  transition:background .18s,transform .15s,box-shadow .2s}
.choice-card:hover{background:rgba(255,212,94,.12);transform:translateY(-1px);box-shadow:0 0 16px rgba(255,215,110,.2),inset 0 1px 0 rgba(255,255,255,.12)}
.choice-card:active{transform:translateY(1px) scale(.98)}
.choice-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.choice-card .cc-ico{width:23px;height:23px;flex:0 0 auto;color:#FFD86B}
.choice-card .cc-ico path,.choice-card .cc-ico circle{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.choice-card .cc-ico.fill path{fill:currentColor;stroke:none}
.choice-card .cc-ico{filter:drop-shadow(0 0 5px rgba(255,220,120,.3))}
.choice-card .cc-ico.fill{filter:drop-shadow(0 0 6px rgba(255,210,90,.5))}
.choice-card .cc-text{font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:rgba(232,224,255,.85);white-space:nowrap}
.choice-card .cc-check{display:none}
.choice-card.sel{background:rgba(255,212,94,.16)}
/* "sep" variant: same glass look as the dock tabs, but each option is its OWN
   floating card (shape-guess + reason questions), not one joined tray */
.choice-tray.sep{background:transparent;border:0;box-shadow:none;backdrop-filter:none;-webkit-backdrop-filter:none;
  padding:0;gap:12px;flex-wrap:wrap;justify-content:center;max-width:min(94vw,760px)}
.choice-tray.sep .choice-card{height:auto;min-height:58px;padding:10px 20px;border-radius:16px;
  background:linear-gradient(180deg,rgba(30,17,56,.78),rgba(48,26,76,.58));border:1px solid rgba(255,234,185,.42);
  backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 16px 40px rgba(0,0,0,.36),0 0 13px rgba(255,233,180,.26),0 0 26px rgba(168,85,247,.20),inset 0 1px 0 rgba(255,255,255,.13)}
.choice-tray.sep .choice-card:hover{background:linear-gradient(180deg,rgba(255,212,94,.18),rgba(48,26,76,.66))}
.choice-tray.sep .choice-card .cc-text{white-space:normal;text-transform:none;font-size:13.5px;line-height:1.3;max-width:210px}
/* Hint tab pulses after the first wrong attempt */
.discover-dock .seg.attn{background:rgba(255,212,94,.14);animation:segPulse 1.4s ease-in-out infinite}
@keyframes segPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,212,94,.55)}50%{box-shadow:0 0 16px 5px rgba(255,212,94,.45)}}
/* Hint taken: the stars that belong to the pattern turn DARK BLUE and shine
   steadily (twinkle off, full brightness) until traced gold */
.tracefield .starnode.traceblue:not(.used) .starshape{fill:#1e4fd6;stroke:#6ea3ff;
  animation:none !important;opacity:1;
  filter:drop-shadow(0 0 3px #2f6bff) drop-shadow(0 0 9px rgba(47,107,255,.95))}
/* Hint mode: the NEXT line to connect glows blue (re-targets to the selected star) */
.tracefield .hintpath{stroke:#4f8bff;stroke-width:1.5;stroke-linecap:round;
  animation:hintPathGlow 1.2s ease-in-out infinite}
@keyframes hintPathGlow{
  0%,100%{opacity:.65;filter:drop-shadow(0 0 2px #2f6bff) drop-shadow(0 0 6px rgba(47,107,255,.7))}
  50%{opacity:1;filter:drop-shadow(0 0 4px #6ea3ff) drop-shadow(0 0 12px rgba(47,107,255,1))}}
/* reason check: wrong answer vibrates with a red glow; the right one glows green */
.choice-tray.sep .choice-card.wrong{animation:choiceShake .5s ease;border-color:rgba(255,110,110,.9);
  background:linear-gradient(180deg,rgba(120,30,40,.80),rgba(70,20,32,.62));
  box-shadow:0 0 16px 4px rgba(255,80,80,.55),inset 0 1px 0 rgba(255,255,255,.10)}
@keyframes choiceShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(7px)}
  45%{transform:translateX(-5px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
.choice-tray.sep .choice-card.right{border-color:rgba(131,232,178,.95);
  background:linear-gradient(180deg,rgba(30,96,64,.82),rgba(20,64,44,.66));
  box-shadow:0 0 18px 5px rgba(131,232,178,.55),inset 0 1px 0 rgba(255,255,255,.12)}
/* 12s of inactivity: the constellation's starting star pulses with a blue glow */
.tracefield .starnode.startglow .starshape{fill:#9fd4ff;stroke:#e6f4ff;
  animation:blueStartPulse 1.2s ease-in-out infinite !important;transform-box:fill-box;transform-origin:center}
@keyframes blueStartPulse{
  0%,100%{transform:scale(1);opacity:1;filter:drop-shadow(0 0 3px #4fa8ff) drop-shadow(0 0 8px rgba(80,160,255,.8))}
  50%{transform:scale(1.6);opacity:1;filter:drop-shadow(0 0 6px #8cc6ff) drop-shadow(0 0 16px rgba(80,160,255,1))}}

/* ---------- desktop fit: keep every page inside one screen ----------
   On a desktop the whole app is locked to the viewport height so that
   buttons, cues and controls stay in view — kids never have to scroll
   down to find them. The big visual area (star field / card grid) is the
   part that flexes or scrolls, not the page. */
@media (min-width:761px){
  html,body{overflow:hidden}
  #app{height:100vh;height:100dvh;max-height:100dvh}
  #screen{overflow:hidden}
  .scene{min-height:0}
  /* activity pages: fit to screen; scroll inside this box only if truly needed */
  .scene-pad{min-height:0;overflow-y:auto;padding:14px 18px 18px;gap:12px}
  /* hero pages: center, but never clip when content is tall */
  .center{overflow-y:auto;justify-content:safe center}
  /* let the visual areas shrink to share the available height */
  .fieldwrap{min-height:170px}
  .reference{min-height:150px}
  .split{gap:14px}
  /* gallery: the cards scroll, the "Start the Hunt" button stays visible */
  .cards{overflow-y:auto;align-content:start;min-height:0;flex:0 1 auto}
  /* tighten the dialogue bubble so it doesn't crowd out the controls */
  .scene-pad .dialogue{padding:12px 16px}
  .scene-pad .dialogue .line{font-size:19px}
}
/* short desktop windows (e.g. Chromebook, ~700px usable): trim vertical rhythm */
@media (min-width:761px) and (max-height:740px){
  .scene-pad{gap:10px;padding:10px 18px 12px}
  .fieldwrap{min-height:140px}
  .reference{min-height:120px}
  .scene-pad .dialogue .avatar{width:48px;height:48px}
  /* gallery card: shrink the constellation diagram so the whole card fits */
  .gdiagram svg{height:150px}
  .gcard{padding:12px 18px 12px;gap:6px}
  .gcard .gwhy{font-size:14px}
  .duo img{height:clamp(96px,18vh,150px)}
}
/* very short windows: shrink the gallery diagram further still */
@media (min-width:761px) and (max-height:620px){
  .gdiagram svg{height:120px}
  .card svg{height:96px}
}

/* ---------- reduced motion ---------- */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  .twinkle{opacity:.7!important}
}

/* ============================================================
   HOME / TITLE SCREEN  (Section 1 — premium night-sky opening)
   Self-contained, offline, CSS/JS only. Built by SCENES.start.
   Honours prefers-reduced-motion (global block above) and the
   existing sound toggle (state.narrationOn). Touches nothing in
   the learning flow, park, or game screens.
   ============================================================ */
.home-scene{position:relative;flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}

/* ---- deep space sky: magenta / violet glow over dark indigo (poster style) ---- */
.home-sky{position:absolute;inset:0;overflow:hidden;z-index:0;
  background:
    radial-gradient(90% 70% at 78% 20%, rgba(198,62,172,.30), transparent 55%),
    radial-gradient(80% 65% at 12% 68%, rgba(126,62,205,.27), transparent 60%),
    radial-gradient(70% 55% at 42% 40%, rgba(10,6,24,.8), transparent 70%),
    linear-gradient(160deg,#0d0722 0%,#110829 45%,#050311 100%)}
.home-sky,.home-content{transition:transform 1s cubic-bezier(.3,.7,.2,1)}

/* full-screen looping video background for the entry screen (sits over the
   gradient sky fallback, under the title/tagline/button) */
.home-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;
  background:#050311;transition:transform 1s cubic-bezier(.3,.7,.2,1)}
/* soft dark tint top & bottom so the white logo type and gold button stay readable */
.home-vidtint{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,rgba(5,3,17,.45) 0%,transparent 24%,transparent 52%,rgba(5,3,17,.60) 100%)}

/* soft moon glow, top-right corner */
.home-moon{position:absolute;top:-70px;right:-46px;width:clamp(180px,26vw,300px);height:clamp(180px,26vw,300px);
  border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 38% 36%,#fff9ea 0%,#ffe7a6 16%,rgba(255,221,150,.34) 44%,transparent 72%);
  filter:blur(1px)}

/* nebula / cloud glow layers (slow drift) — deep violet, crimson-magenta, reddish
   pink and cool cyan clouds, matching the Glow-Box entry screen */
/* the glow sits off-centre in each cloud, so the slow full rotation reads as a swirl */
.home-nebula{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;pointer-events:none}
.home-nebula.n1{width:64vw;height:64vw;left:-12vw;top:-14vw;
  background:radial-gradient(circle at 38% 42%,rgba(98,66,238,.62),transparent 66%);animation:homeNeb 46s linear infinite}
.home-nebula.n2{width:60vw;height:60vw;right:-14vw;bottom:-18vw;
  background:radial-gradient(circle at 60% 38%,rgba(208,44,152,.58),transparent 66%);animation:homeNeb 54s linear infinite reverse}
.home-nebula.n3{width:52vw;height:52vw;right:-10vw;top:-12vw;
  background:radial-gradient(circle at 42% 58%,rgba(238,70,122,.5),transparent 64%);animation:homeNeb 50s linear 3s infinite}
.home-nebula.n4{width:46vw;height:46vw;left:-8vw;bottom:-14vw;
  background:radial-gradient(circle at 58% 44%,rgba(255,110,180,.32),transparent 64%);animation:homeNeb 58s linear 6s infinite reverse}
.home-nebula.n5{width:40vw;height:40vw;left:30vw;top:30vh;
  background:radial-gradient(circle at 40% 40%,rgba(76,50,182,.42),transparent 66%);animation:homeNeb 62s linear 9s infinite}
.home-nebula.n6{width:38vw;height:38vw;left:6vw;top:4vh;
  background:radial-gradient(circle at 56% 42%,rgba(72,206,235,.34),transparent 64%);animation:homeNeb 52s linear 4s infinite reverse}
.home-nebula.n7{width:34vw;height:34vw;right:8vw;bottom:6vh;
  background:radial-gradient(circle at 44% 56%,rgba(60,190,220,.28),transparent 64%);animation:homeNeb 60s linear 11s infinite}
@keyframes homeNeb{0%{transform:translate(0,0) rotate(0deg) scale(1)}
  50%{transform:translate(3%,-3%) rotate(180deg) scale(1.08)}
  100%{transform:translate(0,0) rotate(360deg) scale(1)}}
/* milky-way galaxy band: wide hazy ribbon + brighter cyan-tinted core */
.home-dustband{position:absolute;left:-20%;right:-20%;top:16%;height:60%;transform:rotate(-14deg);
  filter:blur(44px);opacity:.6;pointer-events:none;
  background:linear-gradient(110deg,transparent 0%,rgba(214,150,255,.11) 26%,
    rgba(244,130,222,.18) 50%,rgba(214,150,255,.11) 74%,transparent 100%)}
.home-dustband2{position:absolute;left:-20%;right:-20%;top:34%;height:22%;transform:rotate(-14deg);
  filter:blur(26px);opacity:.5;pointer-events:none;
  background:linear-gradient(110deg,transparent 0%,rgba(150,225,255,.10) 30%,
    rgba(190,240,255,.16) 50%,rgba(150,225,255,.10) 70%,transparent 100%)}
/* a second, fainter galaxy arm crossing the other way */
.home-dustband3{position:absolute;left:-20%;right:-20%;top:8%;height:46%;transform:rotate(17deg);
  filter:blur(40px);opacity:.4;pointer-events:none;
  background:linear-gradient(70deg,transparent 0%,rgba(190,160,255,.09) 30%,
    rgba(230,140,235,.14) 50%,rgba(190,160,255,.09) 70%,transparent 100%)}

/* hundreds of tiny background stars */
.home-starlayer,.home-biglayer,.home-flylayer,.home-shootlayer{position:absolute;inset:0;pointer-events:none}
.home-star{position:absolute;border-radius:50%;background:#fff;opacity:var(--o,.6);
  box-shadow:0 0 3px rgba(255,255,255,.45);animation:homeTwinkle 3s ease-in-out infinite}
@keyframes homeTwinkle{0%,100%{opacity:calc(var(--o,.6)*.35)}50%{opacity:var(--o,.6)}}

/* a few larger foreground stars with soft glow + 4-point spikes; --g brightens on mouse hover */
.home-bigstar{position:absolute;width:0;height:0;--g:1}
.home-bigstar .bs-core{position:absolute;left:0;top:0;width:6px;height:6px;border-radius:50%;
  transform:translate(-50%,-50%);background:#fff;
  box-shadow:0 0 calc(7px*var(--g)) calc(1px*var(--g)) rgba(255,247,224,.9),
             0 0 calc(22px*var(--g)) calc(6px*var(--g)) rgba(255,212,94,.5);
  transition:box-shadow .35s ease;animation:homeBig 4s ease-in-out infinite}
.home-bigstar::before,.home-bigstar::after{content:"";position:absolute;left:0;top:0;
  transform:translate(-50%,-50%);opacity:calc(.45*var(--g));transition:opacity .35s ease;
  background:linear-gradient(90deg,transparent,rgba(255,247,224,.85),transparent)}
.home-bigstar::before{width:calc(34px*var(--g));height:2px}
.home-bigstar::after{width:2px;height:calc(34px*var(--g))}
@keyframes homeBig{0%,100%{filter:none}50%{filter:brightness(1.25)}}

/* firefly-like floating sparkles */
.home-fly{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffe9a8;
  box-shadow:0 0 6px 2px rgba(255,212,94,.7);opacity:.7;
  animation:homeFly var(--d,9s) ease-in-out infinite}
@keyframes homeFly{0%{transform:translate(0,0);opacity:.15}50%{transform:translate(var(--dx,0),var(--dy,-40px));opacity:.85}100%{transform:translate(0,0);opacity:.15}}

/* occasional shooting star */
.home-shoot{position:absolute;width:150px;height:2px;border-radius:2px;transform-origin:left center;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.95));
  filter:drop-shadow(0 0 6px #fff);opacity:0;animation:homeShoot 1.15s ease-out forwards}
.home-shoot::after{content:"";position:absolute;right:-2px;top:50%;width:5px;height:5px;border-radius:50%;
  transform:translateY(-50%);background:#fff;box-shadow:0 0 8px 2px #fff}
@keyframes homeShoot{0%{opacity:0;transform:translate(0,0) rotate(20deg) scaleX(.3)}
  12%{opacity:1}100%{opacity:0;transform:translate(58vw,24vh) rotate(20deg) scaleX(1)}}

/* ---- foreground content (title / characters / button) ---- */
.home-content{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:clamp(10px,2.4vh,28px);
  padding:clamp(18px,5vh,46px) 20px;text-align:center;min-height:0}

/* title: heavy squared sci-fi logotype (Star-Wars-poster style), plain white.
   It flies in from deep space — tiny, blurred, far away — and lands on screen. */
.home-title-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.home-title{margin:0;font-family:'Orbitron',var(--font);font-weight:900;line-height:1.08;
  color:#ffffff;text-transform:uppercase;letter-spacing:.12em;
  font-size:clamp(26px,5.6vw,64px);
  text-shadow:0 0 26px rgba(222,120,255,.5),0 2px 8px rgba(0,0,0,.65);
  animation:fromSpace 1.6s cubic-bezier(.2,.8,.25,1) .2s both}
.home-tag{margin:0;color:#d9d2f5;font-size:clamp(14px,2.4vw,21px);font-weight:700;
  animation:fromSpace 1.5s cubic-bezier(.2,.8,.25,1) .9s both}
@keyframes fromSpace{
  0%{opacity:0;transform:scale(.06);filter:blur(8px)}
  60%{opacity:1;filter:blur(0)}
  82%{transform:scale(1.05)}
  100%{opacity:1;transform:scale(1);filter:blur(0)}}
@keyframes homeFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* characters — alive, not static stickers */
.home-chars{display:flex;align-items:flex-end;justify-content:center;gap:clamp(4px,3vw,36px);
  opacity:0;animation:homeFadeUp 1s ease 1s forwards}
.home-char{width:auto;filter:drop-shadow(0 12px 24px rgba(0,0,0,.5));transform-origin:bottom center}
/* Kabir's SVG has whitespace around the character, so he needs a larger box to
   visually match Meera. Negative margin pulls his feet down to Meera's baseline. */
.home-char.kabir{height:clamp(190px,42vh,420px);margin-bottom:-7.4vh;margin-right:-3vw;position:relative;left:-10vw;animation:homeKabirIdle 5.4s ease-in-out infinite}
.home-char.meera{height:clamp(140px,30vh,300px);animation:homeMeeraIdle 5.4s ease-in-out infinite}
/* both characters: a calm up-and-down float, no side-to-side tilt */
@keyframes homeKabirIdle{0%{transform:translateY(0) scaleY(1)}
  50%{transform:translateY(-6px) scaleY(1.012)}100%{transform:translateY(0)}}
@keyframes homeMeeraIdle{0%{transform:translateY(0) scaleY(1)}
  50%{transform:translateY(-6px) scaleY(1.015)}100%{transform:translateY(0)}}

/* ---- the Start button: appears once the title has landed, with a soft glow ---- */
.home-start{position:relative;font-family:var(--font);font-weight:900;cursor:pointer;
  font-size:clamp(20px,2.8vw,28px);color:#3a2600;border:none;border-radius:var(--pill);
  padding:clamp(15px,2.2vh,22px) clamp(38px,6vw,64px);min-height:60px;
  background:linear-gradient(180deg,#ffe680 0%,#ffd45e 46%,#f4b740 100%);
  opacity:0;transform:translateY(16px);
  animation:homeStartIn .6s cubic-bezier(.2,.9,.2,1) 2.5s forwards,
            homeStartBreathe 2.8s ease-in-out 3.2s infinite;
  transition:transform .18s ease,box-shadow .25s ease,filter .2s ease}
@keyframes homeStartIn{to{opacity:1;transform:none}}
@keyframes homeStartBreathe{
  0%,100%{transform:scale(1);box-shadow:0 8px 20px rgba(244,183,64,.35),0 0 8px 2px rgba(255,212,94,.16),inset 0 2px 6px rgba(255,255,255,.55)}
  50%{transform:scale(1.03);box-shadow:0 10px 24px rgba(244,183,64,.4),0 0 14px 3px rgba(255,212,94,.26),inset 0 2px 6px rgba(255,255,255,.55)}}
.home-start:hover,.home-start:focus-visible{animation-play-state:paused;transform:translateY(-3px) scale(1.05);filter:brightness(1.05);
  box-shadow:0 12px 28px rgba(244,183,64,.45),0 0 20px 5px rgba(255,212,94,.3),inset 0 2px 6px rgba(255,255,255,.6)}
.home-start:focus-visible{outline:3px solid #fff;outline-offset:4px}
.home-start:active{transform:translateY(0) scale(.98)}
/* click: compress then bounce */
.home-start.clicked{animation:homeStartClick .5s ease}
@keyframes homeStartClick{0%{transform:scale(1)}25%{transform:scale(.92)}55%{transform:scale(1.08)}100%{transform:scale(1)}}

/* click sparkle burst */
.home-burst{position:absolute;z-index:25;pointer-events:none}
.burst-spark{position:absolute;left:0;top:0;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle,#fff,#ffd45e);box-shadow:0 0 8px #ffd45e;pointer-events:none;
  animation:homeBurst .8s ease-out forwards}
@keyframes homeBurst{0%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(calc(-50% + var(--bx,0)),calc(-50% + var(--by,0))) scale(.2);opacity:0}}

/* small, low-priority circular audio toggle (chrome is hidden on the home screen) */
.home-audio{position:absolute;top:16px;right:16px;z-index:20;
  width:48px;height:48px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  color:var(--text);background:rgba(20,26,60,.55);border:1px solid var(--indigo-line);
  box-shadow:0 0 14px rgba(120,140,255,.25);backdrop-filter:blur(4px);transition:transform .15s ease,box-shadow .2s ease}
.home-audio:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(150,170,255,.45)}
.home-audio:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.home-audio.off{filter:grayscale(.7) brightness(.85)}

/* cinematic transition: stars brighten, gentle zoom up, star-glow flash */
.home-flash{position:absolute;inset:0;z-index:30;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 58%,rgba(255,247,224,.95),rgba(255,221,150,.55) 36%,rgba(20,26,60,0) 76%);
  transition:opacity .8s ease}
.home-scene.igniting .home-sky,.home-scene.igniting .home-video,.home-scene.igniting .home-content{transform:scale(1.12) translateY(-3%)}
.home-scene.igniting .home-flash{opacity:1}
.home-scene.igniting .home-star{opacity:1}
.home-scene.igniting .home-bigstar{--g:2.6}

@media (prefers-reduced-motion: reduce){
  .home-title,.home-tag,.home-chars,.home-start{opacity:1!important;transform:none!important}
}

/* ============================================================
   MISSION HUNT — premium "sky explorer" redesign (Activity 1)
   Scoped to .hunt-stage / .huntfield / journal / cards / coach.
   Pure CSS/JS, offline. Honours prefers-reduced-motion. The star
   field engine, shape recognition and scoring are UNTOUCHED — these
   are atmosphere/feedback layers built on top by SCENES.hunt.
   ============================================================ */
.hunt-stage{position:relative;overflow:hidden}

/* ---- immersive night sky ---- */
/* ===== .space-background : dreamy purple cosmic night sky (base + nebula, CSS only) =====
   Layer 1 base: black + dark navy + deep purple.  Layer 2 nebula: soft magenta/purple
   radial glows, richer toward the upper-right.  Centre kept slightly darker so the
   interactive constellation stars stay readable. */
.huntfield{position:absolute;inset:0;z-index:0;overflow:hidden;
  background:
    radial-gradient(58% 50% at 50% 54%, rgba(0,0,6,.52), transparent 70%),       /* darker centre */
    radial-gradient(72% 60% at 86% 8%,  rgba(198,74,196,.16), transparent 62%),   /* magenta — upper right */
    radial-gradient(64% 58% at 94% 48%, rgba(132,60,206,.17), transparent 64%),   /* purple — right */
    radial-gradient(56% 50% at 12% 18%, rgba(116,66,206,.18), transparent 60%),   /* purple — upper left */
    radial-gradient(52% 46% at 22% 88%, rgba(176,58,170,.15), transparent 64%),   /* magenta — lower left */
    linear-gradient(160deg, #160e30 0%, #0c0a24 42%, #070614 74%, #020207 100%)}  /* deep space base */
.huntfield svg.field{position:relative;z-index:2;animation:huntFieldIn .8s ease both}
@keyframes huntFieldIn{from{opacity:0}to{opacity:1}}
/* drifting, fading nebula clouds (added by JS, sit behind the field) */
.hunt-neb{position:absolute;border-radius:50%;filter:blur(64px);pointer-events:none;z-index:0;mix-blend-mode:screen}
.hunt-neb.a{width:58vw;height:58vw;right:-14vw;top:-16vw;left:auto;
  background:radial-gradient(circle,rgba(196,76,202,.28),transparent 66%);animation:huntNebA 34s ease-in-out infinite}
.hunt-neb.b{width:52vw;height:52vw;right:-12vw;bottom:-16vw;
  background:radial-gradient(circle,rgba(132,64,212,.40),transparent 66%);animation:huntNebB 42s ease-in-out infinite}
.hunt-neb.c{width:44vw;height:44vw;left:6vw;top:38vh;
  background:radial-gradient(circle,rgba(176,66,176,.28),transparent 64%);animation:huntNebC 48s ease-in-out infinite}
@keyframes huntNebA{0%,100%{transform:translate(0,0) scale(1);opacity:.22}50%{transform:translate(4%,-3%) scale(1.12);opacity:.42}}
@keyframes huntNebB{0%,100%{transform:translate(0,0) scale(1.05);opacity:.52}50%{transform:translate(-4%,3%) scale(.95);opacity:.24}}
@keyframes huntNebC{0%,100%{transform:translate(-3%,2%) scale(.9);opacity:.16}50%{transform:translate(4%,-3%) scale(1.16);opacity:.42}}
/* faint, slowly-rotating galaxy band — removed (its conic arcs read as a white centre glow/spokes) */
.hunt-galaxy{display:none;position:absolute;left:50%;top:50%;width:135vmax;height:135vmax;transform:translate(-50%,-50%);
  pointer-events:none;z-index:0;opacity:.55;mix-blend-mode:screen;filter:blur(2px);
  background:
    radial-gradient(closest-side at 50% 50%,rgba(120,150,255,.10),transparent 70%),
    conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,rgba(150,130,230,.10) 42deg,transparent 92deg,
      transparent 184deg,rgba(110,160,235,.12) 226deg,transparent 286deg,transparent 360deg);
  animation:huntGalaxy 150s linear infinite}
@keyframes huntGalaxy{from{transform:translate(-50%,-50%) rotate(0)}to{transform:translate(-50%,-50%) rotate(360deg)}}
/* .nebula-layer (wisps) — TWO crossing layers of soft lavender/magenta cloud filaments.
   Each layer's puffs are placed along a gentle ARC (not a straight line) and the two
   layers sit at different angles, so they read as flowing, overlapping mist — not stripes. */
.huntfield.amb::before,.tracefield.amb::before{content:"";position:absolute;inset:-8%;pointer-events:none;z-index:0;
  opacity:.62;transform:rotate(-7deg);filter:blur(8px);
  background:
    radial-gradient(22% 6%   at 6% 30%,  rgba(220,196,255,.17), transparent 73%),   /* upper-left wisp (curve start) */
    radial-gradient(20% 5.5% at 18% 16%, rgba(255,196,238,.14), transparent 74%),    /* upper-left wisp (curve up) */
    radial-gradient(34% 7%   at 12% 47%, rgba(228,205,255,.20), transparent 72%),
    radial-gradient(28% 6%   at 33% 54%, rgba(255,190,236,.15), transparent 73%),
    radial-gradient(34% 6.5% at 55% 48%, rgba(212,182,255,.19), transparent 72%),
    radial-gradient(26% 6%   at 76% 40%, rgba(245,202,246,.14), transparent 73%),
    radial-gradient(22% 5.5% at 93% 32%, rgba(226,198,255,.12), transparent 74%);
  animation:nebWispA 70s ease-in-out infinite}
.huntfield.amb::after,.tracefield.amb::after{content:"";position:absolute;inset:-8%;pointer-events:none;z-index:0;
  opacity:.5;transform:rotate(-26deg);filter:blur(9px);
  background:
    radial-gradient(22% 6%   at 13% 10%, rgba(226,200,255,.14), transparent 74%),   /* upper-left corner wisp */
    radial-gradient(24% 6%   at 10% 18%, rgba(244,206,250,.14), transparent 74%),
    radial-gradient(30% 6%   at 26% 30%, rgba(231,205,255,.16), transparent 73%),
    radial-gradient(38% 5.5% at 50% 41%, rgba(255,186,234,.13), transparent 74%),
    radial-gradient(30% 7%   at 71% 51%, rgba(208,178,255,.16), transparent 73%),
    radial-gradient(24% 6%   at 89% 61%, rgba(238,198,255,.12), transparent 74%);
  animation:nebWispB 58s ease-in-out infinite}
@keyframes nebWispA{0%,100%{transform:rotate(-7deg) translate(0,0)}50%{transform:rotate(-5.5deg) translate(2%,-1.5%)}}
@keyframes nebWispB{0%,100%{transform:rotate(-26deg) translate(0,0)}50%{transform:rotate(-28deg) translate(-2%,1.5%)}}
/* floating particles + shooting star reuse the home keyframes */
.hunt-fly{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(216,228,255,.92);
  box-shadow:0 0 5px 1px rgba(170,195,255,.45);opacity:.45;pointer-events:none;animation:homeFly var(--d,9s) ease-in-out infinite}
.hunt-shoot{position:absolute;width:130px;height:2px;border-radius:2px;transform-origin:left center;pointer-events:none;z-index:1;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.9));filter:drop-shadow(0 0 6px #fff);opacity:0;animation:homeShoot 1.15s ease-out forwards}

/* ---- decorative star dust in the empty right strip below the mission tablet:
   purely ambient — dim, small, slow, never interactive, never competes with play ---- */
.hunt-dustfield{position:absolute;pointer-events:none;z-index:1;overflow:hidden}
.hunt-dust{position:absolute;border-radius:50%;background:rgba(198,212,255,.6);pointer-events:none;
  box-shadow:0 0 3px rgba(170,195,255,.35);animation:dustTw var(--dt,5s) ease-in-out infinite}
@keyframes dustTw{0%,100%{opacity:.06}50%{opacity:.3}}
/* soft nebula + whitish glow (same family as the centre glow) behind the right-side dust */
.hunt-dustglow{position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(40px);
  background:radial-gradient(circle,rgba(206,220,255,.16),rgba(150,130,230,.10) 46%,rgba(96,170,220,.06) 64%,transparent 74%);
  animation:dustGlow 18s ease-in-out infinite}
@keyframes dustGlow{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.8;transform:scale(1.06)}}

/* ---- magical interactive stars (tiered glow) ---- */
.huntfield .field .starshape{fill:#fdfdff;stroke:#fff;stroke-width:.2;transform-box:fill-box;transform-origin:center;
  filter:drop-shadow(0 0 1px rgba(255,255,255,.85)) drop-shadow(0 0 2px rgba(150,190,255,.45));
  transition:fill .15s,filter .2s,transform .15s;animation:huntTw 3.4s ease-in-out infinite}
.huntfield .field .starnode:nth-child(2n) .starshape{animation-duration:4.2s;animation-delay:.6s}
.huntfield .field .starnode:nth-child(3n) .starshape{animation-duration:2.8s;animation-delay:1.2s}
@keyframes huntTw{0%,100%{opacity:.66}50%{opacity:1}}
.huntfield .field .starnode.bright .starshape{fill:#fff7d6;
  filter:drop-shadow(0 0 1.4px rgba(255,236,170,.9)) drop-shadow(0 0 4px rgba(255,210,90,.6))}
.huntfield .field .starnode:hover .starshape,
.huntfield .field .starnode.near .starshape{fill:var(--gold);stroke:#fff6cf;transform:scale(1.25);
  filter:drop-shadow(0 0 3px var(--gold)) drop-shadow(0 0 8px var(--gold-deep))}
.huntfield .field .starnode.sel .starshape{fill:var(--gold);stroke:#fff;
  filter:drop-shadow(0 0 4px var(--gold)) drop-shadow(0 0 10px var(--gold-deep))}
/* used stars keep a soft golden glow = visible progress */
.huntfield .field .starnode.used .starshape{fill:var(--gold);stroke:#fff6cf;
  filter:drop-shadow(0 0 2px var(--gold)) drop-shadow(0 0 5px rgba(255,210,90,.55))}
/* decorative background stars — soft, small, no glow, no hover, not tappable */
.huntfield .field .starnode.deco{pointer-events:none}
.huntfield .field .starnode.deco .starshape{fill:#cfd9f5;stroke:none;opacity:.3;
  filter:none;transform:scale(.75);animation:huntTwSoft 6s ease-in-out infinite}
.huntfield .field .starnode.deco:hover .starshape{fill:#cfd9f5;transform:scale(.75);filter:none}
@keyframes huntTwSoft{0%,100%{opacity:.18}50%{opacity:.34}}
/* intro: stars pulse once to invite a tap (decorative stars sit still) */
.huntfield .field.intro .starnode:not(.deco) .starshape{animation:huntIntroPulse 1.1s ease 1}
@keyframes huntIntroPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.55)}}
/* click ripple + sparkle bursts (SVG, added by JS) */
.hunt-ripple{fill:none;stroke:var(--gold);stroke-width:.6;opacity:.9;transform-box:fill-box;transform-origin:center;animation:huntRipple .6s ease-out forwards}
@keyframes huntRipple{from{transform:scale(.3);opacity:.9}to{transform:scale(2.8);opacity:0}}
.hunt-spark{fill:#fff3c4;transform-box:fill-box;transform-origin:center;animation:huntSparkAnim .7s ease-out forwards}
@keyframes huntSparkAnim{0%{transform:scale(.2);opacity:1}100%{transform:translate(var(--sx,0),var(--sy,0)) scale(1);opacity:0}}
.hunt-trav{fill:#FFE8A3;opacity:.85;filter:drop-shadow(0 0 2px #FFD76A) drop-shadow(0 0 5px rgba(255,215,106,.8))}

/* ---- magical golden lines ---- */
.huntfield .field .edge{stroke:#FFE8A3;stroke-width:.9;stroke-linecap:round;opacity:.82;
  filter:drop-shadow(0 0 2px #FFD76A) drop-shadow(0 0 5px rgba(255,215,106,.7))}
.huntfield .field .edge.draw{animation:huntDraw .35s ease-out both}
@keyframes huntDraw{from{stroke-dasharray:160;stroke-dashoffset:160}to{stroke-dashoffset:0}}
.huntfield .field.shape-celebrate .edge{filter:drop-shadow(0 0 4px #FFE8A3) drop-shadow(0 0 12px #FFD76A) drop-shadow(0 0 18px rgba(255,215,106,.85))}

/* ============================================================
   EXPLORER MISSION TABLET — premium glass astronomy dashboard
   ============================================================ */
.mission-panel{position:absolute;right:16px;top:30vh;left:auto;z-index:6;
  width:235px;max-height:calc(100% - 30vh - 110px);
  display:flex;flex-direction:column;gap:9px;padding:13px 15px;border-radius:18px;overflow:hidden;
  background:linear-gradient(180deg,rgba(30,17,56,.80),rgba(48,26,76,.60));
  border:1px solid rgba(190,140,255,.26);backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 16px 38px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.08),0 0 18px rgba(168,85,247,.14);
  animation:journalIn .7s cubic-bezier(.2,.8,.2,1) both}
/* spaceship-console flourishes: a glowing gradient ring around the WHOLE boundary + a soft scanline glow up top */
.mission-panel::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:2px;pointer-events:none;z-index:1;
  background:linear-gradient(135deg,#a78bfa,#e879f9,#facc15,#a78bfa);background-size:300% 300%;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;
  opacity:.78;filter:drop-shadow(0 0 6px rgba(168,85,247,.45));animation:panelEdge 9s linear infinite}
@keyframes panelEdge{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.mission-panel::after{content:"";position:absolute;left:0;right:0;top:0;height:46px;pointer-events:none;
  background:radial-gradient(120% 100% at 50% 0,rgba(190,110,255,.18),transparent 70%)}
@keyframes journalIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}

/* header: [icon] Explorer Mission / Shape Hunt ............ 0/7 */
.mp-head{display:flex;align-items:center;gap:10px}
.mp-ico{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:12px;flex:0 0 auto;font-size:18px;
  background:linear-gradient(180deg,rgba(168,139,250,.32),rgba(232,121,249,.22));border:1px solid rgba(200,150,255,.42);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.20),0 0 16px rgba(168,85,247,.34)}
.mp-headtext{flex:1;min-width:0}
.mp-title{font-size:18px;font-weight:800;color:#f8fafc;letter-spacing:-.02em;line-height:1.05}
.mp-sub{font-size:11px;color:rgba(226,232,240,.7);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.mp-count{flex:0 0 auto;font-size:15px;font-weight:900;color:rgba(226,232,240,.85);
  background:rgba(168,85,247,.16);border:1px solid rgba(200,150,255,.30);border-radius:999px;padding:3px 11px}
.mp-count b{color:#fde68a}

/* progress: just the glowing bar, count lives in the header */
.progress-track{height:9px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.3)}
.progress-fill{height:100%;width:0;border-radius:999px;
  background:linear-gradient(90deg,#facc15,#e879f9,#a78bfa);background-size:200% 100%;
  box-shadow:0 0 11px rgba(168,85,247,.34);transition:width 450ms cubic-bezier(.2,.8,.2,1);animation:progShift 7s linear infinite}
@keyframes progShift{0%{background-position:0 0}100%{background-position:200% 0}}
.progress-fill.bump{animation:progShift 7s linear infinite,progBump .55s ease}
@keyframes progBump{0%{filter:brightness(1)}40%{filter:brightness(1.55)}100%{filter:brightness(1)}}

/* current mission — "Current Mission" label + the glowing shape icon */
.current-strip{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 11px;border-radius:12px;
  background:radial-gradient(circle at top right,rgba(250,204,21,.16),transparent 62%),linear-gradient(135deg,rgba(30,41,59,.82),rgba(15,23,42,.66));
  border:1px solid rgba(250,204,21,.30);box-shadow:0 0 13px rgba(250,204,21,.08),inset 0 1px 0 rgba(255,255,255,.09);
  animation:cardIn .5s ease both}
.cur-tag{flex:1;min-width:0;font-size:12px;font-weight:800;color:#fde68a;text-transform:uppercase;letter-spacing:.06em;line-height:1.1}
.cur-icon{flex:0 0 auto;width:34px;height:34px;font-size:24px;color:#fde68a;display:flex;align-items:center;justify-content:center;
  animation:curIconPulse 2.4s ease-in-out infinite}
.cur-icon svg{width:34px;height:34px;overflow:visible;display:block}
@keyframes curIconPulse{0%,100%{filter:drop-shadow(0 0 3px currentColor);transform:scale(1)}50%{filter:drop-shadow(0 0 9px currentColor);transform:scale(1.06)}}

/* mission path — compact visual grid (replaces the long list) */
.mission-path{display:flex;flex-direction:column;gap:9px}
.mission-path-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(226,232,240,.72);padding-left:2px}
.mission-path-grid{display:flex;flex-direction:column;gap:6px}
.mission-path-tile{position:relative;min-height:0;border-radius:11px;border:0;cursor:pointer;padding:7px 11px;
  background:rgba(34,18,60,.42);border:1px solid rgba(180,140,240,.16);
  display:flex;flex-direction:row;align-items:center;justify-content:flex-start;gap:11px;
  transition:transform .16s ease,border-color .16s ease,background .16s ease,opacity .16s ease;animation:cardIn .45s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mission-path-tile .shape-icon{color:#94a3b8;display:flex;flex:0 0 auto}
.shape-icon svg{overflow:visible;display:block}
.mission-path-tile .shape-icon svg{width:22px;height:22px}
.shape-icon svg polygon,.shape-icon svg polyline,.shape-icon svg line,.shape-icon svg path,
.cur-icon svg polygon,.cur-icon svg polyline{
  fill:none;stroke:currentColor;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px currentColor)}
.mission-path-label{flex:1;text-align:left;font-size:13px;font-weight:800;color:rgba(226,232,240,.78);letter-spacing:.01em;line-height:1.1}
.mission-path-tile:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.mission-path-tile:hover{transform:translateY(-2px)}
/* completed */
/* completed: dark violet glass + golden glowing border + soft lavender inner glow */
.mission-path-tile.completed{border-color:rgba(255,216,120,.62);

  50%{box-shadow:0 0 22px rgba(255,221,130,.58),inset 0 0 18px rgba(206,170,255,.46),inset 0 1px 0 rgba(255,255,255,.12)}}
.mission-path-tile.completed .shape-icon{color:#ffe6ad}
.mission-path-tile.completed .mission-path-label{color:#ece0ff}
.mp-tile-check{position:absolute;top:50%;right:9px;transform:translateY(-50%);width:19px;height:19px;border-radius:50%;display:none;
  align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#3a2a00;

.mission-path-tile.completed .mp-tile-check{display:flex}
/* current */
.mission-path-tile.current{border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.10);
  box-shadow:0 0 14px rgba(250,204,21,.14);animation:cardIn .45s ease both,currentMissionPulse 2.6s ease-in-out infinite}
.mission-path-tile.current .shape-icon{color:#fde68a}
.mission-path-tile.current .mission-path-label{color:#fde68a}
@keyframes currentMissionPulse{0%,100%{box-shadow:0 0 11px rgba(250,204,21,.11)}50%{box-shadow:0 0 18px rgba(250,204,21,.22)}}
.mp-tile-now{position:absolute;top:50%;right:9px;left:auto;transform:translateY(-50%);display:none;
  font-size:8.5px;font-weight:900;letter-spacing:.06em;color:#3a2c00;background:linear-gradient(180deg,#ffe27a,#facc15);
  padding:2px 7px;border-radius:999px;box-shadow:0 0 10px rgba(250,204,21,.5)}
.mission-path-tile.current .mp-tile-now{display:block}
/* locked / upcoming */
.mission-path-tile.locked{opacity:.32}
.mission-path-tile.locked .shape-icon{color:#94a3b8}
@keyframes doneBump{0%{transform:scale(1)}30%{transform:scale(1.05)}100%{transform:scale(1)}}

/* ---- Kabir companion + premium speech bubble ---- */
.coach{position:absolute;left:10px;bottom:-8vh;z-index:7;display:flex;flex-direction:column-reverse;align-items:flex-start;gap:0;
  pointer-events:none;                                  /* never blocks taps on the stars behind it */
  transition:left .6s cubic-bezier(.2,.8,.2,1),bottom .6s,transform .6s;animation:coachIn .6s ease .3s both}
@keyframes coachIn{from{opacity:0;transform:translateY(14px) scale(.92)}to{opacity:1;transform:none}}
/* full-body Kabir, standing on the left as a companion. The PNG is a wide canvas with
   the figure centred, so we crop to the figure with object-fit:cover (never a box/circle). */
.coach .coach-face{width:234px;height:408px;object-fit:cover;object-position:42% 28%;flex:0 0 auto;
  border:0;border-radius:0;background:none;box-shadow:none;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.5)) drop-shadow(0 0 18px rgba(255,212,94,.22))}
.coach.cheer .coach-face{animation:coachCheer .8s ease}
@keyframes coachCheer{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-12px) scale(1.08)}55%{transform:translateY(-4px) scale(1.04)}100%{transform:translateY(0) scale(1)}}
.coach.think .coach-face{animation:coachThink 1s ease}
@keyframes coachThink{0%{transform:rotate(0)}25%{transform:rotate(-6deg)}55%{transform:rotate(5deg)}100%{transform:rotate(0)}}
.coach.excited .coach-face{filter:drop-shadow(0 8px 16px rgba(0,0,0,.5)) drop-shadow(0 0 26px rgba(255,212,94,.55))}
.coach .coach-say{position:relative;display:flex;align-items:flex-start;gap:6px;max-width:min(23vw,208px);
  margin-bottom:-18px;margin-left:14px;                  /* sit just above Kabir's head (small gap, not touching) */
  background:linear-gradient(180deg,#ffffff,#f3f1fb);color:#23204a;border-radius:14px;padding:7px 11px;font-weight:700;
  font-size:clamp(10.5px,.95vw,12.5px);line-height:1.28;border:1px solid rgba(120,110,200,.16);
  box-shadow:0 8px 18px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.85);animation:bubblePop .35s cubic-bezier(.2,1.4,.4,1)}
@keyframes bubblePop{0%{opacity:0;transform:scale(.7) translateY(6px)}100%{opacity:1;transform:none}}
.coach .coach-say .cs-ico{flex:0 0 auto;font-size:13px}
.coach .coach-say:empty{display:none}
.coach .coach-say::after{content:"";position:absolute;left:42px;top:100%;border:8px solid transparent;border-top-color:#f3f1fb}
/* finale: Kabir glides centre and narrates */
.coach.center{left:50%;bottom:50%;transform:translate(-50%,50%);flex-direction:column;align-items:center;text-align:center;animation:none}
.coach.center .coach-face{width:140px;height:140px}
.coach.center .coach-say{max-width:min(78vw,560px);font-size:clamp(16px,2.2vw,24px);order:-1;padding:12px 20px;border-radius:18px}
.coach.center .coach-say::after{display:none}

/* ---- bottom controls hierarchy ---- */
/* bottom controls = one floating glass dock (same language as the panel/badge) */
.hunt-controls{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;z-index:8;
  display:flex;flex-direction:row;gap:7px;align-items:center;justify-content:center;flex-wrap:nowrap;max-width:94%;

  border:1px solid rgba(190,140,255,.24);backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 16px 38px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.08),0 0 18px rgba(168,85,247,.30);
  animation:huntFieldIn .6s ease .2s both}
.hunt-controls .btn{min-height:40px;border-radius:999px;box-shadow:none;
  transition:transform .14s ease,box-shadow .2s ease,border-color .2s,background .25s,opacity .2s}
/* Continue — the single primary golden action */
.hunt-controls .hc-continue{font-size:14px;font-weight:900;padding:9px 22px;min-height:42px;
  box-shadow:0 5px 14px rgba(244,183,64,.36),inset 0 1px 0 rgba(255,255,255,.5)}
.hunt-controls .hc-continue:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(244,183,64,.5),inset 0 1px 0 rgba(255,255,255,.6)}
.hunt-controls .hc-continue[disabled]{filter:grayscale(.5) brightness(.78);box-shadow:none;transform:none}
/* secondary controls — soft, flat, part of the dock (10% larger; glow lives on the dock) */
.hunt-controls .hc-undo,.hunt-controls .hc-clear{font-size:13.5px;font-weight:800;padding:9px 17px;min-height:44px;
  background:rgba(170,130,240,.16);color:#efe7fb;border:1px solid rgba(195,150,255,.22)}
.hunt-controls .hc-undo:hover,.hunt-controls .hc-clear:hover{transform:translateY(-1px);
  background:rgba(255,212,94,.12);border-color:rgba(255,212,94,.4)}
.hunt-controls .hc-skip{background:transparent;color:rgba(255,212,94,.85);border:1px solid rgba(255,212,94,.24);
  font-weight:700;font-size:12px;padding:8px 13px;opacity:.85}
.hunt-controls .hc-skip:hover{opacity:1;transform:translateY(-1px);background:rgba(255,212,94,.08)}
.hunt-controls .btn:active{transform:translateY(1px) scale(.97)}

/* ---- Continue + Skip: a separate, fixed bottom-right dock (not animated) ---- */
/* the dock itself carries the soft glow; the tabs inside stay flat */
.hunt-nav{position:absolute;right:16px;bottom:18px;z-index:8;
  display:flex;flex-direction:row;gap:7px;align-items:center;justify-content:flex-end;padding:8px;border-radius:999px;
  background:linear-gradient(180deg,rgba(30,17,56,.76),rgba(48,26,76,.54));
  border:1px solid rgba(190,140,255,.24);backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 16px 38px rgba(0,0,0,.30),inset 0 1px 0 rgba(255,255,255,.08),0 0 18px rgba(168,85,247,.30)}
.hunt-nav .btn{min-height:44px;border-radius:999px;box-shadow:none;
  transition:transform .14s ease,border-color .2s,background .25s,opacity .2s}
/* Continue — styled exactly like the Undo tab */
.hunt-nav .hc-continue{font-size:13.5px;font-weight:800;padding:9px 17px;
  background:rgba(170,130,240,.16);color:#efe7fb;border:1px solid rgba(195,150,255,.22)}
.hunt-nav .hc-continue:hover{transform:translateY(-1px);background:rgba(255,212,94,.12);border-color:rgba(255,212,94,.4)}
.hunt-nav .hc-continue[disabled]{filter:grayscale(.5) brightness(.78);transform:none;opacity:.7}
/* Skip — soft ghost pill */
.hunt-nav .hc-skip{background:transparent;color:rgba(255,212,94,.85);border:1px solid rgba(255,212,94,.24);
  font-weight:700;font-size:12.5px;padding:9px 16px}
.hunt-nav .hc-skip:hover{opacity:1;transform:translateY(-1px);background:rgba(255,212,94,.08)}
.hunt-nav .btn:active{transform:translateY(1px) scale(.97)}

/* ---- "Shape Found!" celebration + surprise badges ---- */
.hunt-celebrate{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);z-index:12;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
  background:linear-gradient(180deg,rgba(40,48,104,.94),rgba(20,26,62,.96));border:2px solid var(--gold);border-radius:20px;padding:16px 30px;
  box-shadow:0 18px 44px rgba(0,0,0,.5),0 0 40px rgba(255,212,94,.35);animation:celebrateIn 1.4s ease forwards}
.hunt-celebrate .cel-title{font-size:clamp(20px,3vw,30px);font-weight:900;color:var(--gold);text-shadow:0 2px 12px rgba(255,212,94,.4)}
.hunt-celebrate .cel-sub{font-size:16px;font-weight:800;color:var(--green)}
@keyframes celebrateIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.06)}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}
.hunt-surprise{position:absolute;left:50%;top:19%;transform:translateX(-50%);z-index:11;pointer-events:none;
  display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,#fff,#ffeec2);color:#5a3b00;font-weight:900;font-size:15px;
  border-radius:999px;padding:8px 18px;border:2px solid var(--gold-deep);box-shadow:0 10px 26px rgba(0,0,0,.4);animation:surpriseIn 1.6s ease forwards}
@keyframes surpriseIn{0%{opacity:0;transform:translateX(-50%) translateY(-14px) scale(.7)}16%{opacity:1;transform:translateX(-50%) translateY(0) scale(1.05)}28%{transform:translateX(-50%) translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* gentle mistake shake (no harsh red) + mission-complete sky glow */
.huntfield.shake{animation:huntShake .42s ease}
@keyframes huntShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
.hunt-stage.complete .huntfield::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(62% 52% at 50% 45%,rgba(255,236,170,.18),transparent 70%);animation:huntSkyGlow 1.2s ease both}
@keyframes huntSkyGlow{from{opacity:0}to{opacity:1}}

/* ---- full-screen HUD overlay (Sky Stars + audio) — top-left of the field ---- */
.hunt-hud{position:absolute;top:18px;left:18px;right:auto;z-index:9;display:flex;align-items:center;gap:10px;animation:huntFieldIn .6s ease .2s both}
.hunt-stars{display:flex;align-items:center;gap:7px;
  background:linear-gradient(180deg,rgba(15,23,42,.74),rgba(30,41,59,.52));border:1px solid rgba(125,211,252,.20);
  padding:6px 13px;border-radius:999px;font-weight:900;color:var(--gold);
  backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 14px 32px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.09),0 0 12px rgba(255,212,94,.08)}
.hunt-stars .ico{font-size:15px}
.hunt-stars .hl{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.3px}
.hunt-stars .hv{font-size:16px;color:#fff}
.hunt-stars.bump{animation:doneBump .5s ease}
.hunt-audio{width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;
  color:var(--text);background:linear-gradient(180deg,rgba(15,23,42,.7),rgba(30,41,59,.5));border:1px solid rgba(125,211,252,.20);
  backdrop-filter:blur(10px) saturate(1.05);-webkit-backdrop-filter:blur(10px) saturate(1.05);
  box-shadow:0 10px 24px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.09);
  transition:transform .15s,box-shadow .2s}
.hunt-audio:hover{transform:scale(1.06);box-shadow:0 0 20px rgba(150,170,255,.4)}
.hunt-audio:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
.hunt-audio.off{filter:grayscale(.7) brightness(.85)}

/* ---- Mission Hunt responsive: laptops, Chromebooks, short/narrow windows ---- */
@media (max-width:900px){
  .mission-panel{right:10px;top:10px;width:202px;padding:11px 13px;gap:8px;border-radius:16px}
  .coach{left:8px;bottom:-6vh}
  .coach .coach-face{width:180px;height:314px}
  .coach .coach-say{max-width:min(42vw,200px)}
  .hunt-celebrate{padding:14px 22px}
}
/* tablet / phone: dock the mission tablet to the bottom as a drawer — the header,
   progress and the current mission stay visible; the full list scrolls below it */
@media (max-width:620px){
  .mission-panel{right:10px;left:10px;top:auto;bottom:10px;width:auto;max-height:46%;
    flex-direction:column;animation:journalUp .6s cubic-bezier(.2,.8,.2,1) both}
  .coach .coach-say{display:none}                 /* keep Kabir; drop the bubble on very small screens */
  .hunt-controls{gap:7px;bottom:calc(46% + 18px)} /* sit above the bottom drawer */
  .hunt-controls .btn{font-size:12.5px;padding:8px 12px;min-height:42px}
  .hunt-controls .hc-continue{font-size:13.5px;padding:9px 17px;min-height:42px}
  /* the right dock becomes a row stacked just above the Undo/Clear row */
  .hunt-nav{top:auto!important;right:10px;left:10px;width:auto;flex-direction:row;
    bottom:calc(46% + 74px);padding:8px;gap:7px;justify-content:center}
  .hunt-nav .btn{min-height:42px}
  .hunt-hud{top:10px;left:10px;right:auto;gap:7px}
  .hunt-stars{padding:6px 12px;font-size:16px}
  .hunt-stars .hl{display:none}
  .hunt-audio{width:42px;height:42px}
}
@keyframes journalUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@media (max-height:600px){
  .mission-panel{max-height:calc(100% - 150px);top:10px}
  .coach{bottom:-4vh}
  .coach .coach-face{width:133px;height:232px}
  .hunt-controls{bottom:10px}
}

@media (prefers-reduced-motion: reduce){
  .mission-panel,.mission-path-tile,.current-strip,.coach,.huntfield svg.field{opacity:1!important;transform:none!important}
  .cur-icon,.mission-panel,.hunt-nav{animation:none!important}
  .progress-fill,.mission-path-tile.current,.mission-path-tile.completed,.hunt-dust,.hunt-dustglow{animation:none!important}
  .huntfield::before,.huntfield::after,.tracefield::before,.tracefield::after,.hf-star{animation:none!important}
  .hunt-dustglow{opacity:.6!important;transform:none!important}
}

/* ---------- Continue gate: "Spark the Stars" title + tagline ---------- */

   a solid brown 3D drop + a soft golden glow. Reads bright and legible for kids. */
.gate-title{
  font-family:'Fredoka','Baloo 2','Nunito','Segoe UI Rounded',var(--font);
  font-weight:800;text-transform:uppercase;letter-spacing:1px;line-height:.95;margin:0;

  text-shadow:
    0 5px 0 #8A4F16,                     /* solid brown 3D drop */
    0 0 18px rgba(255,209,102,.55),      /* inner glow */
    0 0 36px rgba(255,209,102,.35);      /* soft outer glow */
}
/* Under-text: sentence case, medium-bold, warm cream — dimmed so it supports (not
   competes with) the heading. */
.gate-sub{
  font-family:'Nunito','Segoe UI',var(--font);font-weight:700;margin:0;
  font-size:clamp(15px,2.4vw,24px);line-height:1.6;letter-spacing:.3px;max-width:min(88vw,600px);

.gbg-title{margin:0;font-family:'Orbitron','Fredoka',var(--font);font-weight:900;

  text-shadow:0 0 26px rgba(222,120,255,.5),0 2px 8px rgba(0,0,0,.65);
  animation:fromSpace 1.6s cubic-bezier(.2,.8,.25,1) .2s both;}

  text-shadow:0 2px 8px rgba(0,0,0,.45);
  animation:fromSpace 1.5s cubic-bezier(.2,.8,.25,1) .9s both;}
.gbg-btn{min-height:56px;background:linear-gradient(180deg,#ffe879 0%,#ffd85c 100%);

@keyframes gbgIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes gbgGlow{0%,100%{box-shadow:0 6px 0 rgba(190,120,34,.35)}
