  screen.appendChild(s);

  // Meera's lines: show text + play the matching pre-recorded clip (pass a filename to speak it).
  // onEnd (optional) fires when the clip finishes — used to chain narration without cutting clips off.
  function setSay(t,audio,onEnd){ say.innerHTML='<div class="who"><span class="dc-star" aria-hidden="true">✦</span>Meera</div>'+t;
    if(audio) playLine(audio,onEnd); else if(onEnd) onEnd(); }
  // per-line narration clips (Audio/) — text-only lines below pass no file
  const A_FIND="can you spot this star pattern.wav";
  const A_HINT="follow dotted lines to connect.wav";
  const A_INTEREST="intresting!.wav";
  const A_DIFFERENT="diff people can see diff things in same stars.wav";
  const A_NEXT="lets move to next constellation.wav";
  const A_ALL="you have found all.wav";
  const A_BULB="tap the bulb.wav";
  const A_CLEAR="tap clear and try again.wav";
  const A_FOUND="you found it.wav";
  const A_THOUGHTFUL="what a thoughtful reason.wav";
  const A_EVERYONE="would everyone imagine same or different.wav";
  const SEEN_AUDIO={ cassiopeia:"long ago people saw this as cassiopeia.wav",
                     orion:"people saw this as orion.wav",
                     scorpius:"people saw this as scorpious.wav" };
  const seenAudio=SEEN_AUDIO[c.id]||"";
  const FIND="Can you spot this star pattern?";
  setSay(FIND, A_FIND);
  setStep("spot");

  const aspect=Math.max(1.15,(fieldBox.clientWidth||window.innerWidth)/(fieldBox.clientHeight||window.innerHeight));
  const VBW=Math.round(100*aspect);
  // ONE shared star field for all three hunt constellations — same layout every
  // level; we only pick out the constellation this level asks the child to trace.
  const lf=(()=>{ const sf=buildSharedField(aspect); const m=sf.map[c.id];
    return {stars:sf.stars, edges:m.edges, constIdx:m.constIdx, brightIdx:m.brightIdx}; })();
  let solved=false, cuesUsed=0, failCount=0, attemptScored=false, autoSolving=false, hintOn=false, drawLocked=false;
  const targetCount=c.edges.length;
  const SHAPE_TOL=(c.tol!=null)?c.tol:0.22;
  function isMatch(){ return shapesMatch(c.stars,c.edges, lf.stars,field.edges(), SHAPE_TOL); }

  // tap-to-answer options for the "what does it look like?" and "why?" questions —
  // each set stays close to what the traced figure actually looks like
  const GUESS_OPTS={
    cassiopeia:{ shapes:["A letter W","A crown","An upside-down M"],
                 reasons:["The lines zig-zag up and down","It has pointy tips like a crown","It looks like an M flipped over"] },
    orion:{ shapes:["A hunter","An hourglass","A big butterfly"],
            reasons:["It has a head, arms and legs","The middle is narrow and the ends are wide","The two sides look like open wings"] },
    scorpius:{ shapes:["A scorpion","A fish hook","The letter J"],
               reasons:["The long tail curls like a stinger","The line bends round like a hook","The bottom curve looks like a J"] }
  };
  const gOpts=GUESS_OPTS[c.id]||{shapes:["A shape","A picture","A pattern"],reasons:["The lines make that shape","The stars sit that way","It just looks like it to me"]};

  // golden dot that travels along each freshly-drawn line (same as Activity 1)
  const NS="http://www.w3.org/2000/svg";
  let dPrev=0;
  function travelParticle(a,b){
    const cc=document.createElementNS(NS,"circle");
    cc.setAttribute("r",0.9); cc.setAttribute("class","hunt-trav");
    cc.setAttribute("cx",lf.stars[a].x*100); cc.setAttribute("cy",lf.stars[a].y*100);
    const m=document.createElementNS(NS,"animateMotion");
    m.setAttribute("dur","0.5s"); m.setAttribute("fill","freeze");
    m.setAttribute("path","M0 0 L "+((lf.stars[b].x-lf.stars[a].x)*100).toFixed(2)+" "+((lf.stars[b].y-lf.stars[a].y)*100).toFixed(2));
    cc.appendChild(m); if(field&&field.svg) field.svg.appendChild(cc);
    if(m.beginElement){ try{ m.beginElement(); }catch(e){} }
    setTimeout(()=>cc.remove(),540);
  }

  const field=createStarField(fieldBox,lf.stars,{starScale:0.32, vbW:VBW, onChange:()=>{
    if(solved) return;
    const n=field.edges().length;
    if(n===dPrev+1){ const e=field.edges()[n-1]; travelParticle(e[0],e[1]); }   // golden dot on the new line
    dPrev=n;
    if(autoSolving) return;                                    // Meera is drawing the answer herself
    armIdle();
    if(hintOn) glowNextPath(null);                             // re-aim the glowing "connect this next" path
    if(isMatch()){ win(); return; }
    if(n===0){ attemptScored=false; drawLocked=false; field.lock(false); setSay(FIND); return; }
    if(n>=targetCount){
      // a complete figure that doesn't match — the attempt is submitted: freeze drawing
      // (no more lines until the child clears it) and Meera says try again (once per attempt)
      if(!attemptScored){ attemptScored=true; failCount++; Sfx.retry();
        drawLocked=true; field.lock(true);
        if(failCount>=2){ autoReveal(); return; }              // 2 wrong attempts → Meera shows the pattern
        cueBtn.classList.add("attn");                          // 1 wrong attempt → the Hint tab pulses
        setSay("Hmm, that doesn't match. Tap Clear and try again!", A_CLEAR);
      }
    } else if(drawLocked){ setSay("Tap Clear to remove your lines, then try again!"); }
    else { attemptScored=false; setSay("Keep connecting to match the picture!"); }
  }, onSelect:(i)=>{ if(hintOn&&!solved&&!autoSolving) glowNextPath(i); }});

  // hint mode: glow the path the child should connect NEXT, in blue. When a star is
  // selected (sel), aim the glow from that star to its un-drawn pattern partner.
  function glowNextPath(sel){
    if(!hintOn||solved||autoSolving) return;
    field.clearHintPath();
    const have=new Set(field.keys());
    const undrawn=lf.edges.filter(([a,b])=>!have.has(Math.min(a,b)+"-"+Math.max(a,b)));
    if(!undrawn.length) return;
    let e=undrawn[0];
    if(sel!=null){ const m=undrawn.find(([a,b])=>a===sel||b===sel); if(m) e=m; }
    field.hintPath(e[0],e[1]);
  }

  // ---- 12s inactivity nudge: the pattern's starting star pulses blue ----
  const startStar=lf.edges.length?lf.edges[0][0]:null;
  let idleTimer=null;
  function armIdle(){
    clearTimeout(idleTimer); field.unmark("startglow");
    if(solved||autoSolving||startStar===null) return;
    idleTimer=setTimeout(()=>{ if(!solved&&!autoSolving&&state.currentScene==="discover") field.mark([startStar],"startglow"); },12000);
  }
  s.addEventListener("pointerdown",armIdle,true);
  armIdle();

  // ---- after 2 wrong attempts: draw the constellation for the child, then ask the questions ----
  function autoReveal(){
    if(solved||autoSolving) return;
    autoSolving=true;
    clearTimeout(idleTimer); field.unmark("startglow"); field.clearHintPath();
    cueBtn.classList.remove("attn"); cueBtn.disabled=true;
    setSay("Good try! Watch — here is the pattern.");
    setTimeout(()=>{
      if(solved||state.currentScene!=="discover") return;
      field.clear();
      lf.edges.forEach((e,i)=>setTimeout(()=>{ if(!solved&&state.currentScene==="discover") field.connect(e[0],e[1]); },i*420));
      setTimeout(()=>{ if(!solved&&state.currentScene==="discover") win(true); }, lf.edges.length*420+400);
    },900);
  }
  setTimeout(()=>{ if(state.currentScene==="discover" && fieldBox.isConnected){ fieldBox.classList.add("amb"); addSkyAtmosphere(fieldBox); } },0);   // build atmosphere + wisps after first paint (avoids entry lag)

  // segmented control: Back | Clear | Hint
  dock.appendChild(segBtn("↶","Back",()=>{ if(!solved&&!autoSolving) field.undo(); }));
  dock.appendChild(segDiv());
  dock.appendChild(segBtn("⟲","Clear",()=>{ if(!solved&&!autoSolving){ field.clear(); setSay(FIND); } }));
  dock.appendChild(segDiv());
  // Hint = dotted outline of the WHOLE constellation + its stars turn blue; stays until traced
  const cueBtn=segBtn("💡","Hint",()=>{
    if(solved||autoSolving) return;
    cueBtn.classList.remove("attn");
    hintOn=true;
    field.guide(lf.edges);
    field.mark(lf.constIdx,"traceblue");                       // show WHICH stars to trace, in blue
    glowNextPath(null);                                        // and glow the path to connect next
    setSay("Follow the dotted lines to connect.", A_HINT);
  });
  dock.appendChild(cueBtn);

  // when the constellation is formed: draw the figure right over it, same screen
  function overlayFigure(){
    if(c.noFigureOverlay) return;
    const used=[...new Set(field.edges().flat())];
    let dmnx=Infinity,dmxx=-Infinity,dmny=Infinity,dmxy=-Infinity;
    used.forEach(i=>{ const x=lf.stars[i].x*100, y=lf.stars[i].y*100;
      if(x<dmnx)dmnx=x; if(x>dmxx)dmxx=x; if(y<dmny)dmny=y; if(y>dmxy)dmxy=y; });
    const ov=document.createElement("div"); ov.className="figoverlay-wrap";
    if(c.figureImg && c.figurePts && [...new Set(field.edges().flat())].length===c.stars.length){
      // painted figure PNG: fit it point-to-point onto the traced stars (uniform scale + rotation, no distortion)
      const usedD=[...new Set(field.edges().flat())];
      const ar=c.figureAspect||1;                     // image natural width/height (1 = square)
      const D=_normSet(usedD.map(i=>lf.stars[i]));
      const R=_normSet(c.stars.map(st=>st));
      // rotation-aware correspondence: try every rotation of the drawn set and keep the
      // assignment that lines up best, so the figure follows a TILTED / repositioned tracing
      let asg=null, bestTot=Infinity;
      for(let deg=0;deg<360;deg+=15){
        const th=deg*Math.PI/180, ct=Math.cos(th), st=Math.sin(th);
        const Dr=D.map(p=>({x:p.x*ct-p.y*st,y:p.x*st+p.y*ct}));
        const cmat=Dr.map(d=>R.map(r=>{ const dx=d.x-r.x, dy=d.y-r.y; return dx*dx+dy*dy; }));
        const a=_hungarian(cmat);
        let tot=0; for(let k=0;k<a.length;k++) tot+=cmat[k][a[k]];
        if(tot<bestTot){ bestTot=tot; asg=a; }
      }
      const src=[], dst=[];
      for(let k=0;k<usedD.length;k++){
        const p=c.figurePts[asg[k]];                  // body-part position inside the image (fractions of w/h)
        src.push({x:p.x, y:p.y/ar});                  // map into the image's true (non-square) local box
        dst.push({x:lf.stars[usedD[k]].x*100, y:lf.stars[usedD[k]].y*100});
      }
      const m=_similarityFit(src,dst);
      // grow + optionally rotate the figure around the constellation's centre so it comfortably covers it
      const k=(c.figureScale!=null)?c.figureScale:1.7;
      const th=((c.figureRotate||0)*Math.PI)/180, ct=Math.cos(th), st=Math.sin(th);
      let Cx=0,Cy=0; dst.forEach(p=>{Cx+=p.x;Cy+=p.y;}); Cx/=dst.length; Cy/=dst.length;
      const fa=m[0],fb=m[1],fe=m[4],ff=m[5];
      const off=c.figureOffset||{x:0,y:0};                    // fine nudge, in fractions of the star box
      const A=k*(ct*fa-st*fb), B=k*(ct*fb+st*fa);
      const E=k*(ct*(fe-Cx)-st*(ff-Cy))+Cx+(off.x||0)*(dmxx-dmnx), F=k*(st*(fe-Cx)+ct*(ff-Cy))+Cy+(off.y||0)*(dmxy-dmny);
      const M=[A,B,-B,A,E,F];
      ov.innerHTML='<svg viewBox="0 0 '+VBW+' 100" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">'+
        '<image class="figimg" href="'+encodeURI(c.figureImg)+'" x="0" y="0" width="1" height="'+(1/ar).toFixed(5)+'" preserveAspectRatio="none" transform="matrix('+M.map(v=>v.toFixed(5)).join(",")+')"/></svg>';
    } else if(c.figureImg){
      // "cover" drape: scale the figure's actual CONTENT (ignoring transparent margins) so it
      // fully covers the traced constellation, centred on it — adapts to any size or position.
      const bw=dmxx-dmnx, bh=dmxy-dmny;
      const Cx=(dmnx+dmxx)/2, Cy=(dmny+dmxy)/2;
      const ar=c.figureAspect||1.2;                          // image natural width/height
      const k=(c.figureScale!=null)?c.figureScale:1.1;       // coverage margin past the stars
      const cb=c.figureContent||{x0:0,y0:0,x1:1,y1:1};       // non-transparent box (image fractions)
      const cwf=Math.max(0.01,cb.x1-cb.x0), chf=Math.max(0.01,cb.y1-cb.y0);
      const boxW=Math.max((bw*k)/cwf,(bh*k*ar)/chf), boxH=boxW/ar;  // content covers BOTH dims
      const ccx=(cb.x0+cb.x1)/2, ccy=(cb.y0+cb.y1)/2;        // content centre (image fractions)
      const off=c.figureOffset||{x:0,y:0};                   // fine nudge, in fractions of the star box
      const Ix=Cx-ccx*boxW+(off.x||0)*bw, Iy=Cy-ccy*boxH+(off.y||0)*bh;
      // tilt the figure to follow a rotated tracing (0° when traced upright → no change)
      const Dn=_normSet(used.map(i=>lf.stars[i])), Rn=_normSet(c.stars.map(s=>s));
      const rotDeg=(_bestRotAngle(Rn,Dn)*180/Math.PI)+(c.figureRotate||0);
      ov.innerHTML='<svg viewBox="0 0 '+VBW+' 100" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">'+
        '<image class="figimg" href="'+encodeURI(c.figureImg)+'" x="'+Ix.toFixed(2)+'" y="'+Iy.toFixed(2)+'" width="'+boxW.toFixed(2)+'" height="'+boxH.toFixed(2)+'" preserveAspectRatio="none" transform="rotate('+rotDeg.toFixed(2)+' '+Cx.toFixed(2)+' '+Cy.toFixed(2)+')"/></svg>';
    } else {
      // hand-drawn SVG silhouette mapped onto the traced stars' box
      let rmnx=Infinity,rmxx=-Infinity,rmny=Infinity,rmxy=-Infinity;
      c.stars.forEach(st=>{ const x=st.x*100, y=st.y*100;
        if(x<rmnx)rmnx=x; if(x>rmxx)rmxx=x; if(y<rmny)rmny=y; if(y>rmxy)rmxy=y; });
      const sx=(dmxx-dmnx)/Math.max(1,rmxx-rmnx), sy=(dmxy-dmny)/Math.max(1,rmxy-rmny);
      const tx=dmnx-rmnx*sx, ty=dmny-rmny*sy;
      ov.innerHTML='<svg viewBox="0 0 '+VBW+' 100" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%">'+
        '<g class="figoverlay" transform="translate('+tx.toFixed(2)+','+ty.toFixed(2)+') scale('+sx.toFixed(4)+','+sy.toFixed(4)+')">'+
        (CONSTELLATION_ART[c.id]||"")+'</g></svg>';
    }
    // dim the sky behind the figure so it pops (sits below the figure overlay)
    const dim=document.createElement("div"); dim.className="reveal-dim";
    fieldBox.insertBefore(dim, fieldBox.firstChild.nextSibling||null);
    fieldBox.appendChild(ov);
    // soft particles drifting around the revealed figure
    const rmv=!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);
    if(!rmv){
      const pcx=((dmnx+dmxx)/2/VBW)*100, pcy=(dmny+dmxy)/2;
      const pw=Math.max(10,((dmxx-dmnx)/VBW)*100), ph=Math.max(10,(dmxy-dmny));
      for(let i=0;i<16;i++){ const sp=document.createElement("div"); sp.className="reveal-spark";
        sp.style.left=Math.max(2,Math.min(98,pcx+(Math.random()-.5)*pw*1.4)).toFixed(1)+"%";
        sp.style.top=Math.max(2,Math.min(98,pcy+(Math.random()-.5)*ph*1.4)).toFixed(1)+"%";
        sp.style.setProperty("--sd",(1.6+Math.random()*1.8).toFixed(1)+"s");
        sp.style.animationDelay=(Math.random()*1.4).toFixed(2)+"s";
        fieldBox.appendChild(sp); }
    }
  }

  function esc(t){ return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function win(auto){
    solved=true; Sfx.win(); field.lock(true);                  // pattern done — no more drawing
    clearTimeout(idleTimer); field.unmark("startglow"); field.unmark("traceblue");
    if(!state.huntLevelsComplete.includes(c.id)) state.huntLevelsComplete.push(c.id);
    Rewards.earn(4); renderProgress();
    cueBtn.disabled=true; cueBtn.classList.remove("attn");
    field.clearGuide();                                        // remove the dotted clue outline
    if(field.svg) field.svg.classList.add("trace-win");        // re-trace the line + gentle pulse
    dock.style.display="none";                                 // controls done — make room for the choices
    setStep("imagine");
    if(auto) setSay("Here is the pattern! What do you think this looks like?");
    else setSay("You found it! What do you think this looks like?", A_FOUND);
    askGuess();
  }

  // the child names the pattern by tapping one of three shape ideas
  // (remember WHICH one, so the reason step can check the matching reason)
  function askGuess(){
    choicePrompt(gOpts.shapes.map((t,i)=>({label:t, pick:()=>afterGuess(t,i)})), true);
  }

  // show a Meera line, then advance to the next. With a clip playing we advance the instant it
  // ENDS (so it's never cut off, and the next thing appears immediately). The timer is only a
  // fallback for when 'ended' never fires (clip missing, or narration muted mid-line); clips run
  // ~1–4s, so 6s comfortably covers the longest before the fallback ever matters.
  function sayThen(text, onDone, audio){
    let did=false;
    const go=()=>{ if(did) return; did=true; onDone(); };
    if(audio && state.narrationOn){
      setSay(text, audio, ()=>{ if(state.currentScene==="discover") go(); });   // clip's real end → next, right away
      // Backstop ONLY for a stuck/muted clip — must stay well above the longest clip (~7.5s) so it can
      // never cut a clip short. playLine's watchdog tracks real playback and normally fires first.
      setTimeout(go, 20000);
    } else {
      setSay(text, audio);
      setTimeout(go, Math.max(2800, text.length*68));                           // text-only: pace by reading time
    }
  }

  // run a callback only while we're still on the discover screen
  function guard(fn){ return ()=>{ if(state.currentScene==="discover") fn(); }; }

  // a centred "thought card" (smaller); calls onSubmit(trimmedValue) when the child answers
  function textPrompt(label, placeholder, maxlen, onSubmit){
    const box=document.createElement("div"); box.className="guess-box compact";
    box.innerHTML='<div class="gb-label"><span class="gb-star" aria-hidden="true">✨</span>'+label+'</div>'+
      '<div class="gb-row"><input type="text" class="guess-input" placeholder="'+placeholder+'" maxlength="'+maxlen+'" autocomplete="off" spellcheck="false">'+
      '<button type="button" class="btn small guess-go">Share idea ✨</button></div>';
    s.appendChild(box);
    const input=box.querySelector(".guess-input"), go=box.querySelector(".guess-go");
    go.disabled=true;                                          // only active once the child types
    input.addEventListener("input",()=>{ go.disabled=!input.value.trim(); });
    setTimeout(()=>{ try{ input.focus(); }catch(e){} }, 60);
    function submit(){ const v=(input.value||"").trim(); if(!v) return; box.remove(); onSubmit(v); }
    go.onclick=submit;
    input.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); } });
  }

  // a centred row of tappable choice buttons inside the glass card
  // sep=true → each option floats as its OWN card (same look, not one joined tray)
  function choicePrompt(options,sep){
    const tray=document.createElement("div"); tray.className="choice-tray"+(sep?" sep":""); let picked=false;
    options.forEach(o=>{
      const card=document.createElement("button"); card.type="button"; card.className="choice-card";
      card.innerHTML=(o.icon||"")+'<span class="cc-text">'+o.label+'</span><span class="cc-check" aria-hidden="true">✓</span>';
      card.onclick=()=>{ if(picked) return; picked=true; card.classList.add("sel");
        setTimeout(()=>{ tray.remove(); o.pick(); },260); };
      tray.appendChild(card);
    });
    s.appendChild(tray);
  }

  // After the child names the shape, Meera asks WHY; once she finishes, three reason choices
  // appear — only the reason that matches the chosen shape is accepted (wrong → red shake).
  function afterGuess(ans,idx){
    setStep("explain");
    const q="Interesting! Why do you think it looks like that?";
    sayThen(q, guard(()=>reasonPrompt(gOpts.reasons, idx, reason=>afterReason(ans,reason))), A_INTEREST);
  }

  // like choicePrompt(sep), but with a CORRECT answer: the matching reason glows green and
  // moves on; a wrong one vibrates with a red glow and the child tries again
  function reasonPrompt(labels, correctIdx, onPick){
    const tray=document.createElement("div"); tray.className="choice-tray sep"; let done=false, warned=false;
    // shuffle the display order so the right reason never sits in a predictable spot
    const order=labels.map((_,i)=>i);
    for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=order[i]; order[i]=order[j]; order[j]=t; }
    order.forEach(i=>{ const t=labels[i];
      const card=document.createElement("button"); card.type="button"; card.className="choice-card";
      card.innerHTML='<span class="cc-text">'+t+'</span>';
      card.onclick=()=>{
        if(done) return;
        if(i===correctIdx){
          done=true; card.classList.add("right");
          setTimeout(()=>{ tray.remove(); onPick(t); },700);
        } else {
          Sfx.retry();
          card.classList.remove("wrong"); void card.offsetWidth;   // restart the shake animation
          card.classList.add("wrong");
          setTimeout(()=>card.classList.remove("wrong"),700);
          if(!warned){ warned=true; setSay("Hmm, does that reason match your shape? Try another!"); }
        }
      };
      tray.appendChild(card);
    });
    s.appendChild(tray);
  }

  // Meera acknowledges the reason, then asks whether everyone would imagine the same shape
  function afterReason(ans,reason){
    if(state.currentScene!=="discover") return;
    const ack = reason ? "What a thoughtful reason! I love how you look at the stars."
                       : "What a thoughtful answer! I love how you look at the stars.";
    sayThen(ack, guard(()=>
      sayThen("Would everyone imagine the same picture, or something different?",
        guard(()=>choicePrompt([
          {label:"Same picture", icon:'<svg viewBox="0 0 24 24" class="cc-ico" aria-hidden="true"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>',
            pick:()=>revealFigure(ans,"same")},
          {label:"Different idea", icon:'<svg viewBox="0 0 24 24" class="cc-ico fill" aria-hidden="true"><path d="M12 2l1.7 6.1L20 10l-6.3 1.9L12 18l-1.7-6.1L4 10l6.3-1.9z"/></svg>',
            pick:()=>revealFigure(ans,"different")}
        ])), A_EVERYONE)), A_THOUGHTFUL);
  }

  // Reveal the figure, then Meera's closing teaching — branching on the child's answer
  function revealFigure(ans,resp){
    if(state.currentScene!=="discover") return;
    const SEEN_DESC={cassiopeia:"a queen holding a mirror", orion:"a mighty hunter", scorpius:"a giant scorpion"};
    const seenAs = SEEN_DESC[c.id] ? c.name+", "+SEEN_DESC[c.id] : c.name;
    const ancient="Long ago, people saw this as "+seenAs+"!";
    const ansClean=(ans||"").trim();
    const phrase = !ansClean ? "something"
                 : (/^(a|an|the)\s/i.test(ansClean) ? ansClean
                    : (/^[aeiou]/i.test(ansClean)?"an ":"a ")+ansClean);
    const last=step>=HUNT_SEQ.length-1;
    setStep("reveal");
    overlayFigure();                                  // the figure drapes onto the stars as Meera explains
    if(/differ/i.test(resp)){
      // child said people could imagine something DIFFERENT
      sayThen("Yes! "+ancient, guard(()=>
        sayThen(last?"You have found them all!":"Let's move to the next constellation.", guard(showNext), last?A_ALL:A_NEXT)), seenAudio);
    } else {
      // child said everyone would see the SAME shape (or answer was unclear)
      sayThen("Different people can see different things in the same stars!", guard(()=>
        sayThen("And long ago, people saw this as "+seenAs+"!", guard(()=>
          sayThen(last?"You have found them all!":"Let's move to the next constellation.", guard(showNext), last?A_ALL:A_NEXT)), seenAudio)), A_DIFFERENT);
    }
  }

  // prompt to move on — button sits in the bottom-right corner
  function showNext(){
    const last=step>=HUNT_SEQ.length-1;
    const cont=mkBtn(last?"Finish ✓":"Next ➜","pulse",()=>gotoStep(step+1));   // last step → gotoStep plays Meera's video, then reward
    const wrap=document.createElement("div"); wrap.className="discover-next"; wrap.appendChild(cont);
    s.appendChild(wrap);
  }
};

/* ----- ONE shared full-screen star field that holds ALL THREE hunt constellations -----
   The SAME star layout is reused on every discover level; only the constellation
   the child is asked to trace changes. Each constellation is embedded with its
   TRUE proportions (uniform scale) inside its own region of the sky, so all three
   are simultaneously present and findable in the one common star field. Regions are
   placed clear of Meera (bottom-left) and the top controls/clue button. */
const SHARED_LAYOUT={
  // {cx,w} are fractions of the field width (0..aspect); {cy,h} are fractions of height (0..1)
  cassiopeia:{cx:0.50, cy:0.15, w:0.58, h:0.16},   // top band, centre
  scorpius:  {cx:0.40, cy:0.56, w:0.24, h:0.50},   // mid-left (clear of Meera, right of her)
  orion:     {cx:0.84, cy:0.55, w:0.26, h:0.56}    // mid-right — each constellation in its own zone
};
let _sharedFieldCache=null;
function buildSharedField(aspect){
  const key=aspect.toFixed(3);
  if(_sharedFieldCache && _sharedFieldCache.key===key) return _sharedFieldCache;  // identical layout across levels
  const stars=[], map={};
  // 1) place each constellation into its region, preserving its real proportions
  HUNT_SEQ.forEach(id=>{
    const con=byId(id), box=SHARED_LAYOUT[id]; if(!con||!box) return;
    const xs=con.stars.map(s=>s.x), ys=con.stars.map(s=>s.y);
    const minx=Math.min.apply(null,xs), maxx=Math.max.apply(null,xs);
    const miny=Math.min.apply(null,ys), maxy=Math.max.apply(null,ys);
    const bw=Math.max(0.001,maxx-minx), bh=Math.max(0.001,maxy-miny);
    const scale=Math.min((box.w*aspect)/bw, box.h/bh);              // uniform → no distortion
    const cxF=box.cx*aspect, cyF=box.cy, bcx=(minx+maxx)/2, bcy=(miny+maxy)/2;
    const base=stars.length;
    con.stars.forEach(st=>stars.push({x:cxF+(st.x-bcx)*scale, y:cyF+(st.y-bcy)*scale, bright:st.bright?1:0}));
    map[id]={
      constIdx: con.stars.map((_,i)=>base+i),               // this constellation's stars, in the shared field
      brightIdx: con.bright.map(i=>base+i),
      edges: con.edges.map(([a,b])=>[base+a, base+b])        // edges remapped to shared-field indices (order kept)
    };
  });
  // 2) fill the WHOLE screen with an even, deterministic grid of decoy stars (no clusters).
  // Meera (opaque, in front) sits bottom-left — stars behind her are hidden, stars around
  // her fill what would otherwise be empty space, so we DON'T carve out a gap for her.
  const rows=4, cols=Math.max(7, Math.round(5*aspect));   // far fewer decoy stars — constellations stay clear
  const mL=0.035*aspect, mR=0.025*aspect, my=0.045, minD=0.06*aspect;
  for(let r=0;r<rows;r++){
    for(let cc=0;cc<cols;cc++){
      const i=r*cols+cc;
      const x=mL+(aspect-mL-mR)*(cols<2?0.5:cc/(cols-1));
      const y=my+(1-2*my)*(rows<2?0.5:r/(rows-1));
      const px=x+(((i*37)%5)-2)*0.009*aspect, py=y+(((i*53)%5)-2)*0.010;
      if(py<0.085 && (px<0.18*aspect || px>0.82*aspect)) continue;        // keep top corners clear (Undo/Clear & tools)
      if(px<0.27*aspect) continue;                                        // keep Meera's whole column (above + below her) free of tappable stars
      let ok=true;
      for(let k=0;k<stars.length;k++){ if(Math.hypot(stars[k].x-px,stars[k].y-py)<minD){ ok=false; break; } }
      if(ok) stars.push({x:px,y:py});
    }
  }
  _sharedFieldCache={key, stars, map};
  return _sharedFieldCache;
}

/* build the full-screen tracing field: the constellation (placed in a central
   region) among an EVENLY-SPREAD grid of decoy stars — no random clusters. */
function buildLevelFieldFS(con, aspect){
  // place the constellation in a central region, PRESERVING its true proportions
  // (uniform scale) so it looks exactly like the reference picture.
  const xs=con.stars.map(s=>s.x), ys=con.stars.map(s=>s.y);
  const minx=Math.min.apply(null,xs), maxx=Math.max.apply(null,xs);
  const miny=Math.min.apply(null,ys), maxy=Math.max.apply(null,ys);
  const bw=Math.max(0.001,maxx-minx), bh=Math.max(0.001,maxy-miny);
  const scale=Math.min((0.52*aspect)/bw, 0.52/bh);
  const cxF=0.60*aspect, cyF=0.46, bcx=(minx+maxx)/2, bcy=(miny+maxy)/2;
  const stars=con.stars.map(st=>({ x:cxF+(st.x-bcx)*scale, y:cyF+(st.y-bcy)*scale, bright:st.bright?1:0 }));
  const constIdx=con.stars.map((_,i)=>i);     // constellation stars stay indices 0..n-1
  const brightIdx=con.bright.slice();
  // even grid of decoys; left margin clears the rail, minD keeps them off the answer
  const rows=5, cols=Math.max(7, Math.round(7*aspect));
  const mL=0.26*aspect, mR=0.05*aspect, my=0.12, minD=0.06*aspect;
  for(let r=0;r<rows;r++){
    for(let cc=0;cc<cols;cc++){
      const i=r*cols+cc;
      const x=mL+(aspect-mL-mR)*(cols<2?0.5:cc/(cols-1));
      const y=my+(1-2*my)*(rows<2?0.5:r/(rows-1));
      const px=x+(((i*37)%5)-2)*0.009*aspect, py=y+(((i*53)%5)-2)*0.010;
      let ok=true;
      for(let k=0;k<stars.length;k++){ if(Math.hypot(stars[k].x-px,stars[k].y-py)<minD){ ok=false; break; } }
      if(ok) stars.push({x:px,y:py});
    }
  }
  const edges=con.edges.map(e=>[e[0],e[1]]);
  return {stars, edges, target:keyset(edges), constIdx, brightIdx};
}

/* ---- shape matching: does the traced figure REALLY match the reference? ----
   We judge structure AND geometry, not just where the ink is:
     1) same number of stars used and same number of lines,
     2) find the best correspondence between the child's stars and the reference
        stars (size/position independent, orientation kept),
     3) the arrangement must align (within tol), AND
     4) the lines must connect corresponding stars EXACTLY like the reference.
   This rejects "right stars, wrong connections" and "wrong number of stars",
   and works for paths, loops and branched shapes (e.g. Orion) alike.          */
function _normSet(pts){
  const n=pts.length||1; let cx=0,cy=0; pts.forEach(p=>{cx+=p.x;cy+=p.y;}); cx/=n; cy/=n;
  const c=pts.map(p=>({x:p.x-cx,y:p.y-cy}));
  let s=0; c.forEach(p=>s+=p.x*p.x+p.y*p.y); s=Math.sqrt(s/n)||1;
  return c.map(p=>({x:p.x/s,y:p.y/s}));
}
/* Hungarian algorithm: min-cost assignment on an n×n cost matrix (rows→cols). */
function _hungarian(cost){
  const n=cost.length, INF=1e9;
  const u=new Array(n+1).fill(0), v=new Array(n+1).fill(0), p=new Array(n+1).fill(0), way=new Array(n+1).fill(0);
  for(let i=1;i<=n;i++){
    p[0]=i; let j0=0;
    const minv=new Array(n+1).fill(INF), used=new Array(n+1).fill(false);
    do{
      used[j0]=true; const i0=p[j0]; let delta=INF, j1=-1;
      for(let j=1;j<=n;j++) if(!used[j]){
        const cur=cost[i0-1][j-1]-u[i0]-v[j];
        if(cur<minv[j]){ minv[j]=cur; way[j]=j0; }
        if(minv[j]<delta){ delta=minv[j]; j1=j; }
      }
      for(let j=0;j<=n;j++){ if(used[j]){ u[p[j]]+=delta; v[j]-=delta; } else { minv[j]-=delta; } }
      j0=j1;
    } while(p[j0]!==0);
    do{ const j1=way[j0]; p[j0]=p[j1]; j0=j1; } while(j0);
  }
  const a=new Array(n);
  for(let j=1;j<=n;j++) if(p[j]>0) a[p[j]-1]=j-1;
  return a;
}
/* best-fit similarity transform (rotate + uniform scale + translate, no shear) that
   maps src points onto dst points. Returns an SVG matrix(a,b,c,d,e,f). Used to drop a
   figure silhouette exactly onto the stars the child traced, without distorting it. */
function _similarityFit(src,dst){
  const n=src.length; let scx=0,scy=0,dcx=0,dcy=0;
  for(let i=0;i<n;i++){ scx+=src[i].x; scy+=src[i].y; dcx+=dst[i].x; dcy+=dst[i].y; }
  scx/=n; scy/=n; dcx/=n; dcy/=n;
  let na=0,nb=0,den=0;
  for(let i=0;i<n;i++){ const sx=src[i].x-scx, sy=src[i].y-scy, dx=dst[i].x-dcx, dy=dst[i].y-dcy;
    na+=sx*dx+sy*dy; nb+=sx*dy-sy*dx; den+=sx*sx+sy*sy; }
  den=den||1; const a=na/den, b=nb/den;          // rotation + uniform scale
  const e=dcx-(a*scx - b*scy), f=dcy-(b*scx + a*scy);
  return [a,b,-b,a,e,f];                          // SVG matrix(a,b,c,d,e,f): c=-b, d=a
}
/* ---- pattern matching ------------------------------------------------------
   Exact reference connections pass immediately. If the child draws a slightly
   different graph, a strict line-cloud comparison can still pass when the traced
   shape strongly overlaps the book's constellation.                            */
function _samplePts(stars, edges, per){
  per=per||8; const pts=[];
  edges.forEach(([a,b])=>{ const A=stars[a], B=stars[b]; if(!A||!B) return;
    for(let t=0;t<=per;t++){ const f=t/per; pts.push({x:A.x+(B.x-A.x)*f, y:A.y+(B.y-A.y)*f}); } });
  return pts;
}
function _chamfer(A,B){
  let sum=0;
  for(let i=0;i<A.length;i++){ let m=Infinity;
    for(let j=0;j<B.length;j++){ const dx=A[i].x-B[j].x, dy=A[i].y-B[j].y, d=dx*dx+dy*dy; if(d<m)m=d; }
    sum+=Math.sqrt(m);
  }
  return sum/Math.max(1,A.length);
}
function _aspectOf(pts){
  if(!pts.length) return 0;
  let mnx=Infinity,mxx=-Infinity,mny=Infinity,mxy=-Infinity;
  pts.forEach(p=>{ if(p.x<mnx)mnx=p.x; if(p.x>mxx)mxx=p.x; if(p.y<mny)mny=p.y; if(p.y>mxy)mxy=p.y; });
  return Math.max(1e-4,mxx-mnx)/Math.max(1e-4,mxy-mny);
}
/* smallest symmetric chamfer over all rotations of B onto A (both already centred+scaled).
   Lets a correct-but-TILTED tracing still match — orientation no longer matters. */
function _bestRotChamfer(A,B){
  let best=Infinity, bestDeg=0;
  for(let deg=0;deg<360;deg+=15){
    const th=deg*Math.PI/180, ct=Math.cos(th), st=Math.sin(th);
    const Br=B.map(p=>({x:p.x*ct-p.y*st,y:p.x*st+p.y*ct}));
    const d=Math.max(_chamfer(A,Br),_chamfer(Br,A));
    if(d<best){ best=d; bestDeg=deg; }
  }
  for(let deg=bestDeg-12;deg<=bestDeg+12;deg+=3){            // refine around the best coarse angle
    const th=deg*Math.PI/180, ct=Math.cos(th), st=Math.sin(th);
    const Br=B.map(p=>({x:p.x*ct-p.y*st,y:p.x*st+p.y*ct}));
    const d=Math.max(_chamfer(A,Br),_chamfer(Br,A));
    if(d<best) best=d;
  }
  return best;
}
/* angle (radians) to rotate point-set R so it best lands on D (both centred+scaled).
   Used to tilt a figure overlay to follow a rotated tracing. */
function _bestRotAngle(R,D){
  let best=Infinity, bestDeg=0;
  for(let deg=0;deg<360;deg+=10){
    const th=deg*Math.PI/180, ct=Math.cos(th), st=Math.sin(th);
    const Rr=R.map(p=>({x:p.x*ct-p.y*st,y:p.x*st+p.y*ct}));
    const d=Math.max(_chamfer(Rr,D),_chamfer(D,Rr));
    if(d<best){ best=d; bestDeg=deg; }
  }
  for(let deg=bestDeg-8;deg<=bestDeg+8;deg+=2){
    const th=deg*Math.PI/180, ct=Math.cos(th), st=Math.sin(th);
    const Rr=R.map(p=>({x:p.x*ct-p.y*st,y:p.x*st+p.y*ct}));
    const d=Math.max(_chamfer(Rr,D),_chamfer(D,Rr));
    if(d<best){ best=d; bestDeg=deg; }
  }
  return bestDeg*Math.PI/180;
}
function _exactGraphMatch(refStars,refEdges, drawnStars,drawnEdges, tol){
  if(drawnEdges.length!==refEdges.length) return false;
  const refUsed=[...new Set(refEdges.flat())].sort((a,b)=>a-b);
  const drawnUsed=[...new Set(drawnEdges.flat())].sort((a,b)=>a-b);
  if(drawnUsed.length!==refUsed.length) return false;

  const R=_normSet(refUsed.map(i=>refStars[i]));
  const D=_normSet(drawnUsed.map(i=>drawnStars[i]));
  const cost=D.map(d=>R.map(r=>{ const dx=d.x-r.x, dy=d.y-r.y; return dx*dx+dy*dy; }));
  const asg=_hungarian(cost);                       // drawn star k -> reference star asg[k]
  let maxErr=0;
  const drawnToRef=new Map();
  for(let k=0;k<drawnUsed.length;k++){
    const err=Math.sqrt(cost[k][asg[k]]);
    if(err>maxErr) maxErr=err;
    drawnToRef.set(drawnUsed[k], refUsed[asg[k]]);
  }
  if(maxErr>(tol||0.12)) return false;

  const mapped=drawnEdges.map(([a,b])=>[drawnToRef.get(a),drawnToRef.get(b)]);
  const target=keyset(refEdges);
  const got=keyset(mapped);
  return got.length===target.length && got.every((v,i)=>v===target[i]);
}
/* How well the traced figure matches the reference — judged as SHAPE + PATTERN,
   not just line/star counts. Returns {f1, meanErr}:
     • f1      — overlap between the child's connections and the reference
                 connections after lining the stars up by position (recall =
                 fraction of reference lines drawn, precision = fraction of the
                 child's lines that belong to the figure; missing lines AND extra
                 scribbles both pull it down). This is the "same pattern" score.
     • meanErr — how far the traced figure's shape sits from the reference shape
                 once centred + scaled. A W drawn on different stars / at different
                 proportions stays low; a straight line or a V (same connections,
                 different shape) is high. This is the "actually looks like it" score.
   Correspondence uses the best position assignment (no hard cutoff) so a correct
   shape drawn on non-canonical stars still scores well; the field places
   constellations upright (uniform scale + translation, no rotation), so we compare
   normalised positions directly. A square padded cost matrix lets any missing /
   extra star fall onto a dummy without breaking the assignment.                 */
const SHAPE_SIM=0.95;      // ≥ 95% of the reference's lines must be drawn
const SHAPE_GEOM=0.30;     // ...and the figure must resemble the reference shape (mean star offset)
const SHAPE_MINPREC=0.40;  // reject only a runaway amount of stray lines ("connect everything"); travel lines are fine
function _shapeMatchScore(refStars,refEdges, drawnStars,drawnEdges){
  const NONE={f1:0, meanErr:9};
  if(!drawnEdges.length) return NONE;
  const refUsed=[...new Set(refEdges.flat())].sort((a,b)=>a-b);
  const drawnUsed=[...new Set(drawnEdges.flat())].sort((a,b)=>a-b);
  // sanity bounds so a wildly different amount of drawing can't score as "similar"
  if(drawnUsed.length < Math.floor(refUsed.length*0.7)) return NONE;
  if(drawnUsed.length > refUsed.length+3) return NONE;

  const R=_normSet(refUsed.map(i=>refStars[i]));
  const D=_normSet(drawnUsed.map(i=>drawnStars[i]));
  const N=Math.max(R.length, D.length);
  const cost=[];
  for(let k=0;k<N;k++){ const row=[];
    for(let j=0;j<N;j++){
      if(k<D.length && j<R.length){ const dx=D[k].x-R[j].x, dy=D[k].y-R[j].y; row.push(dx*dx+dy*dy); }
      else row.push(0);                        // dummy pad for a missing / extra star
    }
    cost.push(row);
  }
  const asg=_hungarian(cost);                  // drawn row k -> column asg[k]
  const drawnToRef=new Map(); let sum=0, cnt=0;
  for(let k=0;k<D.length;k++){
    const col=asg[k];
    if(col>=R.length) continue;                // matched a dummy column (a stray drawn star)
    sum+=Math.sqrt(cost[k][col]); cnt++;       // geometric offset of this star from its match
    drawnToRef.set(drawnUsed[k], refUsed[col]);
  }

  // Reduce the child's strokes to the SET of distinct connections they made
  // (mapped onto reference stars). We judge the PATTERN, not the stroke count — so
  // re-tracing the same line, as you often must to get around a branched figure,
  // never counts against them; only genuinely different connections matter.
  const drawn=new Set();
  for(const [a,b] of drawnEdges){
    const ra=drawnToRef.get(a), rb=drawnToRef.get(b);
    if(ra==null||rb==null||ra===rb) continue;  // stroke touching a stray / unmatched star
    drawn.add(Math.min(ra,rb)+"-"+Math.max(ra,rb));
  }
  const targetSet=new Set(keyset(refEdges));
  let tp=0; drawn.forEach(k=>{ if(targetSet.has(k)) tp++; });
  const recall    = targetSet.size ? tp/targetSet.size : 0;   // fraction of the reference lines the child drew
  const precision = drawn.size     ? tp/drawn.size     : 0;   // fraction of the child's lines that belong to the figure
  return {recall, precision, meanErr: cnt ? sum/cnt : 9, drawnCount: drawn.size, refCount: targetSet.size};
}
function _visualShapeMatch(refStars,refEdges, drawnStars,drawnEdges, tol){
  const s=_shapeMatchScore(refStars,refEdges,drawnStars,drawnEdges);
  // 1) Completion — you must have drawn a whole figure's worth of distinct lines,
  //    so "found it" can't fire while you're still only part-way through tracing.
  if(s.drawnCount < s.refCount) return false;
  // 2) Coverage — you must have traced ≥95% of the reference's lines, and the
  //    figure must resemble the reference shape (right proportions-ish). Extra
  //    lines drawn just to TRAVEL between stars are NOT held against you; re-tracing
  //    the same line is a no-op. Only a runaway amount of stray connections (very
  //    low precision, i.e. "connect everything") is rejected so it can't be cheesed.
  return s.recall >= SHAPE_SIM && s.precision >= SHAPE_MINPREC && s.meanErr <= SHAPE_GEOM;
}
function shapesMatch(refStars,refEdges, drawnStars,drawnEdges, tol){
  if(!drawnEdges.length) return false;
  return _exactGraphMatch(refStars,refEdges,drawnStars,drawnEdges,tol) ||
         _visualShapeMatch(refStars,refEdges,drawnStars,drawnEdges,tol);
}

/* Embed Activity 2 (The Glow-Box Mystery) as a full-screen iframe so there's no page reload
   (keeps audio/video autoplay unlocked). It messages back "ls-restart" when done.
   The iframe is created invisible while the Continue gate shows: the page parses and
   buffers its intro video but plays NOTHING until we post "ls-start" on the child's
   click — so Continue reveals Activity 2 instantly, with no black loading break. */
let lsWanted=false;
function preloadLightSource(){
  let f=document.getElementById("ls-frame");
  if(f) return f;
  f=document.createElement("iframe");
  f.id="ls-frame"; f.src="glow-box.html"; f.allow="autoplay; fullscreen";
  f.style.cssText="position:fixed;inset:0;width:100%;height:100%;border:0;z-index:99999;background:#000;opacity:0;pointer-events:none;transition:opacity .35s ease";
  document.body.appendChild(f);
  return f;
}
function openLightSource(){
  lsWanted=true;
  const f=preloadLightSource();                              // normally already loaded behind the gate
  f.style.pointerEvents="auto"; f.style.opacity="1";
  try{ f.contentWindow.postMessage("ls-start","*"); }catch(e){}
}
window.addEventListener("message",e=>{
  if(e.data==="ls-ready" && lsWanted){                       // iframe finished loading AFTER the click → start it now
    const f=document.getElementById("ls-frame");
    if(f){ try{ f.contentWindow.postMessage("ls-start","*"); }catch(err){} }
  }
  if(e.data==="ls-restart"){
    lsWanted=false;
    const f=document.getElementById("ls-frame"); if(f) f.remove();
    state=NEW_STATE(); show("start");
  }
});

function starsDecor(){

  pts.forEach(p=>{ out+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="#fff7e0"/>'; });
  return out;
}
function escapeXml(s){ return String(s).replace(/[<>&'"]/g,ch=>({"<":"&lt;",">":"&gt;","&":"&amp;","'":"&apos;",'"':"&quot;"}[ch])); }

function mkBtn(label,cls,onClick){
  const b=document.createElement("button");
  b.className="btn "+(cls||""); b.textContent=label; b.onclick=onClick; return b;
}

function toggleNarration(){
  state.narrationOn=!state.narrationOn;
  const t=document.getElementById("narrToggle");
  if(t){
    t.classList.toggle("on",state.narrationOn);
    t.setAttribute("aria-pressed",String(state.narrationOn));
    const ico=t.querySelector(".snd-ico"); if(ico) ico.textContent=state.narrationOn?"🔊":"🔇";
  }
  if(!state.narrationOn){ Speech.stop(); stopHuntAudio(); stopLineAudio(); }
  else Speech.speak("Narration on.");
}
document.getElementById("narrToggle").onclick=toggleNarration;

/* ---- background asset preloader: warms the cache while the title screen shows,
   so every scene's image/video is ready before the child reaches it ---- */
(function preloadAssets(){
  var imgs=[
    "Visuals/Meera with cassiopeia.webp",
    "Visuals/cassiopeia figure cutout.webp",
    "Visuals/scorpion.webp",
    "Visuals/Meera holding scorpion cutout.webp",
    "Visuals/scorpion cutout.webp",
    "Visuals/orion.webp",
    "Visuals/Meera holding orion cutout.webp",
    "Visuals/orion hunter cutout.webp",
    "videos/video-11.poster.webp",          // first-frame posters so video scenes show instantly
    "videos/video-12.poster.webp",
    "videos/video-13.poster.webp"
  ];
  imgs.forEach(function(u){ var im=new Image(); im.src=encodeURI(u); });   // images are tiny — fetch all at once
  var vids=["videos/video-11.mp4","videos/video 12.mp4","videos/video-13.mp4",
    "videos/inital scene activity 2.mp4","videos/final scene activity 2.mp4"];   // Activity 2 (iframe) starts instantly too
  var i=0;                                                                  // videos one-at-a-time so they don't fight for bandwidth
  (function next(){
    if(i>=vids.length) return;
    fetch(encodeURI(vids[i++])).then(function(r){return r.blob();}).then(next).catch(next);
  })();
})();

/* boot */
show("start");
