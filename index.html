/* ============================================================
   GLOBAL STATE  (held in memory only — GDD §12.2 / §12.3)
   ============================================================ */
const NEW_STATE = () => ({
  currentScene:"start",
  starCoins:0,
  patternsFound:[],
  huntLevelsComplete:[],
  hintsUsed:{},          // levelId -> count of PAID hints used
  freeHintUsed:{},       // levelId -> bool
  narrationOn:true,
  badges:[],
  title:"Cloud Gazer",
  currentLevel:0,
});
let state = NEW_STATE();

/* ============================================================
   SYSTEM 1 — DIALOGUE  (text + Web Speech, owns no stars)
   ============================================================ */
const Speech = (()=>{
  const synth = window.speechSynthesis || null;
  // Kabir (a boy) speaks in a male voice, Meera (a girl) in a female voice.
  // Anything else (the Narrator / instructions) uses a neutral voice.
  const V = {male:null, female:null, neutral:null, kabir:null, meera:null};
  function classify(v){
    const n=(v.name||"").toLowerCase();
    if(/female|woman|girl|\b(zira|susan|samantha|victoria|heera|kalpana|swara|aria|jenny|sonia|hazel|fiona|tessa|veena|raveena|neerja|catherine|linda|moira|karen|serena|emma|amy|joanna|salli)\b/.test(n)) return "female";
    if(/\bmale\b|\bman\b|\bboy\b|\b(david|mark|guy|james|daniel|alex|fred|rishi|ravi|george|ryan|prabhat|hemant|madhur|eric|paul|thomas|oliver|aaron|arthur|matthew|brian|justin)\b/.test(n)) return "male";
    return null;
  }
  const isChild=v=>/child|kid|junior|\bboy\b|\bgirl\b/i.test(v.name||"");
  const isIndian=v=>/en[-_]?IN/i.test(v.lang||"") || /\b(heera|ravi|kalpana|swara|prabhat|hemant|madhur|neerja|veena|raveena|aarav|ananya)\b/i.test(v.name||"");
  let allVoices=[];
  const LS={kabir:"se_voice_kabir", meera:"se_voice_meera"};
  const byURI=uri=>allVoices.find(v=>v.voiceURI===uri)||null;
  function lsGet(k){ try{return localStorage.getItem(k);}catch(e){return null;} }
  function lsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){} }
  function pick(){
    if(!synth) return;
    const vs = synth.getVoices(); allVoices = vs;
    const en = vs.filter(v=>/^en/i.test(v.lang));
    const pool = en.length?en:vs;
    const females = pool.filter(v=>classify(v)==="female");
    const males   = pool.filter(v=>classify(v)==="male");
    // Kabir and Meera are Indian kids — prefer Indian-English voices for them.
    V.female  = females.find(isIndian) || females[0] || null;
    V.male    = males.find(isIndian)   || males[0]   || null;
    V.neutral = pool.find(isIndian) || pool.find(v=>/en[-_]?(GB|US|IN)/i.test(v.lang)) || pool[0] || vs[0] || null;
    // prefer a real child/young voice when one exists, still favouring Indian
    const kids = pool.filter(isChild);
    V.kabir = kids.filter(v=>classify(v)!=="female").find(isIndian) || kids.find(v=>classify(v)!=="female") || V.male || V.neutral;
    V.meera = kids.filter(v=>classify(v)==="female").find(isIndian) || kids.find(v=>classify(v)==="female") || V.female || V.neutral;
    // honour any voice the user picked in the on-screen selector
    const sk=lsGet(LS.kabir), sm=lsGet(LS.meera);
    if(sk && byURI(sk)) V.kabir=byURI(sk);
    if(sm && byURI(sm)) V.meera=byURI(sm);
    if(!V.male) V.male=V.neutral; if(!V.female) V.female=V.neutral;
    if(!V.kabir) V.kabir=V.male; if(!V.meera) V.meera=V.female;
  }
  if(synth){
    pick(); synth.onvoiceschanged = pick;
    // Chrome can carry over a "paused" state that silently blocks all speech.
    try{ synth.resume(); }catch(e){}
  }

  // Each character gets a base voice + a child-like pitch (boy a little lower
  // than girl). If a real Indian voice is in use we lift pitch only modestly so
  // it still sounds natural; rate stays gentle for primary-school kids.
  function profile(who){
    if(who==="Kabir"||who==="male")   return {voice:V.kabir||V.male||V.neutral, pitch:1.34, rate:1.0};
    if(who==="Meera"||who==="female") return {voice:V.meera||V.female||V.neutral, pitch:1.5, rate:1.0};
    return {voice:V.neutral, pitch:1.05, rate:0.96};
  }
  const clamp=(n,lo,hi)=>Math.max(lo,Math.min(hi,n));
  // break a line into spoken phrases, keeping the punctuation that drives tone
  // (no look-behind, so it works on older Safari too)
  function phrases(text){
    const clean=String(text).replace(/[➜→•]/g,' ').replace(/\s*[—–]\s*/g,'. ');
    return (clean.match(/[^.!?…]+[.!?…]*|[^.!?…]+$/g) || [clean]).map(s=>s.trim()).filter(Boolean);
  }
  // turn one phrase into an utterance with expression rather than a flat read
  function utterFor(phrase, prof, baseRate, idx){
    const u=new SpeechSynthesisUtterance(phrase);
    let pitch=prof.pitch, rate=baseRate;
    pitch += (idx%2 ? 0.04 : -0.03);                                   // gentle sway, never monotone
    if(/[!]+["')\]]*$/.test(phrase)){ pitch+=0.16; rate*=1.07; }       // excited / cheering
    else if(/\?["')\]]*$/.test(phrase)){ pitch+=0.12; rate*=0.97; }    // curious, rising question
    else if(/(…|\.\.\.)["')\]]*$/.test(phrase)){ pitch-=0.05; rate*=0.86; } // wondering, trailing off
    if(/\b(look|wow|yes|yay|hurray|hooray|amazing|great|cool|found|congratulations)\b/i.test(phrase)){ pitch+=0.08; rate*=1.03; }
    u.pitch=clamp(pitch,0,2); u.rate=clamp(rate,0.55,1.5); u.volume=1;
    if(prof.voice) u.voice=prof.voice;
    return u;
  }
  // build (but don't speak) every phrase of a line, each with its own expression
  function buildUtterances(text, rate, who){
    const prof=profile(who);
    const base=rate || prof.rate;
    return phrases(text).map((p,i)=>utterFor(p,prof,base,i));
  }

  /* --- robustness layer for the Web Speech API (Chrome quirks) ---
     1) cancel() immediately followed by speak() races and silently drops the
        new audio ("voiceover not coming"). We cancel, then speak on a short
        timeout so the engine has settled.
     2) Chrome stops speaking after ~15s and stale utterances queued earlier
        can fire later, mid-game ("voiceover comes in between"). A token marks
        the latest request so superseded ones never start, and a keep-alive
        resume() pulse stops long lines from being cut off. */
  let speakToken=0, keepTimer=null, speakTimer=null;
  function stopKeepAlive(){ if(keepTimer){ clearTimeout(keepTimer); keepTimer=null; } }
  function keepAlive(){
    // periodic resume() defeats Chrome's ~15s auto-pause on long speech
    if(!synth){ return; }
    try{ if(synth.speaking){ synth.resume(); } }catch(e){}
    keepTimer=setTimeout(keepAlive,4000);
  }
  function flushAndSpeak(utterances,onDone){
    const myToken=++speakToken;
    stopKeepAlive();
    if(speakTimer){ clearTimeout(speakTimer); speakTimer=null; }
    try{ synth.cancel(); }catch(e){}
    if(!utterances || !utterances.length) return;
    // let cancel() settle before the new line, so it isn't swallowed
    speakTimer=setTimeout(()=>{
      speakTimer=null;
      if(myToken!==speakToken || !state.narrationOn) return;   // superseded or muted
      const last=utterances[utterances.length-1];
      utterances[0].addEventListener("start",()=>{ if(myToken===speakToken){ stopKeepAlive(); keepAlive(); } });
      last.addEventListener("end",stopKeepAlive);
      last.addEventListener("error",stopKeepAlive);
      // notify the caller when this line finishes (only if it wasn't superseded)
      if(onDone){ last.addEventListener("end",()=>{ if(myToken===speakToken) onDone(); }); }
      utterances.forEach(u=>{
        // a late-arriving line must win even if these were queued first
        u.addEventListener("start",()=>{ if(myToken!==speakToken){ try{synth.cancel();}catch(e){} } });
        try{ synth.speak(u); }catch(e){}
      });
    },90);
  }
  return {
    available:!!synth,
    // who: "Kabir" → young-boy voice, "Meera" → young-girl voice, else → neutral narrator
    speak(text,rate,who,onDone){
      if(!synth || !state.narrationOn || !text) return;
      try{ flushAndSpeak(buildUtterances(text,rate,who),onDone); }
      catch(e){/* graceful fallback — text stays readable */}
    },
    // speak a sequence of parts [{t, rate, who}] back-to-back (e.g. slow name, then normal info)
    speakSeq(parts){
      if(!synth || !state.narrationOn || !parts || !parts.length) return;
      try{
        let all=[];
        parts.forEach(p=>{ if(p&&p.t) all=all.concat(buildUtterances(p.t,p.rate,p.who)); });
        flushAndSpeak(all);
      }catch(e){}
    },
    stop(){ speakToken++; stopKeepAlive(); if(speakTimer){ clearTimeout(speakTimer); speakTimer=null; } if(synth){ try{synth.cancel();}catch(e){} } },
    // ---- voice picker support ----
    list(){ return (allVoices||[]).filter(v=>/^en/i.test(v.lang)); },
    isIndian,
    current(who){ return who==="Kabir" ? V.kabir : V.meera; },
    setVoice(who,uri){
      const v=byURI(uri); if(!v) return;
      if(who==="Kabir"){ V.kabir=v; lsSet(LS.kabir,uri); }
      else { V.meera=v; lsSet(LS.meera,uri); }
    },
    preview(who){
      this.speak(who==="Kabir"
        ? "Hi! I am Kabir. Let's find shapes hidden in the stars!"
        : "Hello! I am Meera. Let's explore the night sky together!", null, who);
    },
    onVoices(cb){ if(synth){ try{ synth.addEventListener("voiceschanged",cb); }catch(e){} } }
  };
})();

/* tiny WebAudio blips — no external sound files (GDD §9.6) */
const Sfx = (()=>{
  let ctx=null;
  const ac = window.AudioContext||window.webkitAudioContext;
  function tone(freq,dur,type,gain){
    if(!ac) return;
    if(!state.narrationOn) return;               // sound toggle off → no UI blips either
    try{
      ctx = ctx||new ac();
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type=type||"sine"; o.frequency.value=freq;
      g.gain.value=gain||0.05;
      o.connect(g); g.connect(ctx.destination);
      const t=ctx.currentTime; o.start(t);
      g.gain.setValueAtTime(g.gain.value,t);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      o.stop(t+dur);
    }catch(e){}
  }
  return {
    connect(){ tone(540,0.12,"sine",0.04); },
    win(){ tone(660,0.13,"sine",0.05); setTimeout(()=>tone(880,0.22,"sine",0.05),120); },
    found(){ tone(720,0.16,"triangle",0.05); },
    spend(){ tone(300,0.18,"sine",0.04); },
    retry(){ tone(360,0.16,"sine",0.035); }
  };
})();

/* ============================================================
   REWARDS — coins, progress bar, badges, titles  (GDD §7)
   ============================================================ */
const Rewards = {
  earn(n){
    state.starCoins += n;
    renderCoins("earn");
  },
  spend(n){
    state.starCoins = Math.max(0, state.starCoins - n);  // floored at 0 (§7.1)
    renderCoins("spend");
    Sfx.spend();
  },
  giveBadge(id,label,sub,icon){
    if(state.badges.some(b=>b.id===id)) return;

/* ============================================================
   SYSTEM 2 — STAR CONNECTION  (reusable field; reports edges,
   never judges).  Click / tap / keyboard to chain-connect.
   ============================================================ */
// star-tap click sounds — alternate 1 → 2 → 1 … on every star selection (Activities 1 & 2)
let _starSelN=0;
function playStarSelect(){
  if(!state.narrationOn) return;                 // sound toggle off → no click sounds either
  const f=(_starSelN++%2===0)?"star selection sound 1.mp3":"star selection sound 2.mp3";
  try{ const a=new Audio(encodeURI("Audio/"+f)); a.play().catch(()=>{}); }catch(e){}
}
function createStarField(host, stars, opts){
  opts=opts||{};
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("class","field");
  // viewBox height is always 100; width can be widened so stars spread across
  // a wide (full-screen) field without distorting star shapes or geometry.
  const VBW=(opts&&opts.vbW)||100;
  svg.setAttribute("viewBox","0 0 "+VBW+" 100");
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  const gHint=document.createElementNS(NS,"g");
  const gEdge=document.createElementNS(NS,"g");
  const gStar=document.createElementNS(NS,"g");
  svg.appendChild(gHint); svg.appendChild(gEdge); svg.appendChild(gStar);
  host.innerHTML=""; host.appendChild(svg);

  let edges=[];          // [[a,b]...]
  let pending=null;
  let locked=false;      // when true, taps on stars are ignored (attempt submitted — must Clear first)
  const nodes=[];

  function starPoints(R){
    const inner=R*0.42, pts=[];
    for(let k=0;k<10;k++){
      const ang=-Math.PI/2 + k*Math.PI/5, rad=(k%2===0)?R:inner;
      pts.push((Math.cos(ang)*rad).toFixed(2)+","+(Math.sin(ang)*rad).toFixed(2));
    }
    return pts.join(" ");
  }
  const scale=opts.starScale||1;
  stars.forEach((s,i)=>{
    const cx=s.x*100, cy=s.y*100, baseT="translate("+cx+" "+cy+")";
    // a star flagged interactive:false is purely decorative background — softer,
    // smaller, no glow, no hover, not tappable. (Undefined = interactive, so every
    // other scene that builds a field is unchanged.)
    const deco=(s.interactive===false);
    const g=document.createElementNS(NS,"g");
    g.setAttribute("class","starnode"+(s.bright?" bright":"")+(deco?" deco":""));
    g.setAttribute("transform",baseT);
    const R=(deco?2.0:(s.bright?4.4:2.3))*scale;
    const poly=document.createElementNS(NS,"polygon");
    poly.setAttribute("points",starPoints(R));
    poly.setAttribute("class","starshape");
    g.appendChild(poly);
    if(!deco){
      // small square selection box (thin border), shown only while this star is selected
      const box=document.createElementNS(NS,"rect");
      const half=R*1.5+0.6;
      box.setAttribute("x",(-half).toFixed(2)); box.setAttribute("y",(-half).toFixed(2));
      box.setAttribute("width",(half*2).toFixed(2)); box.setAttribute("height",(half*2).toFixed(2));
      box.setAttribute("rx",(half*0.18).toFixed(2));
      box.setAttribute("class","selbox");
      g.appendChild(box);
      // generous transparent hit area (easy tap + keyboard focus)
      const hit=document.createElementNS(NS,"circle");
      hit.setAttribute("cx",0); hit.setAttribute("cy",0); hit.setAttribute("r",Math.max(4,R+2.2));
      hit.setAttribute("class","starhit");
      hit.setAttribute("tabindex","0");
      hit.setAttribute("role","button");
      hit.setAttribute("aria-label",(s.bright?"Bright star ":"Star ")+(i+1));
      const act=(e)=>{ e.preventDefault(); select(i); };
      hit.addEventListener("click",act);
      hit.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" ") act(e); });
      g.appendChild(hit);
    }
    gStar.appendChild(g);
    nodes.push({g,poly,baseT,s});
  });

  function resetSel(){
    nodes.forEach(n=>{ n.g.setAttribute("transform",n.baseT); n.g.classList.remove("sel"); });
  }
  function setPending(i){
    resetSel();
    pending=i;
    if(i!==null){ nodes[i].g.classList.add("sel"); }   // square selbox shows it — no scale-up
  }
  function clearPending(){ resetSel(); pending=null; }
  function markUsed(){
    const used=new Set(); edges.forEach(e=>{used.add(e[0]);used.add(e[1]);});
    nodes.forEach((n,i)=>{ n.g.classList.toggle("used", used.has(i)); });
  }
  function select(i){
    if(locked) return;
    if(pending===null){ setPending(i); playStarSelect(); if(opts.onSelect) opts.onSelect(i); return; }
    if(pending===i){ clearPending(); if(opts.onSelect) opts.onSelect(null); return; }
    addEdge(pending,i);
    setPending(i);   // chain: keep drawing from the last star
    playStarSelect();
    if(opts.onSelect) opts.onSelect(i);
  }
  function drawEdge(a,b,cls){
    const l=document.createElementNS(NS,"line");
    l.setAttribute("x1",stars[a].x*100); l.setAttribute("y1",stars[a].y*100);
    l.setAttribute("x2",stars[b].x*100); l.setAttribute("y2",stars[b].y*100);
    l.setAttribute("class",cls||"edge draw");
    return l;
  }
  function addEdge(a,b){
    if(edges.some(e=>(e[0]===a&&e[1]===b)||(e[0]===b&&e[1]===a))) return;
    edges.push([a,b]);
    gEdge.appendChild(drawEdge(a,b));
    markUsed();
    if(opts.onChange) opts.onChange(getKeys(),edges);
  }
  function getKeys(){ return edges.map(e=>Math.min(e[0],e[1])+"-"+Math.max(e[0],e[1])).sort(); }

  return {
    svg,
    edges:()=>edges.slice(),
    keys:getKeys,
    starCount:()=>{ const s=new Set(); edges.forEach(e=>{s.add(e[0]);s.add(e[1]);}); return s.size; },
    undo(){
      if(!edges.length) return;
      edges.pop(); if(gEdge.lastChild) gEdge.removeChild(gEdge.lastChild);
      clearPending(); markUsed();
      if(opts.onChange) opts.onChange(getKeys(),edges);
    },
    clear(){
      edges=[]; gEdge.innerHTML=""; clearPending(); markUsed();
      if(opts.onChange) opts.onChange(getKeys(),edges);
    },
    highlight(indices){
      gHint.innerHTML="";
      indices.forEach(i=>{ nodes[i].g.classList.add("hint"); });
      setTimeout(()=>nodes.forEach(n=>n.g.classList.remove("hint")),4000);
    },
    ghost(a,b){
      const g=drawEdge(a,b,"ghost"); gHint.appendChild(g);
      setTimeout(()=>{ if(g.parentNode) g.parentNode.removeChild(g); },5000);
    },
    // persistent dotted guide for a whole set of edges — stays until cleared
    guide(edgePairs){
      gHint.innerHTML="";
      (edgePairs||[]).forEach(([a,b])=>{ gHint.appendChild(drawEdge(a,b,"ghost")); });
    },
    clearGuide(){ gHint.innerHTML=""; },
    // draw a connection programmatically (used by the auto-reveal after 2 wrong attempts)
    connect(a,b){ addEdge(a,b); },
    // glowing blue "connect this next" path (hint mode) — one at a time, over the dotted guide
    hintPath(a,b){ gHint.querySelectorAll(".hintpath").forEach(el=>el.remove()); gHint.appendChild(drawEdge(a,b,"hintpath")); },
    clearHintPath(){ gHint.querySelectorAll(".hintpath").forEach(el=>el.remove()); },
    // freeze/unfreeze star taps (drawing). Undo/Clear/connect still work while locked.
    lock(v){ locked=!!v; if(locked) clearPending(); },
    // persistent class marks on star nodes (blue hint stars, idle start-star glow)
    mark(indices,cls){ (indices||[]).forEach(i=>{ if(nodes[i]) nodes[i].g.classList.add(cls); }); },
    unmark(cls){ nodes.forEach(n=>n.g.classList.remove(cls)); }
  };
}

/* render a static reference / gallery diagram (non-interactive) */
function drawDiagram(host,stars,edges,h){
  const NS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(NS,"svg");
  svg.setAttribute("viewBox","0 0 100 100");
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  if(h)svg.setAttribute("height",h);
  edges.forEach(([a,b])=>{
    const l=document.createElementNS(NS,"line");
    l.setAttribute("x1",stars[a].x*100);l.setAttribute("y1",stars[a].y*100);
    l.setAttribute("x2",stars[b].x*100);l.setAttribute("y2",stars[b].y*100);
    l.setAttribute("class","edge");
    svg.appendChild(l);
  });
  stars.forEach(s=>{
    const R=s.bright?4.2:3.1, inner=R*0.42, pts=[];
    for(let k=0;k<10;k++){
      const ang=-Math.PI/2 + k*Math.PI/5, rad=(k%2===0)?R:inner;
      pts.push((s.x*100+Math.cos(ang)*rad).toFixed(2)+","+(s.y*100+Math.sin(ang)*rad).toFixed(2));
    }
    const p=document.createElementNS(NS,"polygon");
    p.setAttribute("points",pts.join(" "));

    p.setAttribute("fill",s.bright?"var(--gold)":"var(--star)");
    p.setAttribute("stroke","#fff");p.setAttribute("stroke-width",".2");
    svg.appendChild(p);
  });
  host.innerHTML="";host.appendChild(svg);
}

/* ============================================================
   SYSTEM 3 — VALIDATION  (judges connections vs a target set)
   ============================================================ */
const Validator={
  matches(field,target){
    const k=field.keys();
    if(k.length!==target.length) return false;
    return k.every((v,i)=>v===target[i]);
  },
  hasWrongEdge(field,target){
    const t=new Set(target);
    return field.keys().some(k=>!t.has(k));
  }
};

   ============================================================ */
const screen=document.getElementById("screen");
const SCENES={};

/* Cross-fade between screens: lift the old scene out of #screen and float it on top
   (frozen, non-interactive) while the next scene builds underneath, then fade it out.
   Without this, screen.innerHTML="" shows the dark page background for ~0.5–1s while
   the new scene fades in from opacity:0 — the "black blink" between screens. */
function crossFadeOldScene(){
  const old=screen.firstElementChild;
  if(!old) return;
  old.style.animation="none";                     // never replay the scene's fade-IN when re-appended
  old.style.position="fixed"; old.style.inset="0"; old.style.zIndex="9990";
  old.style.pointerEvents="none"; old.style.transition="opacity .3s ease";
  document.body.appendChild(old);                 // survives screen.innerHTML="" in the next scene
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ old.style.opacity="0"; }));
  setTimeout(()=>{ if(old.parentNode) old.parentNode.removeChild(old); },460);
}

function show(name){
  Speech.stop();
  if(typeof stopStoryAudio==="function") stopStoryAudio();   // never let story narration bleed into gameplay
  if(typeof stopHuntAudio==="function") stopHuntAudio();
  if(typeof stopLineAudio==="function") stopLineAudio();
  crossFadeOldScene();                                       // smooth hand-off — no dark flash
  state.currentScene=name;
  const chrome=document.getElementById("chrome");
  // discover has its own in-scene controls (full-screen star field), so hide the top chrome there
  chrome.classList.toggle("hidden", name==="start"||name==="story"||name==="discover"||name==="hunt");
  // coins appear from Pattern Hunt onward (§5)
  const coinsOn=["hunt","spot","discover","trace","reveal","reward"].includes(name);
  document.getElementById("coins").classList.toggle("hidden", !coinsOn);
  renderCoins();
  renderProgress();
  screen.scrollTop=0;
  SCENES[name]();
}

/* narration clips for the pattern-hunt activity (Activity 1) — pre-recorded .wav files */
let huntAudio=null;
function stopHuntAudio(){
  if(huntAudio){ try{ huntAudio.pause(); huntAudio.currentTime=0; }catch(e){}
    huntAudio.onended=null; huntAudio=null; }
}
function playHunt(file){
  stopHuntAudio(); Speech.stop();
  if(!state.narrationOn || !file) return;                  // respect the sound toggle
  const a=new Audio(); a.preload="auto"; a.src=encodeURI("Audio/"+file);
  huntAudio=a; const p=a.play(); if(p&&p.catch) p.catch(()=>{});
}
/* narration clips for the discover activity (Activity 2 — Meera's spoken lines) */
let lineAudio=null;
function stopLineAudio(){
  if(lineAudio){ try{ lineAudio.pause(); lineAudio.currentTime=0; }catch(e){}
    if(lineAudio._tmr){ clearTimeout(lineAudio._tmr); lineAudio._tmr=null; }
    lineAudio.onended=null; lineAudio.onerror=null; lineAudio.onplaying=null; lineAudio.ontimeupdate=null; lineAudio=null; }
}
function playLine(file,onEnd){
  stopLineAudio(); Speech.stop();
  if(!state.narrationOn || !file){ if(onEnd) onEnd(); return; }  // muted / no clip → hand back to caller
  const a=new Audio(); a.preload="auto"; a.src=encodeURI("Audio/"+file);
  lineAudio=a;
  let done=false;
  const fin=()=>{ if(done) return; done=true; if(a._tmr){ clearTimeout(a._tmr); a._tmr=null; } if(lineAudio===a) lineAudio=null; if(onEnd) onEnd(); };
  // Advance when the clip ENDS. 'ended' is the ideal signal but can be unreliable on file://, so a
  // watchdog re-arms on every timeupdate to "time left from where we ACTUALLY are + headroom" — it
  // tracks real playback, so it can never fire early (no clipped tails) yet still backstops a missing
  // 'ended' within ~0.5s. Anchoring to currentTime (not loadedmetadata) is what fixes the early cut.
  const arm=()=>{ if(!isFinite(a.duration)||a.duration<=0) return;
    const remain=Math.max(0,(a.duration-(a.currentTime||0))*1000)+500;
    if(a._tmr) clearTimeout(a._tmr); a._tmr=setTimeout(fin, remain); };
  a.onended=fin; a.onerror=fin; a.onplaying=arm; a.ontimeupdate=arm;
  const p=a.play(); if(p&&p.catch) p.catch(()=>fin());     // autoplay blocked → don't strand the sequence
}

    setTimeout(()=>show("story"),1000);                              // ~900–1000ms cinematic, then the park

};

/* ---------- THE 7-SCENE PICTURE STORY ---------- */
/* Full-screen video scene. Auto-advances to the next page ~0.7s before the clip ends, so
   its blurry frozen last frame is never shown. A Skip button lets the child jump ahead. */
/* Video subtitles — fill each list with {t: startSeconds, e: endSeconds, text:"..."} */
const VIDEO_CUES={
  // intro ("Let's explore") — from initial_scene_activity_2_subtitles_with_speakers.srt
  "videos/video-11.mp4":[
    { t:0.0,  e:5.0,  text:"Narrator: It was a beautiful day, and Kabir and Meera were spending some time in the park." },
    { t:5.0,  e:10.0, text:"Kabir: Hey, Meera, do you also think that cloud looks like a smiling face?" },
    { t:10.0, e:12.2, text:"Meera: Yes, it does!" },
    { t:12.2, e:16.2, text:"Meera: Look, that cloud also looks like a UFO." },
    { t:16.2, e:20.8, text:"Kabir: But can we see these shapes in the sky too?" },
    { t:20.8, e:24.6, text:"Meera: Hmm, let's find out tonight." },
    { t:24.6, e:29.2, text:"Narrator: Now, it's time to find shapes and patterns in stars." },
    { t:29.2, e:31.9, text:"Kabir and Meera: Will you help us?" },
  ],
  "videos/video-13.mp4":[],   // Meera's constellation explanation
  "videos/video 12.mp4":[],   // closing video (new clip)
};
function videoScene(src, doneLabel, onAdvance, maxSecs, dissolveMs){
  Speech.stop(); stopStoryAudio(); stopHuntAudio(); stopLineAudio();  // no narration may bleed over the video
  state.currentScene="video";       // invalidates any pending scene-guarded timers (e.g. discover's sayThen chain)
  if(dissolveMs==null) dissolveMs=400;                              // default: melt into the next scene, no hard cut
  crossFadeOldScene();                                              // old screen fades over the arriving video
  document.getElementById("chrome").classList.add("hidden");        // full-screen video, like the intro
  screen.innerHTML="";
  const s=document.createElement("div"); s.className="scene";
  s.style.cssText="position:relative;background:#000;overflow:hidden";

  const video=document.createElement("video");
  video.src=encodeURI(src);
  video.poster=encodeURI(src.replace(/\.mp4$/i,".poster.webp"));   // first frame shows instantly — no black gap while buffering
  video.setAttribute("playsinline",""); video.controls=false; video.preload="auto";
  video.muted=!state.narrationOn;                                  // honour the sound toggle
  // fill the screen with no black bars; centre the frame so the small overflow is split
  // evenly (only ~half is cropped from the bottom, instead of all of it)
  video.style.cssText="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;background:#000;z-index:0";
  s.appendChild(video);

  const bar=document.createElement("div");
  bar.style.cssText="position:absolute;right:18px;bottom:18px;z-index:6;display:flex;gap:12px";
  s.appendChild(bar);

  // subtitles for this clip (see VIDEO_CUES); fill each cue with {t,e,text}
  const cap=document.createElement("div"); cap.className="videocap"; s.appendChild(cap);
  const cues=VIDEO_CUES[src]||[];
  video.addEventListener("timeupdate",()=>{
    const ct=video.currentTime, cue=cues.find(c=>ct>=c.t&&ct<c.e);
    cap.textContent=cue?cue.text:""; cap.style.opacity=cue?"1":"0";
  });

  screen.appendChild(s);

  let done=false;
  // fully release the video (pause + drop source + free the decoder) and swap straight to the
  // next scene in the SAME tick — the video frame stays visible until the new scene is ready,
  // so there's no blank flash; releasing the MP4 stops it buffering/decoding in the background.
  const advance=()=>{ if(done) return; done=true;
    try{ video.pause(); }catch(e){}
    if(dissolveMs>0){
      // smooth cross-dissolve: lift the finished clip above everything on its last
      // frame, build the next scene underneath, then fade the old frame out so one
      // video melts into the next instead of hard-cutting.
      const fade=s;
      fade.style.animation="none";                     // re-appending would replay the .scene fade-IN (a black flash)
      fade.style.position="fixed"; fade.style.inset="0"; fade.style.zIndex="9999";
      fade.style.pointerEvents="none"; fade.style.transition="opacity "+dissolveMs+"ms ease";
      document.body.appendChild(fade);                 // survives #screen being cleared by the next scene
      onAdvance();                                     // next scene builds + starts underneath
      requestAnimationFrame(()=>requestAnimationFrame(()=>{ fade.style.opacity="0"; }));
      setTimeout(()=>{ try{ video.removeAttribute("src"); video.load(); }catch(e){}
        if(fade.parentNode) fade.parentNode.removeChild(fade); }, dissolveMs+60);
    } else {
      try{ video.removeAttribute("src"); video.load(); }catch(e){}
      onAdvance();
    }
  };
  bar.appendChild(mkBtn("Skip ➜","small",advance));
  // optional hard cut-off (e.g. trim a 9s clip to 7s); otherwise leave just before
  // the end so the clip never freezes on its (blurry) final frame
  video.addEventListener("timeupdate",()=>{
    if(maxSecs && video.currentTime >= maxSecs){ advance(); return; }
    if(video.duration && isFinite(video.duration) && video.currentTime >= video.duration-0.7) advance();
  });
  video.addEventListener("ended",advance);   // fallback if timeupdate misses it
  video.addEventListener("error",()=>{ if(video.getAttribute("src")) advance(); });  // missing/broken clip → don't strand the child on black

  // arriving here is always via a user tap, so autoplay-with-sound is allowed;
  // if a browser still blocks it, show a centred Play button.
  const p=video.play();
  if(p&&p.catch) p.catch(()=>{
    const c=document.createElement("div"); c.className="center"; c.style.zIndex="5";

/* ---------- SCENE 5: PATTERN HUNT (free discovery) ---------- */
/* Stars are generated to fill a wide, full-screen field. Coordinates use the
   field's own units: x runs 0..aspect, y runs 0..1, so 1 unit of x == 1 unit of
   y in pixels — star shapes and shape-recognition geometry stay undistorted.
   The stars keep the SAME on-screen size; we just place MORE of them.        */
function genHuntStars(aspect){
  // Evenly SCATTERED across the whole play area so the child can reach stars anywhere
  // and build any shape. A "jittered grid" (one star per cell, randomly placed inside
  // the cell) gives full coverage that still looks organic — not stiff rows.
  // Deterministic (seeded) so the layout is stable per load.
  // Margins clear the Explorer Mission tablet (right) and thin top/bottom strips,
  // so no tappable star ever hides under the panel. Wider jitter lets the outer
  // stars sit near the remaining edges.
  // Field now spans almost the FULL width — only the Explorer Mission tablet's own
  // top-right rectangle is kept clear of tappable stars (so none hides under it).
  // Everything else — left, centre, far right and the whole strip BELOW the panel —
  // gets stars, so the sky feels filled edge to edge.
  const x0=0.025*aspect, x1=aspect-0.025*aspect, y0=0.06, y1=0.93;
  let seed=1234567>>>0; const rnd=()=>{ seed=(seed*1664525+1013904223)>>>0; return seed/4294967296; };
  const W=x1-x0, H=y1-y0, stars=[];
  const cols=Math.max(8, Math.round(5.5*aspect)), rows=5;  // fewer interactive stars — sparser, less crowded
  const cw=W/cols, ch=H/rows;
  // panel exclusion BAND: the tablet now sits lower (~top:22vh→~0.64), so we clear
  // only that vertical band on the right — stars still fill the corner ABOVE the panel.
  const panelX=aspect-0.18*aspect;
  const inPanel=(x,y)=>(x>panelX && y>0.27 && y<0.77);
  // ~60–86% of the field stars stay bright & tappable; the rest become soft
  // decorative background stars. The chance rises left→right, so the bright-star
  // density leans toward the right (it used to look left-heavy). The left still
  // keeps ~60% bright, so every target shape stays traceable anywhere on screen.
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const x=x0+(c+0.08+0.84*rnd())*cw;       // use almost the whole cell → reaches the edges/corners
    const y=y0+(r+0.08+0.84*rnd())*ch;
    if(inPanel(x,y)) continue;               // keep the tablet area clear of tappable stars
    const pBright=0.60+0.26*((x-x0)/W);      // left ≈0.60 → right ≈0.86
    stars.push({x, y, interactive: rnd()<pBright});
  }
  // a few soft background stars directly BELOW the panel + Continue/Skip dock (lower-right)
  for(let i=0;i<4;i++){
    stars.push({ x:(aspect-0.20*aspect)+rnd()*0.17*aspect, y:0.70+rnd()*0.20, interactive:false });
  }
  return stars;
}
/* ---- shape recognition: name what the child connected (best-effort, kid-friendly) ---- */
function _adj(edges){ const a={}; edges.forEach(([x,y])=>{ (a[x]=a[x]||[]).push(y); (a[y]=a[y]||[]).push(x); }); return a; }
function _cycleOrder(used, adj){
  if(used.length<3 || !used.every(i=>adj[i].length===2)) return null;
  const start=used[0]; const order=[]; let prev=-1, cur=start, guard=0;
  do{ order.push(cur); const nb=adj[cur]; const nxt=(nb[0]!==prev)?nb[0]:nb[1]; prev=cur; cur=nxt; guard++; }
  while(cur!==start && guard<=used.length+1);
  return (cur===start && order.length===used.length)?order:null;
}
function _pathOrder(used, adj){
  const ends=used.filter(i=>adj[i].length===1);
  if(ends.length!==2) return null;
  const order=[]; let prev=-1, cur=ends[0], guard=0;
  while(cur!==undefined && guard<=used.length+1){
    order.push(cur); const nb=adj[cur].filter(x=>x!==prev); prev=cur; cur=nb[0]; guard++;
  }
  return order.length===used.length?order:null;
}
function _segInt(p1,p2,p3,p4){
  const d=(p2.x-p1.x)*(p4.y-p3.y)-(p2.y-p1.y)*(p4.x-p3.x);
  if(Math.abs(d)<1e-9) return false;
  const t=((p3.x-p1.x)*(p4.y-p3.y)-(p3.y-p1.y)*(p4.x-p3.x))/d;
  const u=((p3.x-p1.x)*(p2.y-p1.y)-(p3.y-p1.y)*(p2.x-p1.x))/d;
  return t>0.02&&t<0.98&&u>0.02&&u<0.98;
}
function _cycleCrossings(stars,order){
  const n=order.length, P=i=>stars[i]; let c=0;
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
    const a1=order[i],a2=order[(i+1)%n],b1=order[j],b2=order[(j+1)%n];
    if(a1===b1||a1===b2||a2===b1||a2===b2) continue;
    if(_segInt(P(a1),P(a2),P(b1),P(b2))) c++;
  }
  return c;
}
function identifyShape(stars, edges){
  if(!edges.length) return "shape";
  const used=[...new Set(edges.flatMap(e=>[e[0],e[1]]))];
  const N=used.length, E=edges.length;
  const adj=_adj(edges); used.forEach(i=>{ adj[i]=adj[i]||[]; });
  const degs=used.map(i=>adj[i].length);
  const maxDeg=Math.max.apply(null,degs), leaves=degs.filter(d=>d===1).length;
  const P=i=>stars[i];
  const dist=(a,b)=>Math.hypot(P(a).x-P(b).x,P(a).y-P(b).y);
  const angleAt=(a,b,c)=>{ const v1x=P(a).x-P(b).x,v1y=P(a).y-P(b).y,v2x=P(c).x-P(b).x,v2y=P(c).y-P(b).y;
    const d=(v1x*v2x+v1y*v2y)/((Math.hypot(v1x,v1y)*Math.hypot(v2x,v2y))||1);
    return Math.acos(Math.max(-1,Math.min(1,d)))*180/Math.PI; };
  // a hub with several spokes reads as a star (or a cross when it's a neat plus)
  if(maxDeg>=4) return maxDeg===4 ? "cross" : "star";
  if(maxDeg===3 && E===N-1 && leaves>=3) return "star";
  // one closed loop
  const order=_cycleOrder(used,adj);
  if(order){
    const n=order.length;
    if(n>=5 && _cycleCrossings(stars,order)>0) return "star";
    if(n===3) return "triangle";
    if(n===4){
      const [a,b,c,d]=order;
      const s=[dist(a,b),dist(b,c),dist(c,d),dist(d,a)];
      const ang=[angleAt(d,a,b),angleAt(a,b,c),angleAt(b,c,d),angleAt(c,d,a)];
      const right=ang.every(x=>Math.abs(x-90)<20);
      const mean=(s[0]+s[1]+s[2]+s[3])/4, equal=s.every(x=>Math.abs(x-mean)/mean<0.22);
      if(right) return equal?"square":"rectangle";
      if(equal) return "diamond";
      const near=(x,y)=>Math.abs(x-y)/Math.max(x,y)<0.2;
      if((near(s[0],s[1])&&near(s[2],s[3]))||(near(s[1],s[2])&&near(s[3],s[0]))) return "kite";
      return "four-sided shape";
    }
    if(n===5) return "pentagon";
    if(n===6) return "hexagon";
    return "round shape";
  }
  // an open line / path
  const path=_pathOrder(used,adj);
  if(path){
    if(path.length===2) return "line";
    if(path.length===3){ const a=angleAt(path[0],path[1],path[2]); if(a>150) return "line"; if(Math.abs(a-90)<28) return "letter L"; return "corner"; }
    const turns=[]; for(let k=1;k<path.length-1;k++) turns.push(180-angleAt(path[k-1],path[k],path[k+1]));
    if(turns.every(t=>Math.abs(t)<20)) return "line";
    const sign=(p,q,r)=>{ const v=(q.x-p.x)*(r.y-p.y)-(q.y-p.y)*(r.x-p.x); return v>0?1:(v<0?-1:0); };
    const signs=[]; for(let k=1;k<path.length-1;k++) signs.push(sign(P(path[k-1]),P(path[k]),P(path[k+1])));
    let alt=true; for(let k=1;k<signs.length;k++) if(signs[k]===signs[k-1]){ alt=false; break; }
    if(alt && path.length>=4) return "zigzag";
    return "path";
  }
  return "shape";
}

    progFill.style.width=Math.round((found.size/NEED)*100)+"%";
    headCount.textContent=found.size;
    if(bump){ progFill.classList.remove("bump"); void progFill.offsetWidth; progFill.classList.add("bump"); }
    const cur=HUNT_TARGETS.find(t=>!found.has(t.type));     // first unfound = current mission
    HUNT_TARGETS.forEach(t=>{ const tile=tabEls[t.type];
      tile.classList.remove("completed","current","locked"); tile.disabled=false;
      if(found.has(t.type)){ tile.classList.add("completed"); tile.disabled=true; }
      else if(cur&&t.type===cur.type){ tile.classList.add("current"); }
      else { tile.classList.add("locked"); }
    });
    if(cur){ curIcon.innerHTML=shapeGlyph(cur.type); panel.querySelector(".current-strip").setAttribute("aria-label","Current mission: "+cur.title); }
    else { curIcon.textContent="🎉"; panel.querySelector(".current-strip").setAttribute("aria-label","All shapes found!"); }
  }
  refreshPanel();

  function accepts(type, made){
    if(type===made) return true;
    if(type==="zigzag" && made==="path") return true;     // a long bendy path counts as a zig-zag
    if(type==="letter L" && made==="corner") return true; // a bent two-line corner counts as an L
    return false;
  }

  // ---- controls: Undo / Clear stay in the bottom dock; Continue (primary) + Skip
  //      live in the right-side mission dock, tucked just under the panel ----
  const done=mkBtn("Continue ➜","hc-continue",()=>{ stopHuntAudio(); revealConstellation(); }); done.disabled=true;
  controls.appendChild(mkBtn("↶ Undo","hc-undo",()=>field.undo()));
  controls.appendChild(mkBtn("⟲ Clear","hc-clear",()=>field.clear()));
  navDock.appendChild(done);
  // Skip lets the child move on without finding all shapes
  navDock.appendChild(mkBtn("Skip ➜","hc-skip",()=>{ stopHuntAudio(); revealConstellation(); }));

  // ---- celebration + intermittent surprises ----
  const SURPRISES=["✨ Sharp Eyes!","🔭 Pattern Finder!","🌟 Sky Explorer!","⭐ Star Detective!"];
  function showBadge(label){
    const cel=document.createElement("div"); cel.className="hunt-celebrate";
    cel.innerHTML='<div class="cel-title">'+label+' Found!</div><div class="cel-sub">+2 ⭐</div>';
    s.appendChild(cel); setTimeout(()=>cel.remove(),1400);
  }
  function surprise(){
    const idx=Math.floor(found.size/3)-1;
    const el=document.createElement("div"); el.className="hunt-surprise";
    el.textContent=SURPRISES[((idx%SURPRISES.length)+SURPRISES.length)%SURPRISES.length];
    s.appendChild(el); setTimeout(()=>el.remove(),1600);
  }

  function tryFind(t){
    if(celebrating) return;                                  // brief lock during the celebration
    if(found.has(t.type)) return;
    if(field.starCount()<2){ Sfx.retry(); pulseCoach("think",1000); coachSay("Pick a few stars first, then tap a card."); return; }
    const made=identifyShape(STARS, field.edges());
    if(accepts(t.type, made)){
      found.add(t.type);
      refreshPanel(true);
      Rewards.earn(2); Sfx.found(); updateHud(true);
      // celebrate: glow the made lines + sparkle each used star
      const usedIdx=[...new Set(field.edges().flatMap(e=>[e[0],e[1]]))];
      field.svg.classList.add("shape-celebrate");
      usedIdx.forEach(i=>sparkleStar(STARS[i].x*100, STARS[i].y*100));
      const left=NEED-found.size;
      pulseCoach("cheer",900);
      if(left>0){
        if(left<=2) coach.classList.add("excited");         // near the end: stay excited
        showBadge(t.label);
        if(found.size%3===0) surprise();                    // intermittent delight every 3 shapes
        celebrating=true;
        setTimeout(()=>{ field.svg.classList.remove("shape-celebrate"); field.clear(); renderProgress(); celebrating=false; cue(left); },900);
      } else {
        setTimeout(()=>field.svg.classList.remove("shape-celebrate"),1000);
        finish();
      }
    } else {
      Sfx.retry();
      wrap.classList.remove("shake"); void wrap.offsetWidth; wrap.classList.add("shake");
      setTimeout(()=>wrap.classList.remove("shake"),440);
      pulseCoach("think",1000);
      coachSay("Good try! Look carefully again.");
      playHunt("good try look again carefully.wav");
    }
  }

  // when every shape is found, Kabir's full character appears centre-stage with a dialogue box
  function finish(){
    Rewards.giveBadge("PF","Pattern Finder","Found all the shapes","🔭");
    Rewards.setTitle("Pattern Finder");
    field.clear();
    coach.style.display="none";                  // hide the corner coach
    s.classList.add("complete");                 // soft sky glow
    heroSay.textContent="You are a champion! We found all the shapes and patterns. Let's move ahead and find some more.";
    playHunt("all 6 found.wav");
    heroStage.classList.add("show");             // full Kabir centre-stage + dialogue box (no float)
    if(!reduceMotion){ for(let k=0;k<14;k++) sparkleStar(8+Math.random()*((100*aspect)-16), 8+Math.random()*84); }
    done.disabled=false; done.classList.add("pulse");
  }

  // ---- click ripple on interactive stars (added at svg level; does not touch the field engine) ----
  field.svg.addEventListener("click",e=>{
    const hit=e.target.closest?e.target.closest(".starhit"):null; if(!hit) return;
    const node=hit.closest(".starnode"); if(!node) return;
    const idx=Array.prototype.indexOf.call(node.parentNode.children,node);
    if(idx<0||!STARS[idx]) return;
    rippleStar(STARS[idx].x*100, STARS[idx].y*100);
  });

  // ---- light cursor magic: nearby interactive stars glow ----
  if(!reduceMotion){
    const starNodes=Array.prototype.slice.call(field.svg.querySelectorAll(".starnode:not(.deco)"));
    let rects=[];
    const cache=()=>{ const wr=wrap.getBoundingClientRect();
      rects=starNodes.map(n=>{ const r=n.getBoundingClientRect(); return {n,cx:r.left+r.width/2-wr.left,cy:r.top+r.height/2-wr.top}; }); };
    setTimeout(cache,60);
    let raf=0,mx=-1,my=-1;
    wrap.addEventListener("mousemove",e=>{ const wr=wrap.getBoundingClientRect(); mx=e.clientX-wr.left; my=e.clientY-wr.top;
      if(!raf) raf=requestAnimationFrame(()=>{ raf=0; rects.forEach(o=>{ o.n.classList.toggle("near", Math.hypot(mx-o.cx,my-o.cy)<72); }); }); });
    wrap.addEventListener("mouseleave",()=>{ starNodes.forEach(n=>n.classList.remove("near")); });
  }
};

/* ---------- SCENE 7: TRACING (full-screen) ---------- */
SCENES.trace=()=>{
  Speech.stop();
  const step=state.huntStep||0;
  const c=byId(HUNT_SEQ[step]);
  screen.innerHTML="";

  const s=document.createElement("div"); s.className="scene trace-stage";
  // full-screen star field — the tracing area
  const fieldBox=document.createElement("div"); fieldBox.className="tracefield"; s.appendChild(fieldBox);

  // left rail: reference image, Meera + floating bubble, controls
  const rail=document.createElement("div"); rail.className="trace-rail";
  const ref=document.createElement("div"); ref.className="trace-ref"; ref.innerHTML='<div class="rlabel">REFERENCE</div>';
  if(c.img){ const im=document.createElement("img"); im.src=encodeURI(c.img); im.alt=c.name+" reference"; ref.appendChild(im); }
  else { const d=document.createElement("div"); ref.appendChild(d); drawDiagram(d,c.stars,c.edges,"150"); }
  rail.appendChild(ref);
  const meera=document.createElement("div"); meera.className="trace-meera";
  meera.innerHTML=((typeof IMG!=="undefined"&&IMG.meera)?'<img class="face" src="'+IMG.meera+'" alt="Meera">':'')+
    '<div class="trace-bubble"><div class="who">Meera</div><span id="traceMsg"></span></div>';
  rail.appendChild(meera);
  const controls=document.createElement("div"); controls.className="trace-controls"; rail.appendChild(controls);
  s.appendChild(rail);

  // clue, top-right (golden)
  const clueWrap=document.createElement("div"); clueWrap.className="trace-clue"; s.appendChild(clueWrap);

  screen.appendChild(s);

  function setMsg(t){ const m=document.getElementById("traceMsg"); if(m) m.textContent=t; Speech.speak(t,null,"Meera"); }
  function setMsgQuiet(t){ const m=document.getElementById("traceMsg"); if(m) m.textContent=t; }

  // build the busy sky after measuring, so the stars spread evenly across the screen
  const aspect=Math.max(1.15,(fieldBox.clientWidth||window.innerWidth)/(fieldBox.clientHeight||window.innerHeight));
  const lf=buildLevelFieldFS(c, aspect);
  let solved=false, cuesUsed=0, failCount=0, attemptScored=false;
  const MAXCLUES=5;
  const targetCount=c.edges.length;                 // how many lines the shape has
  const targetStars=new Set(c.edges.flat()).size;   // how many stars the shape uses
  const SHAPE_TOL=(c.tol!=null)?c.tol:0.22;          // visual similarity tolerance

  /* The child may connect ANY stars, but the traced figure must either match the
     reference connections or strongly overlap the reference shape. */
  function isMatch(){ return shapesMatch(c.stars,c.edges, lf.stars,field.edges(), SHAPE_TOL); }

  const field=createStarField(fieldBox,lf.stars,{starScale:0.45, vbW:Math.round(100*aspect), onChange:()=>{
    if(solved) return;
    const n=field.edges().length;
    if(isMatch()){ win(); return; }
    if(n===0){ attemptScored=false; setMsgQuiet("Find the stars and connect them to make the shape in the picture."); return; }
    // a full attempt (enough lines) that doesn't match → tell the child to redo
    if(n>=targetCount){
      if(!attemptScored){
        attemptScored=true; failCount++; Sfx.retry();
        if(failCount>=2) setMsg("That doesn't look like "+c.name+" yet. Tap the 💡 Clue button in the top-right corner for help.");
        else setMsg("Hmm, that doesn't look like the picture. Tap Clear and try again.");
      }
    } else { attemptScored=false; setMsgQuiet("Keep connecting the stars to match the picture…"); }
  }});

  // small golden Undo / Clear / Continue (Continue unlocks when solved)
  controls.appendChild(mkBtn("↶ Undo","small",()=>{ if(!solved) field.undo(); }));
  controls.appendChild(mkBtn("⟲ Clear","small",()=>{ if(!solved){ field.clear(); setMsgQuiet("Find some stars and connect them to make the shape in the picture."); } }));
  const cont=mkBtn("Continue ➜","small",()=>{ if(solved) show("reveal"); }); cont.disabled=true;
  controls.appendChild(cont);

  // clue button (golden), up to 5 hints
  const cueBtn=mkBtn("💡 Clue ("+MAXCLUES+")","small",()=>{
    if(solved||cuesUsed>=MAXCLUES) return;
    cuesUsed++;
    if(cuesUsed===1){ field.highlight(lf.brightIdx); setMsg("Start with the brightest stars — find them first."); }
    else if(cuesUsed===2){ field.highlight(lf.constIdx); setMsg("These glowing stars make the shape. Connect them like the picture."); }
    else {
      const have=new Set(field.keys());
      const ne=lf.edges.find(([a,b])=>!have.has(Math.min(a,b)+"-"+Math.max(a,b)));
      if(ne){ field.highlight([ne[0],ne[1]]); field.ghost(ne[0],ne[1]); setMsg("Follow the dotted line next."); }
      else { field.highlight(lf.constIdx); setMsg("Connect the glowing stars just like the picture."); }
    }
    cueBtn.textContent=cuesUsed>=MAXCLUES?"💡 No clues left":"💡 Clue ("+(MAXCLUES-cuesUsed)+")";
    if(cuesUsed>=MAXCLUES) cueBtn.disabled=true;
  });
  clueWrap.appendChild(cueBtn);

  function win(){
    solved=true; Sfx.win();
    if(!state.huntLevelsComplete.includes(c.id)) state.huntLevelsComplete.push(c.id);
    Rewards.earn(4);
    if(cuesUsed===0){ Rewards.earn(2); Rewards.giveBadge("IE","Independent Explorer","Solved with no clues","🧭"); }
    Rewards.giveBadge("SW","Stargazer","Traced your first constellation","✨");
    renderProgress();
    cueBtn.disabled=true;
    cont.disabled=false; cont.classList.add("pulse");
    setMsg("Yes! You found "+c.name+"! Press Continue.");
  }

  setMsg("Find the stars that match the picture and connect them. Tap Clue if you get stuck.");
};
