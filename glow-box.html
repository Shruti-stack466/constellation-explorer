<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Glow-Box Mystery</title>
<style>
  /* Soft magical Star-Lab type system — loads from the web, falls back to system-ui offline */
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&family=Orbitron:wght@400;500;600;700;800&family=Exo+2:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root{
    /* ---- Cosmic HUD palette (matches the Glow-Box entry screen) ---- */
    --bg-deep:#030711;
    --panel-navy:#08142B;
    --neon-blue:#7DB7FF;
    --soft-violet:#9D8CFF;
    --cta-violet:#372D7D;
    --current-yellow:#FFD75A;
    --led-warm:#FFA72A;

    --launchpad-border:rgba(125,183,255,.65);

    --accent-violet:#9D8CFF;
    --accent-violet-dark:#B9AEFF;
    --accent-orange:#ff9f43;
    --accent-yellow:#FFD75A;

    --success-green:#62d58b;
    --success-glow:rgba(98,213,139,.35);
    --error-coral:#ff7a7a;

    --text-primary:#F4F6FF;
    --text-secondary:#B9C4E8;

    --shadow-soft:0 10px 28px rgba(2,6,18,.55);
    --shadow-card:0 8px 18px rgba(2,6,18,.5);
    --shadow-button:0 0 18px rgba(125,183,255,.4);

    --font-heading:'Rajdhani','Fredoka',system-ui,sans-serif;
    --font-ui:'Orbitron','Rajdhani',system-ui,sans-serif;
    --font-body:'Nunito','Poppins',system-ui,sans-serif;

    --panel:#0B1834;
    --glow-green:#62d58b;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:var(--font-body);}
  #game{
    position:fixed;inset:0;
    background:
      radial-gradient(circle at 22% 16%, rgba(84,60,180,.30), transparent 42%),
      radial-gradient(circle at 82% 10%, rgba(45,90,200,.26), transparent 40%),
      radial-gradient(circle at 72% 86%, rgba(120,70,210,.20), transparent 44%),
      radial-gradient(circle at 10% 80%, rgba(40,110,220,.16), transparent 40%),
      linear-gradient(180deg,#050a1c 0%,#030711 55%,#060420 100%);
    user-select:none;touch-action:none;
  }

  /* ---------- Deep-space nebula atmosphere (matches the entry screen) ---------- */
  #room-bg{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 60% 42% at 50% 28%, rgba(125,183,255,.10), transparent 62%),
      radial-gradient(ellipse 50% 36% at 22% 72%, rgba(157,140,255,.12), transparent 65%),
      radial-gradient(ellipse 46% 34% at 84% 64%, rgba(90,120,255,.10), transparent 65%);
  }
  /* soft dark vignette: keeps the centre readable, edges cinematic */
  #pastel-overlay{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 44%, transparent 42%, rgba(2,5,14,.5) 100%);
  }
  /* thin star field */
  #pattern-layer{
    position:absolute;inset:0;z-index:0;opacity:.5;pointer-events:none;
    background-image:
      radial-gradient(rgba(244,246,255,.9) 1.1px, transparent 1.5px),
      radial-gradient(rgba(180,205,255,.7) .9px, transparent 1.3px),
      radial-gradient(rgba(157,140,255,.55) 1.3px, transparent 1.7px);
    background-size:190px 190px, 120px 120px, 260px 260px;
    background-position:0 0, 42px 64px, 96px 28px;
  }

  /* ---------- Companion standees (coach corner: lower sides) ---------- */
  #kabir,#meera{
    position:absolute;
    height:min(62vh,600px);
    filter:drop-shadow(0 10px 16px rgba(0,0,0,.42));
    transition:transform .3s, filter .3s;
    z-index:25;pointer-events:none;
  }
  #kabir{left:-14vw;bottom:-12vh;}
  #meera{right:-14vw;bottom:-7vh;}
  #kabir.speaking,#meera.speaking{
    transform:translateY(-10px) scale(1.04);
    filter:drop-shadow(0 16px 20px rgba(0,0,0,.5)) drop-shadow(0 0 14px rgba(255,235,150,.65));
  }
  /* subtle glowing platform rings under the companions — grounds them in the space UI */
  .char-ring{position:absolute;z-index:24;pointer-events:none;
    width:min(22vw,280px);height:min(6vh,52px);border-radius:50%;
    background:radial-gradient(ellipse at center, rgba(125,183,255,.38), rgba(125,183,255,.12) 55%, transparent 72%);
    box-shadow:0 0 26px rgba(125,183,255,.22);
    filter:blur(1px);animation:ringPulse 4s ease-in-out infinite;}
  #kabir-ring{left:-2vw;bottom:1vh;}
  #meera-ring{right:-2vw;bottom:2vh;}
  @keyframes ringPulse{0%,100%{opacity:.7}50%{opacity:1}}

  /* ---------- Floating dialogue bubble (near the speaker) ---------- */
  #dialogue{
    position:absolute;z-index:30;cursor:pointer;
    width:min(15.5vw,205px);
    background:var(--panel);
    border:2px solid rgba(125,183,255,.6);
    border-radius:16px;
    padding:8px 18px 8px 11px;
    box-shadow:0 0 16px rgba(125,183,255,.25), var(--shadow-card);
    transition:opacity .25s;
    left:1.5vw;bottom:46vh;
  }
  #dialogue::after{
    content:"";position:absolute;bottom:-11px;width:0;height:0;
    border-left:10px solid transparent;border-right:10px solid transparent;
    border-top:12px solid var(--panel);
    left:26px;
  }
  #dialogue.anchor-right::after{left:auto;right:26px;}
  #dialogue.anchor-center::after{left:50%;transform:translateX(-50%);}
  #dialogue .speaker{display:inline-flex;background:var(--accent-violet);color:#fff;
    border-radius:999px;padding:2px 9px;font-family:var(--font-body);font-weight:900;
    font-size:clamp(9px,.85vw,12px);margin-bottom:4px;letter-spacing:.3px;}
  #dialogue .line{color:var(--text-primary);font-family:var(--font-body);font-weight:700;
    font-size:clamp(11px,1vw,14px);line-height:1.24;min-height:1.24em;}
  #dialogue .next{position:absolute;right:10px;bottom:6px;color:var(--accent-violet);font-size:14px;animation:bob 1s infinite;}
  @keyframes bob{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
  #dialogue.hide{opacity:0;pointer-events:none;}

  /* ---------- Action button ---------- */
  #actionbar{position:absolute;left:50%;bottom:4.5vh;transform:translateX(-50%);z-index:40;display:flex;gap:12px;}
  .btn{
    min-height:56px;
    background:
      radial-gradient(circle at 50% 115%, rgba(157,140,255,.35), transparent 46%),
      linear-gradient(180deg, rgba(55,45,125,.95), rgba(18,13,56,.97));
    color:#F4F6FF;font-family:var(--font-ui);font-weight:500;font-size:clamp(14px,1.6vw,19px);
    letter-spacing:.1em;text-transform:uppercase;
    border:2px solid rgba(125,183,255,.9);border-radius:18px;padding:13px 30px;
    box-shadow:0 0 18px rgba(125,183,255,.4),0 0 40px rgba(157,140,255,.25),
      inset 0 1px 0 rgba(255,255,255,.12);
    cursor:pointer;
    transition:transform .14s, box-shadow .25s, border-color .2s;animation:btnIn .4s ease-out;
  }
  .btn:hover{transform:translateY(-2px);border-color:rgba(190,215,255,1);
    box-shadow:0 0 26px rgba(125,183,255,.6),0 0 52px rgba(157,140,255,.35),inset 0 1px 0 rgba(255,255,255,.14);}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:2px solid rgba(190,205,255,.95);outline-offset:3px;}
  @keyframes btnIn{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}

  /* ---------- Workbench stage ---------- */
  #stage{
    position:absolute;left:50%;top:46%;z-index:5;
    transform:translate(-50%,-50%);
    width:min(68vw,1100px);
    height:min(54vh,600px);
    display:flex;align-items:center;justify-content:center;
  }
  .bench-panel{
    position:relative;width:100%;height:100%;padding:2.4% 3%;
    background:linear-gradient(180deg, rgba(12,24,52,.72), rgba(6,13,32,.8));
    border:2px solid var(--launchpad-border);
    border-radius:28px;
    box-shadow:0 0 26px rgba(125,183,255,.28), 0 0 60px rgba(90,120,255,.14),
      inset 0 1px 0 rgba(255,255,255,.08), inset 0 0 46px rgba(30,60,140,.18);
    -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
    animation:benchIn .6s ease-out;
  }
  /* faint HUD grid inside the panel, fading out toward the edges */
  .bench-panel::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:
      linear-gradient(rgba(125,183,255,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(125,183,255,.055) 1px, transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(115% 100% at 50% 50%, #000 52%, transparent 98%);
    mask-image:radial-gradient(115% 100% at 50% 50%, #000 52%, transparent 98%);}
  @keyframes benchIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

  #board{position:absolute;inset:3% 3% 4% 3%;}
  #board svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;touch-action:none;z-index:4;pointer-events:none;}
  /* dotted guide routes render above the battery/LED/switch images (comps are z 5),
     but below the terminal dots (z 9) and the demo hand (z 12) */
  #board svg.guide-svg{z-index:7;}

  /* ---------- Wires ---------- */
  .wbase{fill:none;stroke:#8fa4cf;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 1px 3px rgba(2,6,18,.6));transition:stroke .4s, filter .4s;}
  #board.live .wbase{stroke:#DCEAFF;
    filter:drop-shadow(0 0 4px rgba(160,200,255,.4));}
  .wcur{fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .4s;}
  #board.live.mode-light .wcur{opacity:1;stroke:#1D4ED8;stroke-width:4.5;stroke-dasharray:.1 23.9;
    animation:flow .9s linear infinite;filter:drop-shadow(0 0 3px rgba(60,110,255,.35));}
  #board.live.mode-faint .wcur{opacity:.85;stroke:rgba(37,80,190,.8);stroke-width:5;stroke-dasharray:2.5 30;
    animation:flow 2.4s linear infinite;}
  /* stream mode matches the first screen exactly — same dots, same unhurried pace */
  #board.live.mode-stream .wcur{opacity:1;stroke:#1D4ED8;stroke-width:4.5;stroke-dasharray:.1 23.9;
    animation:flow .9s linear infinite;
    filter:drop-shadow(0 0 3px rgba(60,110,255,.35));}
  @keyframes flow{to{stroke-dashoffset:-96;}}
  .whit{fill:none;stroke:rgba(0,0,0,0);stroke-width:34;stroke-linecap:round;stroke-linejoin:round;cursor:pointer;pointer-events:stroke;}
  .wtemp{fill:none;stroke:rgba(125,183,255,.85);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:11 14;pointer-events:none;filter:drop-shadow(0 0 5px rgba(125,183,255,.6));}

  /* ---------- Terminals (HTML dots that sit ON the image's terminals) ---------- */
  .tdot{position:absolute;transform:translate(-50%,-50%);
    width:clamp(15px,1.8vw,23px);height:clamp(15px,1.8vw,23px);border-radius:50%;
    background:rgba(255,255,255,.94);border:3px solid #ff9f43;
    box-shadow:0 1px 4px rgba(120,80,20,.5);cursor:crosshair;touch-action:none;z-index:9;
    transition:background .25s, border-color .25s, transform .15s;}
  .tdot::after{content:"";position:absolute;inset:-13px;border-radius:50%;}  /* fat invisible touch pad */
  /* the switch's pin dots are smaller, so they don't crowd its little legs */
  #switch .tdot{width:clamp(11px,1.3vw,16px);height:clamp(11px,1.3vw,16px);border-width:2px;}
  .tdot.pos{border-color:#e23b3b;}
  .tdot.neg{border-color:#2f6bd8;}
  .tdot.pulse{animation:termPulse 1.5s ease-in-out infinite;}
  @keyframes termPulse{0%,100%{box-shadow:0 1px 4px rgba(120,80,20,.5), 0 0 3px rgba(255,180,50,.4)}
    50%{box-shadow:0 1px 4px rgba(120,80,20,.5), 0 0 14px rgba(255,180,50,.95)}}
  .tdot.busy{background:#fff3c7;border-color:#c2a64d;animation:none;}
  #board.live .tdot.busy{background:#E4EFFF;border-color:#7DB7FF;
    box-shadow:0 0 6px rgba(125,183,255,.6);}
  .tdot.sel{background:#ffd84d;border-color:#ff9f43;transform:translate(-50%,-50%) scale(1.28);animation:termPulse .8s ease-in-out infinite;}
  .tdot.cand{background:#8ee6b4;border-color:#39b57a;animation:termPulse .8s ease-in-out infinite;}

  /* ---------- Guiding hand (Visuals/hand icon.png) ----------
     .hand-drag glides between two terminals (--hx0/--hy0 → --hx1/--hy1, % of its container);
     .hand-tap presses in place. The translate anchors the FINGERTIP (≈46% across, 20% down
     in the artwork) on the target point. */
  .hand-icon{position:absolute;z-index:12;pointer-events:none;
    width:clamp(46px,5.6vw,78px);height:auto;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.55)) drop-shadow(0 0 14px rgba(125,183,255,.65));}
  .hand-drag{left:var(--hx0);top:var(--hy0);animation:handDrag 3.4s ease-in-out .6s infinite both;}
  @keyframes handDrag{
    0%  {left:var(--hx0);top:var(--hy0);opacity:0;transform:translate(-46%,-20%) scale(1);}
    9%  {opacity:1;transform:translate(-46%,-20%) scale(1);}
    17% {left:var(--hx0);top:var(--hy0);transform:translate(-46%,-20%) scale(.8);}   /* press the dot */
    40% {left:var(--hxm,var(--hx1));top:var(--hym,var(--hy1));transform:translate(-46%,-20%) scale(.8);} /* ride the arc */
    62% {left:var(--hx1);top:var(--hy1);transform:translate(-46%,-20%) scale(.8);}   /* land on the dot */
    72% {left:var(--hx1);top:var(--hy1);opacity:1;transform:translate(-46%,-20%) scale(1);} /* release */
    100%{left:var(--hx1);top:var(--hy1);opacity:0;transform:translate(-46%,-20%) scale(1);}}
  .hand-tap{animation:handTap 1.5s ease-in-out .3s infinite both;}
  @keyframes handTap{
    0%,100%{transform:translate(-46%,-20%) scale(1);opacity:.95;}
    38%{transform:translate(-46%,-20%) scale(.78);opacity:1;}
    56%{transform:translate(-46%,-20%) scale(1.04);}}

  /* ---------- Components ---------- */
  .comp{position:absolute;transform:translate(-50%,-50%);aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;z-index:5;}
  .comp .cimg{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));}

  /* ---------- Meet the parts onboarding ---------- */
  .parts-intro-active #kabir,.parts-intro-active #meera,
  .parts-intro-active .char-ring{opacity:0;}
  .parts-panel{position:relative;width:100%;height:100%;padding:clamp(18px,3vw,34px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(18px,3vh,30px);
    background:linear-gradient(180deg,rgba(12,24,52,.78),rgba(6,13,32,.88));
    border:2px solid var(--launchpad-border);border-radius:28px;
    box-shadow:0 0 26px rgba(125,183,255,.28),0 0 60px rgba(90,120,255,.14),
      inset 0 1px 0 rgba(255,255,255,.08),inset 0 0 46px rgba(30,60,140,.18);
    -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);animation:benchIn .45s ease-out;}
  .parts-panel::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(rgba(125,183,255,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(125,183,255,.05) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(110% 100% at 50% 50%,#000 50%,transparent 98%);
    mask-image:radial-gradient(110% 100% at 50% 50%,#000 50%,transparent 98%);}
  .parts-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
    align-items:center;width:min(92%,780px);gap:clamp(18px,4vw,70px);}
  .parts-card{position:relative;min-width:0;border:0;background:transparent;color:var(--text-primary);
    display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;
    font:inherit;text-align:center;transform:scale(1);transform-origin:center;
    transition:transform .24s cubic-bezier(.2,.8,.25,1),filter .24s ease;z-index:1;}
  button.parts-card{cursor:pointer;touch-action:manipulation;}
  button.parts-card:hover{filter:drop-shadow(0 0 15px rgba(125,183,255,.55));}
  button.parts-card:focus-visible{outline:3px solid #F4F1FF;outline-offset:4px;border-radius:18px;}
  .parts-card.active{filter:drop-shadow(0 0 18px rgba(125,183,255,.65));z-index:5;}
  .parts-visual{position:relative;width:100%;max-width:190px;aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;transform:scale(1);
    transition:transform .24s cubic-bezier(.2,.8,.25,1);pointer-events:none;}
  .parts-card.active .parts-visual{transform:scale(1.5);}
  .parts-image{width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,.4));}
  .parts-face{position:absolute;left:50%;top:48%;width:38%;height:auto;transform:translate(-50%,-50%);
    opacity:0;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
    transition:opacity .16s ease;}
  .parts-card.active .parts-face{opacity:1;}
  .parts-name{font-family:var(--font-ui);font-weight:600;font-size:clamp(12px,1.3vw,16px);
    letter-spacing:.08em;text-transform:uppercase;color:#EAF1FF;
    text-shadow:0 0 10px rgba(125,183,255,.45);}
  .parts-met{min-height:18px;font-size:clamp(11px,1vw,13px);font-weight:800;color:var(--success-green);
    opacity:0;transition:opacity .2s ease;}
  .parts-card.visited .parts-met{opacity:1;}
  .parts-prompt{position:relative;z-index:2;margin:0;color:var(--text-secondary);font-weight:800;
    font-size:clamp(15px,1.5vw,19px);text-align:center;}
  .parts-speech{position:relative;z-index:2;width:min(92%,760px);min-height:92px;
    display:flex;align-items:center;justify-content:center;padding:14px 22px;border-radius:20px;
    background:linear-gradient(180deg,rgba(16,30,64,.96),rgba(8,16,38,.97));
    border:2px solid rgba(157,140,255,.65);
    box-shadow:0 0 20px rgba(157,140,255,.28),var(--shadow-card);
    color:var(--text-primary);font-size:clamp(14px,1.35vw,18px);font-weight:700;line-height:1.45;text-align:center;}
  .parts-speech strong{color:var(--current-yellow);font-weight:900;}
  .parts-speech-name{font-family:var(--font-ui);color:#CFC6FF;letter-spacing:.05em;}

  /* the bulb is dark until current flows */
  #bulb .cimg{filter:brightness(.55) saturate(.55) drop-shadow(0 4px 8px rgba(0,0,0,.35));transition:filter .4s;}
  #bulb.lit .cimg{filter:brightness(1.05) saturate(1.1) drop-shadow(0 0 16px rgba(255,224,110,.9));}
  #bulb.firstglow{animation:glowPop .8s ease-out;}
  @keyframes glowPop{0%{transform:translate(-50%,-50%) scale(1)}
    40%{transform:translate(-50%,-50%) scale(1.18)}100%{transform:translate(-50%,-50%) scale(1)}}
  .ledglow{position:absolute;inset:-45%;border-radius:50%;pointer-events:none;z-index:-1;opacity:0;transition:opacity .4s;
    background:radial-gradient(circle,rgba(255,240,160,.75) 0%,rgba(255,167,42,.4) 36%,rgba(255,167,42,0) 68%);}
  .comp.lit .ledglow{opacity:1;animation:pulseGlow 1.4s ease-in-out infinite;}
  @keyframes pulseGlow{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.12);opacity:1}}

  /* battery + / – terminal badges */
  .polbadge{position:absolute;top:50%;transform:translateY(-50%);
    width:1.3em;height:1.3em;line-height:1.24em;text-align:center;border-radius:50%;
    color:#fff;font-weight:900;font-size:clamp(13px,1.5vw,21px);
    border:2px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.5);z-index:2;pointer-events:none;}
  .polbadge.neg{left:12%;background:#2f6bd8;}
  .polbadge.pos{right:12%;background:#e23b3b;}

  /* switch */
  #switch{cursor:pointer;}
  .switch-badge{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
    background:rgba(70,84,120,.95);color:#fff;font-weight:800;font-size:12px;padding:2px 12px;border-radius:999px;
    box-shadow:0 3px 6px rgba(0,0,0,.3);letter-spacing:1px;transition:background .2s;z-index:3;pointer-events:none;}
  #switch.on .switch-badge{background:var(--glow-green);}
  #switch.glowtap .cimg{animation:tapPulse 1.1s ease-in-out infinite;}
  @keyframes tapPulse{0%,100%{filter:drop-shadow(0 0 4px rgba(255,224,138,.5))}
    50%{filter:drop-shadow(0 0 22px rgba(255,224,138,.95))}}

  /* ---------- Loose-wire pile ---------- */
  #wirepile{position:absolute;left:2.5%;top:4%;z-index:6;display:flex;flex-direction:column;
    align-items:center;gap:2px;transition:opacity .3s;}
  #wirepile img{width:clamp(54px,5.5vw,84px);height:auto;object-fit:contain;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));}
  #wirepile .count{background:rgba(8,20,43,.92);border:2px solid rgba(125,183,255,.55);border-radius:999px;
    padding:2px 12px;font-weight:900;color:var(--text-primary);font-size:clamp(12px,1.1vw,15px);
    box-shadow:0 0 12px rgba(125,183,255,.25), var(--shadow-card);}
  #wirepile.empty{opacity:.35;}
  #wirepile.wiggle{animation:wiggle .5s;}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}

  .board-greenpulse{animation:boardPulse .9s ease-out;}
  @keyframes boardPulse{0%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}
    45%{filter:drop-shadow(0 0 30px rgba(87,227,137,.9))}100%{filter:drop-shadow(0 0 0 rgba(87,227,137,0))}}

  .confetti{position:absolute;width:10px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards;z-index:61;}
  @keyframes fall{to{transform:translateY(105vh) rotate(600deg);opacity:.4;}}

  /* ---------- Entry gate (the "Check the Bulb" hand-over from the bridge) ----------
     Night-sky opening styled to match the Constellation Explorer home scene. */
  #entry{position:absolute;inset:0;z-index:70;display:flex;flex-direction:column;
    align-items:center;justify-content:center;overflow:hidden;
    padding:max(24px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right))
      max(24px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));
    background:
      radial-gradient(90% 70% at 78% 20%, rgba(198,62,172,.30), transparent 55%),
      radial-gradient(80% 65% at 12% 68%, rgba(126,62,205,.27), transparent 60%),
      radial-gradient(70% 55% at 42% 40%, rgba(10,6,24,.8), transparent 70%),
      linear-gradient(160deg,#0d0722 0%,#110829 45%,#050311 100%);
    transition:opacity .6s;}
  #entry.gone{opacity:0;pointer-events:none;}
  #entry .eb-sky{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
  /* subtle dark overlay over the whole background for readability (galaxy stays visible) */
  #entry .eb-shade{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, rgba(6,4,20,.28), rgba(6,4,20,.5) 100%);}
  /* full-screen looping video background (over the gradient/nebula fallback, under content) */
  #entry .eb-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#050311;}
  #entry .eb-vidtint{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg,rgba(5,3,17,.45) 0%,transparent 24%,transparent 52%,rgba(5,3,17,.60) 100%);}
  #entry .eb-content{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:2;
    display:flex;flex-direction:column;align-items:center;
    width:min(calc(100% - 32px),1320px);text-align:center;}
  #entry .estars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
  /* drifting nebula / cloud glow layers — deep violet, crimson-magenta, reddish pink
     and cool cyan space clouds, like the poster */
  /* the glow sits off-centre in each cloud, so the slow full rotation reads as a swirl */
  #entry .eb-nebula{position:absolute;border-radius:50%;filter:blur(60px);opacity:.55;pointer-events:none;}
  #entry .eb-nebula.n1{width:64vw;height:64vw;left:-12vw;top:-14vw;
    background:radial-gradient(circle at 38% 42%,rgba(98,66,238,.62),transparent 66%);animation:ebNeb 46s linear infinite;}
  #entry .eb-nebula.n2{width:60vw;height:60vw;right:-14vw;bottom:-18vw;
    background:radial-gradient(circle at 60% 38%,rgba(208,44,152,.58),transparent 66%);animation:ebNeb 54s linear infinite reverse;}
  #entry .eb-nebula.n3{width:52vw;height:52vw;right:-10vw;top:-12vw;
    background:radial-gradient(circle at 42% 58%,rgba(238,70,122,.5),transparent 64%);animation:ebNeb 50s linear 3s infinite;}
  #entry .eb-nebula.n4{width:46vw;height:46vw;left:-8vw;bottom:-14vw;
    background:radial-gradient(circle at 58% 44%,rgba(255,110,180,.32),transparent 64%);animation:ebNeb 58s linear 6s infinite reverse;}
  #entry .eb-nebula.n5{width:40vw;height:40vw;left:30vw;top:30vh;
    background:radial-gradient(circle at 40% 40%,rgba(76,50,182,.42),transparent 66%);animation:ebNeb 62s linear 9s infinite;}
  /* cyan accents drifting among the warm clouds */
  #entry .eb-nebula.n6{width:38vw;height:38vw;left:6vw;top:4vh;
    background:radial-gradient(circle at 56% 42%,rgba(72,206,235,.34),transparent 64%);animation:ebNeb 52s linear 4s infinite reverse;}
  #entry .eb-nebula.n7{width:34vw;height:34vw;right:8vw;bottom:6vh;
    background:radial-gradient(circle at 44% 56%,rgba(60,190,220,.28),transparent 64%);animation:ebNeb 60s linear 11s infinite;}
  @keyframes ebNeb{0%{transform:translate(0,0) rotate(0deg) scale(1)}
    50%{transform:translate(3%,-3%) rotate(180deg) scale(1.08)}
    100%{transform:translate(0,0) rotate(360deg) scale(1)}}
  /* milky-way galaxy band: a wide hazy diagonal ribbon + a brighter cyan-tinted core;
     makeEntrySky() sprinkles hundreds of dust specks along the same line */
  #entry .eb-dust{position:absolute;left:-20%;right:-20%;top:16%;height:60%;transform:rotate(-14deg);
    filter:blur(44px);opacity:.6;pointer-events:none;
    background:linear-gradient(110deg,transparent 0%,rgba(214,150,255,.11) 26%,
      rgba(244,130,222,.18) 50%,rgba(214,150,255,.11) 74%,transparent 100%);}
  #entry .eb-dust2{position:absolute;left:-20%;right:-20%;top:34%;height:22%;transform:rotate(-14deg);
    filter:blur(26px);opacity:.5;pointer-events:none;
    background:linear-gradient(110deg,transparent 0%,rgba(150,225,255,.10) 30%,
      rgba(190,240,255,.16) 50%,rgba(150,225,255,.10) 70%,transparent 100%);}
  /* a second, fainter galaxy arm crossing the other way */
  #entry .eb-dust3{position:absolute;left:-20%;right:-20%;top:8%;height:46%;transform:rotate(17deg);
    filter:blur(40px);opacity:.4;pointer-events:none;
    background:linear-gradient(70deg,transparent 0%,rgba(190,160,255,.09) 30%,
      rgba(230,140,235,.14) 50%,rgba(190,160,255,.09) 70%,transparent 100%);}
  /* hundreds of tiny twinkling background stars */
  #entry .eb-star{position:absolute;border-radius:50%;background:#fff;opacity:var(--o,.6);
    box-shadow:0 0 3px rgba(255,255,255,.45);animation:ebTwinkle 3s ease-in-out infinite;}
  @keyframes ebTwinkle{0%,100%{opacity:calc(var(--o,.6)*.35)}50%{opacity:var(--o,.6)}}
  /* a few larger foreground stars with soft glow + 4-point spikes */
  #entry .eb-bigstar{position:absolute;width:0;height:0;}
  #entry .eb-bigstar .bs-core{position:absolute;left:0;top:0;width:6px;height:6px;border-radius:50%;
    transform:translate(-50%,-50%);background:#fff;
    box-shadow:0 0 7px 1px rgba(255,247,224,.9), 0 0 22px 6px rgba(255,212,94,.5);
    animation:ebBig 4s ease-in-out infinite;}
  #entry .eb-bigstar::before,#entry .eb-bigstar::after{content:"";position:absolute;left:0;top:0;
    transform:translate(-50%,-50%);opacity:.45;
    background:linear-gradient(90deg,transparent,rgba(255,247,224,.85),transparent);}
  #entry .eb-bigstar::before{width:34px;height:2px;}
  #entry .eb-bigstar::after{width:2px;height:34px;}
  @keyframes ebBig{0%,100%{filter:none}50%{filter:brightness(1.25)}}
  /* firefly-like floating sparkles */
  #entry .eb-fly{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffe9a8;
    box-shadow:0 0 6px 2px rgba(255,212,94,.7);opacity:.7;animation:ebFly var(--d,9s) ease-in-out infinite;}
  @keyframes ebFly{0%{transform:translate(0,0);opacity:.15}50%{transform:translate(var(--dx,0),var(--dy,-40px));opacity:.85}100%{transform:translate(0,0);opacity:.15}}
  /* occasional shooting star */
  #entry .eb-shoot{position:absolute;width:150px;height:2px;border-radius:2px;transform-origin:left center;
    background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.95));
    filter:drop-shadow(0 0 6px #fff);opacity:0;animation:ebShoot 1.15s ease-out forwards;}
  #entry .eb-shoot::after{content:"";position:absolute;right:-2px;top:50%;width:5px;height:5px;border-radius:50%;
    transform:translateY(-50%);background:#fff;box-shadow:0 0 8px 2px #fff;}
  @keyframes ebShoot{0%{opacity:0;transform:translate(0,0) rotate(20deg) scaleX(.3)}
    12%{opacity:1}100%{opacity:0;transform:translate(58vw,24vh) rotate(20deg) scaleX(1)}}
  #entry .eb-content{font-family:'Exo 2',var(--font-body);}
  /* Mission label with a thin glowing rule on each side. */
  #entry .eb-eyebrow{display:flex;align-items:center;justify-content:center;gap:clamp(10px,1.6vw,22px);
    width:100%;margin:0 0 clamp(28px,6vh,54px);white-space:nowrap;
    font-family:'Orbitron',var(--font-body);font-weight:500;letter-spacing:.22em;text-transform:uppercase;
    font-size:clamp(13px,1.5vw,23px);color:#C7CBFF;
    text-shadow:0 0 14px rgba(150,165,255,.5);
    animation:fromSpace 1.4s cubic-bezier(.2,.8,.25,1) .15s both;}
  #entry .eb-eyebrow::before,#entry .eb-eyebrow::after{content:"";height:1px;width:clamp(40px,9vw,140px);box-shadow:0 0 8px rgba(150,175,255,.8)}
  #entry .eb-eyebrow::before{background:linear-gradient(90deg,transparent,rgba(180,195,255,.85))}
  #entry .eb-eyebrow::after{background:linear-gradient(90deg,rgba(180,195,255,.85),transparent)}
  #entry h1{margin:0;font-family:'Orbitron',var(--font-heading);font-weight:600;color:#F4F1FF;
    font-size:clamp(46px,5.4vw,88px);letter-spacing:.18em;line-height:1.02;text-align:center;white-space:nowrap;text-transform:uppercase;
    max-width:100%;
    text-shadow:0 0 22px rgba(196,208,255,.55),0 0 46px rgba(150,165,255,.4),0 0 74px rgba(140,95,255,.32),0 2px 12px rgba(0,0,0,.5);
    animation:fromSpace 1.5s cubic-bezier(.2,.8,.25,1) .3s both;}
  /* Thin glowing divider with a small star in the centre. */
  #entry .eb-divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:clamp(24px,4vh,38px) 0 0;
    width:min(400px,74vw);color:#C6CBFF;font-size:14px;line-height:1;
    text-shadow:0 0 10px rgba(150,170,255,.9);
    animation:fromSpace 1.3s cubic-bezier(.2,.8,.25,1) .55s both;}
  #entry .eb-divider::before,#entry .eb-divider::after{content:"";height:1px;flex:1}
  #entry .eb-divider::before{background:linear-gradient(90deg,transparent,rgba(160,175,255,.6))}
  #entry .eb-divider::after{background:linear-gradient(90deg,rgba(160,175,255,.6),transparent)}
  #entry p{margin:clamp(18px,3vh,26px) 0 0;font-family:'Exo 2',var(--font-body);font-weight:400;color:#E9E5FF;
    font-size:clamp(19px,2vw,34px);line-height:1.4;letter-spacing:.035em;text-align:center;max-width:min(90vw,780px);
    text-shadow:0 2px 10px rgba(0,0,0,.62),0 1px 4px rgba(0,0,0,.5);
    animation:fromSpace 1.3s cubic-bezier(.2,.8,.25,1) .75s both;}
  @keyframes fromSpace{
    0%{opacity:0;transform:scale(.06);filter:blur(8px)}
    60%{opacity:1;filter:blur(0)}
    82%{transform:scale(1.05)}
    100%{opacity:1;transform:scale(1);filter:blur(0)}}
  /* Compact mission CTA with a soft blue-violet glow. */
  #entry .btn{width:min(268px,100%);min-height:60px;height:60px;padding:0 24px;border-radius:18px;
    margin-top:clamp(28px,5vh,48px);
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    font-family:'Orbitron',var(--font-body);font-weight:500;font-size:clamp(14px,3.6vw,16px);text-transform:uppercase;letter-spacing:.06em;
    color:#F4F1FF;border:2px solid rgba(145,195,255,.92);
    background:
      radial-gradient(circle at 50% 115%, rgba(142,88,255,.35), transparent 46%),
      linear-gradient(180deg, rgba(31,42,105,.9), rgba(14,10,48,.96));
    box-shadow:0 0 22px rgba(105,165,255,.5),0 0 50px rgba(132,86,255,.38),
      inset 0 1px 0 rgba(255,255,255,.12),inset 0 -12px 26px rgba(90,60,180,.28);
    animation:btnIn .5s ease-out 2.3s both, entryGlow 4s ease-in-out 3s infinite;
    transition:transform .2s ease,box-shadow .25s ease,border-color .2s ease;
    touch-action:manipulation;}
  #entry .btn .eb-spark{font-size:.86em;color:#DCE0FF;text-shadow:0 0 10px rgba(150,175,255,.9)}
  #entry .btn .eb-arrow{font-size:.95em;color:#DCE0FF;text-shadow:0 0 10px rgba(150,175,255,.9);
    transition:transform .2s ease;}
  #entry .btn:hover{transform:translateY(-2px);border-color:rgba(190,205,255,1);
    box-shadow:0 6px 30px rgba(120,160,255,.6),0 0 52px rgba(140,95,255,.42),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -12px 26px rgba(90,60,180,.32);}
  #entry .btn:hover .eb-arrow{transform:translateX(3px);}
  #entry .btn:active{transform:translateY(0) scale(.98);}
  #entry .btn:focus-visible{outline:3px solid #F4F1FF;outline-offset:4px;
    box-shadow:0 0 0 7px rgba(125,183,255,.35),0 0 34px rgba(125,183,255,.65),0 0 60px rgba(140,95,255,.46);}
  /* very soft, slow, non-bouncy pulse: just the blue-violet glow breathing */
  @keyframes entryGlow{
    0%,100%{box-shadow:0 0 18px rgba(105,165,255,.4),0 0 40px rgba(132,86,255,.30),inset 0 1px 0 rgba(255,255,255,.12),inset 0 -12px 26px rgba(90,60,180,.26)}
    50%{box-shadow:0 0 28px rgba(120,175,255,.6),0 0 60px rgba(140,95,255,.46),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -12px 28px rgba(90,60,180,.32)}}

  /* ---------- Certificate finale ---------- */
  #certificate{position:absolute;inset:0;z-index:65;display:none;align-items:center;justify-content:center;
    background:rgba(3,7,17,.6);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  #certificate.show{display:flex;animation:fadeIn .4s;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .cert-card{position:relative;width:min(70vw,640px);text-align:center;
    background:linear-gradient(180deg, rgba(16,30,64,.97), rgba(7,13,32,.98));
    border:2px solid rgba(125,183,255,.7);border-radius:36px;
    box-shadow:0 0 44px rgba(125,183,255,.35), 0 0 80px rgba(157,140,255,.2);
    padding:5% 6%;animation:btnIn .5s ease-out;}
  .cert-card .big{font-size:clamp(38px,5vw,64px);}
  .cert-card h2{font-family:var(--font-heading);color:#F4F6FF;font-size:clamp(22px,2.8vw,36px);margin:8px 0 4px;}
  .cert-card .sub{color:var(--text-secondary);font-weight:800;font-size:clamp(13px,1.4vw,18px);margin-bottom:14px;}
  .word-chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .word-chips span{background:rgba(10,22,48,.92);border:2px solid rgba(157,140,255,.6);border-radius:999px;
    padding:7px 18px;font-family:var(--font-heading);font-weight:700;color:#CFE0FF;
    font-size:clamp(13px,1.4vw,18px);box-shadow:0 0 12px rgba(157,140,255,.22), var(--shadow-card);}

  /* ---------- Learning prompts ---------- */
  #choices{
    position:absolute;left:50%;bottom:10vh;transform:translateX(-50%);
    z-index:42;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
    width:min(86vw,760px);pointer-events:none;
  }
  #choices.show{pointer-events:auto;}
  .choice-btn{
    min-height:48px;border:2px solid rgba(125,183,255,.55);border-radius:999px;
    background:linear-gradient(180deg, rgba(14,26,56,.94), rgba(8,16,38,.96));
    color:var(--text-primary);font-family:var(--font-heading);font-weight:700;
    font-size:clamp(14px,1.5vw,18px);padding:10px 22px;cursor:pointer;
    box-shadow:0 0 12px rgba(125,183,255,.18), var(--shadow-card);
    transition:transform .14s, border-color .14s, background .14s, box-shadow .2s;
  }
  .choice-btn:hover{transform:translateY(-2px);border-color:var(--accent-violet);
    box-shadow:0 0 18px rgba(157,140,255,.35), var(--shadow-card);}
  .choice-btn:active{transform:translateY(2px);}
  .choice-btn:focus-visible{outline:2px solid rgba(190,205,255,.95);outline-offset:3px;}
  .choice-title{
    flex-basis:100%;text-align:center;color:#EAF1FF;font-family:var(--font-heading);
    font-weight:700;font-size:clamp(16px,1.7vw,22px);
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  /* Level-1 headline: the task, front and centre at the top */
  #headline{
    position:absolute;top:16px;left:50%;transform:translateX(-50%);
    z-index:36;display:none;align-items:center;gap:9px;
    max-width:min(84vw,620px);padding:12px 26px;border-radius:999px;
    background:linear-gradient(180deg, rgba(16,30,64,.95), rgba(8,16,38,.96));
    border:2px solid rgba(125,183,255,.6);
    box-shadow:0 0 18px rgba(125,183,255,.3), var(--shadow-card);
    color:#EAF1FF;font-family:var(--font-heading);font-weight:700;text-align:center;
    font-size:clamp(15px,2vw,25px);line-height:1.15;
  }
  #headline.show{display:flex;animation:cardPop .3s ease-out;}
  #headline.big{font-size:clamp(17px,2.3vw,28px);}   /* slightly larger task text ("Light the LED using the switch") */
  /* Concept reveal: a short, WIDE strip sitting on top of the bench panel —
     it runs horizontally so it never covers the circuit built below it */
  #concept-card{
    position:absolute;top:8.5vh;left:50%;transform:translateX(-50%);
    z-index:60;display:none;flex-direction:row;align-items:center;justify-content:center;
    flex-wrap:wrap;column-gap:9px;row-gap:2px;
    width:max-content;max-width:min(72vw,780px);padding:10px 28px;border-radius:999px;
    background:linear-gradient(180deg, rgba(18,32,68,.96), rgba(8,16,38,.97));
    border:2px solid rgba(157,140,255,.65);
    box-shadow:0 0 22px rgba(157,140,255,.35), 0 0 44px rgba(125,183,255,.18), var(--shadow-soft);
    color:var(--text-primary);font-weight:800;text-align:center;
    font-size:clamp(12px,1.35vw,17px);line-height:1.3;pointer-events:none;
  }
  #concept-card.show{display:flex;
    animation:cardPopSide .42s cubic-bezier(.2,1.3,.4,1),
      conceptGlow 1.8s ease-in-out .5s infinite;}
  @keyframes conceptGlow{
    0%,100%{box-shadow:0 0 16px rgba(157,140,255,.35), 0 0 34px rgba(125,183,255,.16), var(--shadow-soft);
      transform:translateX(-50%) scale(1);border-color:rgba(157,140,255,.65);}
    50%{box-shadow:0 0 38px rgba(157,140,255,.85), 0 0 80px rgba(125,183,255,.5), var(--shadow-soft);
      transform:translateX(-50%) scale(1.035);border-color:rgba(196,186,255,.95);}}
  #concept-card.fadeout{animation:cardFade .5s ease-in forwards;}
  #concept-card .term{font-family:var(--font-ui);font-weight:600;color:var(--current-yellow);font-size:1.05em;
    text-shadow:0 0 12px rgba(255,215,90,.5);}
  @keyframes cardPopSide{0%{opacity:0;transform:translateX(-50%) scale(.5)}
    65%{opacity:1;transform:translateX(-50%) scale(1.06)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
  @keyframes cardFade{from{opacity:1}to{opacity:0;transform:translateX(-50%) scale(.94)}}
  /* wire the child should try pulling — glows to draw the eye */
  .wbase.hintwire{animation:hintWire 1s ease-in-out infinite;}
  @keyframes hintWire{0%,100%{stroke:#8fa4cf;filter:drop-shadow(0 0 3px rgba(255,150,60,.4))}
    50%{stroke:#ff7a7a;filter:drop-shadow(0 0 15px rgba(255,120,120,.95))}}
  /* dotted "connect here" guide wires (auto-help after two wrong tries with the switch).
     Red dashes join + to + · blue dashes carry the return path through the switch to −,
     matching the red/blue rings on the terminals themselves. */
  .wghost{fill:none;stroke:rgba(120,95,225,.85);stroke-width:4.5;stroke-linecap:round;
    stroke-linejoin:round;stroke-dasharray:9 8;pointer-events:none;
    animation:ghostBlink 1.6s ease-in-out infinite;}
  .wghost.pos{stroke:#e23b3b;}
  .wghost.neg{stroke:#2f6bd8;}
  @keyframes ghostBlink{0%,100%{opacity:.55}50%{opacity:1}}
  /* component name labels shown under the images in the first build */
  .comp-label{position:absolute;top:100%;left:50%;transform:translate(-50%,-14px);display:none;
    background:rgba(8,20,43,.92);border:2px solid rgba(125,183,255,.55);border-radius:999px;padding:3px 14px;
    font-family:var(--font-heading);font-weight:700;color:#EAF1FF;
    font-size:clamp(11px,1.2vw,15px);letter-spacing:.5px;white-space:nowrap;
    box-shadow:0 0 12px rgba(125,183,255,.22), var(--shadow-card);z-index:3;pointer-events:none;}
  #board.show-labels .comp-label{display:block;}
  /* the bench panel glows green when the circuit is joined correctly, red when wrong */
  .bench-panel.panel-good{border-color:var(--success-green);
    box-shadow:0 0 34px rgba(98,213,139,.65);}
  .bench-panel.panel-bad{border-color:var(--error-coral);
    box-shadow:0 0 34px rgba(255,122,122,.6);}
  /* answer options: a wrong pick shakes with a red glow; the right one glows green */
  .choice-btn.bad{animation:choiceShake .5s ease;border-color:#ff7a7a;background:rgba(96,26,38,.92);
    box-shadow:0 0 16px rgba(255,110,110,.8);}
  @keyframes choiceShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .choice-btn.good{border-color:#62d58b;background:rgba(18,74,48,.92);
    box-shadow:0 0 16px rgba(98,213,139,.85);}
  /* Back / Undo / Next controls — Undo pinned top-left, Next top-right */
  #navbar{position:absolute;top:16px;left:20px;right:20px;z-index:46;display:flex;gap:8px;
    justify-content:space-between;pointer-events:none;}
  .navbtn{min-height:42px;padding:8px 18px;border-radius:999px;pointer-events:auto;
    background:linear-gradient(180deg, rgba(16,30,64,.92), rgba(9,18,42,.95));
    border:2px solid rgba(125,183,255,.7);
    color:#EAF1FF;font-family:var(--font-ui);font-weight:500;font-size:clamp(11px,1.15vw,14px);
    letter-spacing:.08em;text-transform:uppercase;
    box-shadow:0 0 14px rgba(125,183,255,.22), inset 0 1px 0 rgba(255,255,255,.1);
    cursor:pointer;transition:transform .14s, border-color .14s, box-shadow .2s, opacity .2s;}

    box-shadow:0 0 20px rgba(125,183,255,.4), inset 0 1px 0 rgba(255,255,255,.12);}

  .navbtn:disabled{opacity:.35;cursor:default;transform:none;border-color:rgba(125,183,255,.4);box-shadow:none;}

  #sky-callback{
    position:absolute;inset:0;z-index:4;display:none;pointer-events:none;overflow:hidden;

      radial-gradient(circle at 50% 35%, rgba(255,232,120,.25), transparent 22%),

  @media (max-width: 820px) and (orientation: portrait){
    #stage{top:39%;width:min(94vw,680px);height:min(46.8vh,423px);}
    .bench-panel{border-radius:24px;}

    #actionbar{bottom:max(14px,env(safe-area-inset-bottom));}

    #concept-card{max-width:92vw;padding:9px 16px;font-size:clamp(13px,3.4vw,16px);}

    #navbar{top:auto;bottom:max(12px,env(safe-area-inset-bottom));left:8px;right:8px;gap:6px;}
    .navbtn{min-height:38px;padding:6px 12px;font-size:14px;}
    .btn{min-height:56px;padding:12px 26px;font-size:clamp(16px,5vw,20px);}
    .choice-btn{min-height:46px;padding:9px 16px;font-size:clamp(14px,4vw,17px);}
    #wirepile{left:1.5%;top:2%;}
    #wirepile img{width:clamp(44px,13vw,64px);}
    .cert-card{width:min(92vw,640px);border-radius:28px;padding:28px 22px;}
    #entry .eb-content{top:50%;width:min(calc(100% - 32px),620px);}
    #entry .eb-eyebrow{gap:8px;font-size:clamp(11px,3.2vw,15px);letter-spacing:.14em;}

    #entry h1{white-space:normal;font-size:clamp(30px,9vw,52px);letter-spacing:clamp(.06em,1.6vw,.12em);
      line-height:1.08;text-wrap:balance;}
    #entry p{max-width:88vw;font-size:clamp(18px,5vw,24px);text-wrap:balance;}
    #entry .btn{width:min(268px,86vw);min-height:60px;height:60px;padding:0 22px;font-size:clamp(14px,4vw,16px);}
    .parts-panel{padding:16px 10px;gap:14px;border-radius:24px;}

  }

  @media (max-height: 560px) and (orientation: landscape){
    #stage{top:46%;width:min(66vw,820px);height:min(61.2vh,387px);}
    .bench-panel{border-radius:24px;}
    #kabir,#meera{height:min(54vh,360px);}
    #kabir{left:-12vw;bottom:-14vh;}
    #meera{right:-12vw;bottom:-11vh;}
    #dialogue{width:min(24vw,210px);border-radius:14px;}
    #actionbar{bottom:10px;}
    #choices{bottom:10px;width:min(68vw,660px);}
    #concept-card{max-width:min(74vw,640px);padding:8px 18px;font-size:clamp(12px,1.8vw,16px);}
    #navbar{top:10px;left:12px;right:12px;gap:6px;}

    .btn{min-height:46px;padding:9px 24px;font-size:clamp(15px,2.2vw,19px);}
    .cert-card{width:min(76vw,600px);padding:24px 28px;border-radius:28px;}
    #entry .eb-content{top:50%;width:min(calc(100% - 40px),1040px);}
    #entry .eb-eyebrow{margin-bottom:14px;font-size:clamp(11px,1.6vw,15px);}
    #entry h1{font-size:clamp(30px,6.2vw,54px);letter-spacing:.12em;}
    #entry .eb-divider{margin-top:12px;}
    #entry p{margin-top:10px;font-size:clamp(16px,2.3vw,21px);}
    #entry .btn{width:min(240px,72vw);min-height:48px;height:48px;margin-top:16px;padding:0 20px;
      font-size:clamp(13px,1.8vw,15px);}
    .parts-panel{padding:10px 20px;gap:8px;border-radius:22px;}
    .parts-grid{width:min(78%,680px);gap:clamp(20px,5vw,64px);}

    .parts-card{padding:2px;gap:2px;}

  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important;}
    #entry .btn:hover .eb-arrow{transform:none;}
  }
</style>

<body>
<div id="game">

  <div id="entry">

      <p id="entry-description">Investigate what makes the park lamp glow.</p>
      <button class="btn" id="entry-btn" type="button" aria-label="Start the Glow Box quest"><span class="eb-spark" aria-hidden="true">✦</span>Start Quest<span class="eb-arrow" aria-hidden="true">→</span></button>
    </section>
