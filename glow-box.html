<script>
"use strict";

/* ============ Assets ============ */
const V = n => `Visuals/${n}`;
const POSE = {
  kabirHappy:     V("kabir standing.png"),
  kabirThink:     V("kabir thinking.png"),
  kabirCelebrate: V("kabir celebrating.png"),
  meeraHappy:     V("meera standing.png"),
  meeraThink:     V("meera thinking.png"),
  meeraIdea:      V("pose-meera-idea.png"),
  meeraCelebrate: V("pose-meera-celebrate.png"),
};
const IMG = {
  battery: V("battery.png"),
  bulb:    V("led.png"),
  switch:  V("switch.png"),
  switchOn:V("switch on.png"),
  wire:    V("wires.png"),
  hand:    V("hand icon transparent.png"),
  face:    V("wobble-face.png"),
};
/* room photo removed — #room-bg is now a pure-CSS nebula layer (cosmic HUD reskin) */

/* ============ Audio removed — the Glow-Box game runs silently ============ */
/* ac()/beep()/snd.* are kept as no-ops so the many call sites need no changes. */
function ac(){ return null; }
function beep(){ /* sound removed */ }
const snd = {
  click:()=>{}, connect:()=>{}, success:()=>{}, bigwin:()=>{}, bounce:()=>{}, off:()=>{}, pop:()=>{},
};

/* ============ Narration removed — lines auto-advance on a reading-time timer ============ */
function loadVoices(){ /* audio removed */ }
function stopVoice(){ /* audio removed */ }
function speakLine(text, who, onEnd){
  clearDlgTimer();
  if(onEnd){
    const delay = Math.min(7000, Math.max(2000, text.length*70 + 900));
    dlgTimer = setTimeout(onEnd, delay);
  }
}

/* ============ DOM refs ============ */
const $ = s => document.querySelector(s);
const gameEl = $("#game"), stageEl = $("#stage");
const dlgBox = $("#dialogue"), dlgSpeaker = dlgBox.querySelector(".speaker"),
      dlgLine = dlgBox.querySelector(".line"), dlgNext = dlgBox.querySelector(".next");
const kabirEl = $("#kabir"), meeraEl = $("#meera"), actionbar = $("#actionbar");
const choicesEl = $("#choices"), conceptEl = $("#concept-card"), skyCallbackEl = $("#sky-callback");

let curKabir="kabirHappy", curMeera="meeraHappy";
function setCompanions(kPose, mPose){
  if(kPose) curKabir = kPose;
  if(mPose) curMeera = mPose;
  kabirEl.src = POSE[curKabir] || POSE.kabirHappy;
  meeraEl.src = POSE[curMeera] || POSE.meeraHappy;
}
function speakingIs(who){
  kabirEl.classList.toggle("speaking", who==="Kabir");
  meeraEl.classList.toggle("speaking", who==="Meera");
}

/* ============ Dialogue queue (auto-advancing, tap to skip ahead) ============ */
let dlgQueue = [], dlgDone = null, dlgTimer = null;
function clearDlgTimer(){ if(dlgTimer){ clearTimeout(dlgTimer); dlgTimer = null; } }
function compactPortrait(){
  return !!(window.matchMedia && window.matchMedia("(max-width: 820px) and (orientation: portrait)").matches);
}
function positionDialogue(who){
  dlgBox.classList.remove("anchor-right","anchor-center");
  dlgBox.style.top = "auto";
  dlgBox.style.transform = "";
  if(compactPortrait()){
    dlgBox.classList.add("anchor-center");
    dlgBox.style.left = "50%";
    dlgBox.style.right = "auto";
    dlgBox.style.bottom = "16vh";
    dlgBox.style.transform = "translateX(-50%)";
    return;
  }
  // the bubble floats just above the speaker's head (tail points down at them)
  if(who === "Meera"){
    dlgBox.classList.add("anchor-right");
    dlgBox.style.right = "3vw"; dlgBox.style.left = "auto";
    dlgBox.style.bottom = "57vh";
  } else {
    dlgBox.style.left = "3vw"; dlgBox.style.right = "auto";
    dlgBox.style.bottom = "52vh";
  }
}
function setDialogue(lines, onDone){
  dlgQueue = lines.slice(); dlgDone = onDone || null;
  dlgBox.classList.remove("hide");
  showNextLine();
}
/* The current build step's guiding prompt. Stored so that when the child undoes a
   wire the coach can step back to it, instead of leaving a stale forward line
   (e.g. a "Careful!" polarity hint) on screen once the offending wire is gone. */
let lastGuide = null;
function guideDialogue(lines, onDone){
  lastGuide = lines.map(l=>Object.assign({}, l));
  setDialogue(lines, onDone);
}
function clearGuide(){ lastGuide = null; }
function showNextLine(){
  clearDlgTimer();
  if(dlgQueue.length === 0){
    dlgNext.style.display = "none";
    stopVoice();
    const cb = dlgDone; dlgDone = null;
    if(cb) cb();
    return;
  }
  const l = dlgQueue.shift();
  dlgSpeaker.textContent = l.who;
  dlgLine.textContent = l.text;
  speakingIs(l.who);
  setCompanions(l.kabir, l.meera);
  positionDialogue(l.who);
  const more = dlgQueue.length || dlgDone;
  dlgNext.style.display = more ? "inline" : "none";
  speakLine(l.text, l.who, more ? showNextLine : null);
  try{ beep(l.who==="Kabir"?430:560, 0.06, "sine", 0.06); }catch(e){}
}
dlgBox.addEventListener("click", showNextLine);
window.addEventListener("resize", ()=>{
  if(!dlgBox.classList.contains("hide") && dlgSpeaker.textContent) positionDialogue(dlgSpeaker.textContent);
  redrawWires();
  positionHandDrag();
});
/* any touch anywhere resets the 10s idle-hint clock */
gameEl.addEventListener("pointerdown", ()=>{ if(stage>=1) armIdleHint(); }, true);

/* ============ Action button ============ */
function setAction(label, cb){
  removeHand();                          // stale hints (e.g. on the switch) die with the new button
  actionbar.innerHTML = "";
  clearChoices();
  fadeConcept();                         // the top card bows out as the next-stage button arrives
  const b = document.createElement("button");
  b.className = "btn"; b.textContent = label;
  b.addEventListener("click", ()=>{ removeHand(); snd.click(); cb(); });
  actionbar.appendChild(b);
}
function clearAction(){ if(actionbar.querySelector(".hand-icon")) removeHand(); actionbar.innerHTML = ""; }
function setChoices(prompt, options, onPick, onWrong){
  clearAction();
  choicesEl.innerHTML = "";
  const title = document.createElement("div");
  title.className = "choice-title";
  title.textContent = prompt;
  choicesEl.appendChild(title);
  // if any option is marked correct, wrong picks glow red and stay; the right one glows green
  const validated = options.some(o=>o.correct);
  let done = false;
  options.forEach(opt=>{
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = opt.label;
    b.addEventListener("click", ()=>{
      if(done) return;
      snd.click();
      if(validated && !opt.correct){
        snd.bounce();
        b.classList.remove("bad"); void b.offsetWidth;   // restart the shake
        b.classList.add("bad");
        setTimeout(()=>b.classList.remove("bad"), 700);
        if(onWrong) onWrong(opt);
        return;                                          // choices stay open — try again
      }
      done = true;
      b.classList.add("good");
      setTimeout(()=>{ clearChoices(); onPick(opt); }, validated ? 650 : 400);
    });
    choicesEl.appendChild(b);
  });
  choicesEl.classList.add("show");
}
function clearChoices(){
  choicesEl.classList.remove("show");
  choicesEl.innerHTML = "";
}
function showConcept(term, text, ms=15000){
  hideHeadline();
  conceptEl.classList.remove("fadeout");
  conceptEl.innerHTML = `<span class="term">${term}</span><span>${text}</span>`;
  conceptEl.classList.add("show");
  clearTimeout(showConcept.timer);
  clearTimeout(showConcept.fadeTimer);
  // let it linger 15–20s, then fade out gently
  showConcept.timer = setTimeout(()=>{
    conceptEl.classList.add("fadeout");
    showConcept.fadeTimer = setTimeout(()=>conceptEl.classList.remove("show","fadeout"), 520);
  }, ms);
}
function hideConcept(){
  clearTimeout(showConcept.timer);
  clearTimeout(showConcept.fadeTimer);
  conceptEl.classList.remove("show","fadeout");
}
/* gentle version: the card fades out (used when the next-stage button appears) */
function fadeConcept(){
  if(!conceptEl.classList.contains("show")) return;
  clearTimeout(showConcept.timer);
  clearTimeout(showConcept.fadeTimer);
  conceptEl.classList.add("fadeout");
  showConcept.fadeTimer = setTimeout(()=>conceptEl.classList.remove("show","fadeout"), 520);
}
const headlineEl = $("#headline");
function showHeadline(text, big){
  headlineEl.textContent = text;
  headlineEl.classList.toggle("big", !!big);
  headlineEl.classList.add("show");
}
function hideHeadline(){ headlineEl.classList.remove("show"); }

/* ============ Confetti (gentle constellation reward) ============ */
function confetti(){
  const colors=["#ffd85c","#ffe879","#ffb84d","#fff3c0","#ffffff"];
  const stars=["✦","✧","⭐","·"];
  for(let i=0;i<42;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=(2+i*2.3)+"vw";
    if(i%3===0){
      c.textContent = stars[i%stars.length];
      c.style.background="transparent";c.style.width="auto";c.style.height="auto";
      c.style.color=colors[i%colors.length];
      c.style.fontSize=(12+(i%4)*5)+"px";
      c.style.textShadow="0 0 8px rgba(255,216,92,.8)";
    } else {
      c.style.background=colors[i%colors.length];
      c.style.boxShadow="0 0 6px rgba(255,216,92,.7)";
    }
    c.style.animationDuration=(2.4+(i%5)*0.45)+"s";
    c.style.animationDelay=((i%6)*0.12)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4600);
  }
}

/* =====================================================================
   THE WORKBENCH — free-build circuit
   Terminals live in a 640×420 viewBox; wires are child-drawn connections.
   ===================================================================== */
const VBW = 640, VBH = 420;
const SVGNS = "http://www.w3.org/2000/svg";
/* Each terminal is anchored to a spot ON its component's image (dx/dy are % of the
   square component box, measured off the artwork's real terminals). Their viewBox
   coordinates are read live from the rendered dot, so they stay correct at any size. */
const TERMS = {
  bp:{comp:"battery", dx:39.7, dy:19.0, pol:"pos"},   // battery + metal snap (leaves printed + sign visible below)
  bn:{comp:"battery", dx:57.0, dy:19.0, pol:"neg"},   // battery − metal snap (leaves printed − sign visible below)
  l1:{comp:"bulb",    dx:18.0, dy:50.0, pol:"pos"},   // LED + terminal — just off the star's left edge (+ side)
  l2:{comp:"bulb",    dx:82.0, dy:50.0, pol:"neg"},   // LED − terminal — just off the star's right edge (− side)
  s1:{comp:"switch",  dx:47.3, dy:91.0},              // switch left pin — dot sits just below the leg so it stays visible
  s2:{comp:"switch",  dx:58.7, dy:91.0},              // switch right pin — dot sits just below the leg so it stays visible
};
const MAX_WIRES = 3;
let wires = [];            // {a, b, pts, g, base, curp, hit}
let switchOn = false;
let switchVisible = false; // the switch only appears once it is introduced (Stage 5)
let board = null, boardSvg = null, wireLayer = null, guideLayer = null, tempPath = null;
let cur = { lit:false, switchInLoop:false };
let dragging = null;       // {from, pts, moved, startPt}
let selectedTerm = null;

let polarityHelpShown = false;      // a reversed loop has prompted the "check the signs" hint this build
let polarityPraisedThisBuild = false; // the "+ meets +, − meets −" reinforcement has shown this build
let panelGoodTimer = null;            // the green success glow fades after 5s
function buildBench(){
  wires = [];
  ghostWires = [];              // the rebuilt board wipes any dotted guide wires with it
  switchOn = false;
  dragging = null;
  selectedTerm = null;
  polarityHelpShown = false;
  polarityPraisedThisBuild = false;
  cur = { lit:false, switchInLoop:false };
  if(tempPath && tempPath.parentNode) tempPath.parentNode.removeChild(tempPath);
  tempPath = null;
  stageEl.innerHTML = "";
  const panel = document.createElement("div");
  panel.className = "bench-panel";
  board = document.createElement("div");
  board.id = "board";
  board.className = "mode-light";
  board.innerHTML = `
    <svg viewBox="0 0 ${VBW} ${VBH}" preserveAspectRatio="none">
      <g id="wire-layer"></g>
    </svg>
    <svg class="guide-svg" viewBox="0 0 ${VBW} ${VBH}" preserveAspectRatio="none" aria-hidden="true">
      <g id="guide-layer"></g>
    </svg>

    <div class="comp" id="bulb" style="left:75%;top:42%;width:27%;">
      <div class="ledglow"></div>
      <img class="cimg" src="${IMG.bulb}" alt="LED">
      <div class="comp-label">LED</div>
    </div>

    <div class="comp" id="battery" style="left:25%;top:42%;width:26%;">
      <img class="cimg" src="${IMG.battery}" alt="battery">
      <div class="comp-label">POWER SOURCE</div>
    </div>

    <div class="comp" id="switch" style="left:50%;top:77%;width:16%;">
      <img class="cimg" src="${IMG.switch}" alt="switch">
      <div class="switch-badge">OFF</div>
    </div>

    <div id="wirepile">
      <img src="${IMG.wire}" alt="loose wires">
      <span class="count">× ${MAX_WIRES}</span>
    </div>`;
  panel.appendChild(board);
  stageEl.appendChild(panel);

  boardSvg = board.querySelector("svg");
  wireLayer = board.querySelector("#wire-layer");
  guideLayer = board.querySelector("#guide-layer");

  // terminal dots sit inside their component, right on the artwork's terminals
  Object.keys(TERMS).forEach(id=>{
    const t = TERMS[id];
    const comp = board.querySelector("#"+t.comp);
    const dot = document.createElement("div");
    dot.className = "tdot pulse" + (t.pol ? " "+t.pol : "");
    dot.dataset.term = id;
    dot.style.left = t.dx + "%";
    dot.style.top  = t.dy + "%";
    dot.addEventListener("pointerdown", e=>{ e.preventDefault(); e.stopPropagation(); ac(); startWireFrom(id, e); });
    comp.appendChild(dot);
    t.dot = dot;
  });

  setSwitchVisible(switchVisible);   // switch stays hidden until it is introduced

  board.addEventListener("pointerdown", onBoardDown);
  board.querySelector("#switch").addEventListener("click", onSwitchTap);
  board.querySelector("#wirepile").addEventListener("pointerdown", ()=>{
    wigglePile(); snd.pop(); noteInteraction();
  });
}
function setSwitchVisible(v){
  switchVisible = v;
  if(!board) return;
  const sw = board.querySelector("#switch");
  if(sw) sw.style.display = v ? "" : "none";
  ["s1","s2"].forEach(id=>{ if(TERMS[id].dot) TERMS[id].dot.style.display = v ? "" : "none"; });
}
function revealSwitch(){
  if(switchVisible) return;
  setSwitchVisible(true);
  const sw = board && board.querySelector("#switch");
  if(sw){ sw.style.animation = "benchIn .5s ease-out"; }
  refreshCircuit();
}
function wigglePile(){
  const p = board && board.querySelector("#wirepile");
  if(!p) return;
  p.classList.remove("wiggle"); void p.offsetWidth; p.classList.add("wiggle");
}

/* ---- coordinate helpers ---- */
function toVB(pt){
  const r = boardSvg.getBoundingClientRect();
  return { x:(pt.clientX-r.left)*VBW/r.width, y:(pt.clientY-r.top)*VBH/r.height };
}
/* live viewBox centre of a terminal, read from its rendered dot */
function termCenterVB(id){
  const dot = TERMS[id].dot;
  const r = dot.getBoundingClientRect();
  return toVB({ clientX:r.left + r.width/2, clientY:r.top + r.height/2 });
}
/* nearest terminal to a viewBox point, honouring switch visibility + filters */
function nearestTerm(vb, thresh, opts){
  opts = opts || {};
  let best = null, bestD = thresh;
  Object.keys(TERMS).forEach(id=>{
    if(!switchVisible && TERMS[id].comp==="switch") return;
    if(opts.freeOnly && occupiedBy(id)) return;
    if(opts.excludeComp && TERMS[id].comp===opts.excludeComp) return;
    const c = termCenterVB(id);
    const d = Math.hypot(vb.x-c.x, vb.y-c.y);
    if(d < bestD){ best = id; bestD = d; }
  });
  return best;
}
function pathFromPoints(pts){
  return "M " + pts.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" L ");
}
/* tidy right-angle fallback used only when a wire is made by tapping (no drawn path) */
function autoRoute(A, B){
  const dx = B.x-A.x, dy = B.y-A.y;
  if(Math.abs(dx) < 18 || Math.abs(dy) < 18) return `M ${A.x} ${A.y} L ${B.x} ${B.y}`;
  if(Math.abs(dx) >= Math.abs(dy)){
    const mx = Math.round((A.x+B.x)/2);
    return `M ${A.x} ${A.y} L ${mx} ${A.y} L ${mx} ${B.y} L ${B.x} ${B.y}`;
  }
  const my = Math.round((A.y+B.y)/2);
  return `M ${A.x} ${A.y} L ${A.x} ${my} L ${B.x} ${my} L ${B.x} ${B.y}`;
}
/* a wire's path: the child's own drawn line if they bent one, else a neat auto-route */
function wirePathD(w){
  const A = termCenterVB(w.a), B = termCenterVB(w.b);
  if(w.pts && w.pts.length) return pathFromPoints([A, ...w.pts, B]);
  return autoRoute(A, B);
}

/* ---- wire bookkeeping ---- */
function occupiedBy(termId){ return wires.find(w=>w.a===termId || w.b===termId) || null; }
function updatePile(){
  const pile = board.querySelector("#wirepile");
  const left = MAX_WIRES - wires.length;
  pile.querySelector(".count").textContent = "× " + left;
  pile.classList.toggle("empty", left<=0);
}
function mkPath(cls, d){
  const p = document.createElementNS(SVGNS,"path");
  p.setAttribute("class", cls); p.setAttribute("d", d);
  return p;
}
function addWire(a, b, pts){
  const g = document.createElementNS(SVGNS,"g");
  const w = { a, b, pts:(pts && pts.length ? pts.slice() : []), g };
  const d = wirePathD(w);
  const base = mkPath("wbase", d), curp = mkPath("wcur", d), hit = mkPath("whit", d);
  g.appendChild(base); g.appendChild(curp); g.appendChild(hit);
  wireLayer.appendChild(g);
  w.base = base; w.curp = curp; w.hit = hit;
  hit.addEventListener("pointerdown", e=>{
    if(dragging) return;
    e.preventDefault(); e.stopPropagation();
    removeHand();
    removeWire(w); snd.pop(); noteInteraction();
    refreshCircuit();
  });
  wires.push(w);
  updatePile();
}
function redrawWire(w){
  const d = wirePathD(w);
  w.base.setAttribute("d", d); w.curp.setAttribute("d", d); w.hit.setAttribute("d", d);
}
function redrawWires(){
  if(!board) return;
  wires.forEach(redrawWire);
  ghostWires.forEach(g=>g.el.setAttribute("d", guideRouteD(g.a, g.b, g.kind)));
}
/* dotted "connect these" guide wires — automatic help after two wrong switch-stage tries */
let ghostWires = [];
/* tidy, readable routes for the guide: "over" arcs across the top of the bench;
   "viaAx" drops/rises straight from the first terminal, then runs across to the second */
function guideRouteD(a, b, kind){
  const A = termCenterVB(a), B = termCenterVB(b);
  if(kind==="over"){
    const yTop = Math.max(12, Math.min(A.y, B.y) - 58);
    return pathFromPoints([A, {x:A.x, y:yTop}, {x:B.x, y:yTop}, B]);
  }
  if(kind==="viaAx"){
    return pathFromPoints([A, {x:A.x, y:B.y}, B]);
  }
  if(kind==="free"){
    const {c1, c2} = freeCurveCtrls(A, B);
    return `M ${A.x.toFixed(1)} ${A.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)}, ${c2.x.toFixed(1)} ${c2.y.toFixed(1)}, ${B.x.toFixed(1)} ${B.y.toFixed(1)}`;
  }
  if(kind==="bow"){
    const {c1, c2} = bowCurveCtrls(A, B);
    return `M ${A.x.toFixed(1)} ${A.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)}, ${c2.x.toFixed(1)} ${c2.y.toFixed(1)}, ${B.x.toFixed(1)} ${B.y.toFixed(1)}`;
  }
  return autoRoute(A, B);
}
/* relaxed sagging curve, like a wire the child drew by hand — no corners.
   Sags below the straight line; if the panel bottom is too close, arcs above instead. */
function bowCurveCtrls(A, B){
  const dx = B.x-A.x, dy = B.y-A.y;
  let sag = Math.max(20, Math.min(40, Math.hypot(dx,dy)*0.18));
  const room = VBH - Math.max(A.y, B.y) - 10;
  if(room < sag) sag = (room > 8 ? room : -sag*0.8);
  return {
    c1:{x:A.x+dx*0.30, y:A.y+dy*0.30+sag},
    c2:{x:A.x+dx*0.70, y:A.y+dy*0.70+sag}
  };
}
/* hand-drawn arc that clearly LEAVES A: rises straight up out of the dot,
   sweeps across, then drops down into B — both endpoints unmistakable.
   Shared by the dotted guide and the demo hand so they travel together. */
function freeCurveCtrls(A, B){
  const dx = B.x-A.x;
  const lift = Math.max(46, Math.min(80, Math.abs(dx)*0.22));
  return {
    c1:{x:A.x+dx*0.06, y:A.y-lift*0.95},           // near-vertical departure from A
    c2:{x:B.x-dx*0.10, y:Math.min(A.y, B.y)-lift}  // eases over, then descends into B
  };
}
function clearGhostWires(){
  ghostWires.forEach(g=>{ if(g.el && g.el.parentNode) g.el.parentNode.removeChild(g.el); });
  ghostWires = [];
}
function showGuideWires(pairs){
  clearGhostWires();
  pairs.forEach(([a, b, cls, kind])=>{
    const el = mkPath("wghost" + (cls ? " "+cls : ""), guideRouteD(a, b, kind));
    (guideLayer || wireLayer).appendChild(el);   // guide layer sits ABOVE the components
    ghostWires.push({a, b, el, kind});
  });
}
function clearWireHints(){ removeHand(); wires.forEach(w=>{ if(w.base) w.base.classList.remove("hintwire"); }); }

/* ---- guiding hand (Visuals/hand icon.png): drag demos + tap hints ----
   One hand at a time; removeHand() clears whichever is showing. */
let handEl = null, handTimer = null, handDragPair = null, handDragKind = "free", tutDone = false;
function handImg(cls){
  const h = document.createElement("img");
  h.src = IMG.hand; h.alt = ""; h.className = "hand-icon "+cls;
  h.setAttribute("aria-hidden","true");
  return h;
}
function removeHand(){
  clearTimeout(handTimer); handTimer = null; handDragPair = null;
  if(handEl && handEl.parentNode) handEl.parentNode.removeChild(handEl);
  handEl = null;
}
function positionHandDrag(){
  if(!handEl || !board || !handDragPair) return;
  const A = termCenterVB(handDragPair[0]), B = termCenterVB(handDragPair[1]);
  // midpoint of the same freehand curve a drawn wire would take (cubic bezier at t=0.5),
  // so the hand rides a natural wire path instead of cutting straight across
  const {c1, c2} = handDragKind==="bow" ? bowCurveCtrls(A, B) : freeCurveCtrls(A, B);
  const M = {x:(A.x+3*c1.x+3*c2.x+B.x)/8, y:(A.y+3*c1.y+3*c2.y+B.y)/8};
  handEl.style.setProperty("--hx0", (A.x/VBW*100).toFixed(2)+"%");
  handEl.style.setProperty("--hy0", (A.y/VBH*100).toFixed(2)+"%");
  handEl.style.setProperty("--hxm", (M.x/VBW*100).toFixed(2)+"%");
  handEl.style.setProperty("--hym", (M.y/VBH*100).toFixed(2)+"%");
  handEl.style.setProperty("--hx1", (B.x/VBW*100).toFixed(2)+"%");
  handEl.style.setProperty("--hy1", (B.y/VBH*100).toFixed(2)+"%");
}
/* hand glides from terminal a to terminal b, pressing at both ends.
   kind picks the path shape: "free" arcs over the top, "bow" sags like a drawn wire */
function showHandDrag(a, b, kind){
  removeHand();
  handEl = handImg("hand-drag"); handDragPair = [a, b];
  handDragKind = kind || ((a==="bp"||b==="bp") ? "free" : "bow");
  board.appendChild(handEl);
  positionHandDrag();
}
/* hand taps in place at a board viewBox point */
function showHandTapVB(x, y){
  removeHand();
  handEl = handImg("hand-tap");
  handEl.style.left = (x/VBW*100).toFixed(2)+"%";
  handEl.style.top  = (y/VBH*100).toFixed(2)+"%";
  board.appendChild(handEl);
}
/* hand taps on the action button (appended inside the actionbar) */
function showHandTapOnAction(){
  removeHand();
  if(!actionbar.querySelector(".btn")) return;
  handEl = handImg("hand-tap");
  handEl.style.left = "74%"; handEl.style.top = "46%";
  actionbar.appendChild(handEl);
}
/* first-build tutorial: demo joining battery + to LED + over a freehand dotted path.
   Ends the moment the child touches a terminal. */
function showTutorial(){
  if(tutDone || !board || handEl) return;
  showHandDrag("bp", "l1");
  showGuideWires([["bp","l1","pos","free"]]);   // curvy + to + path under the moving hand
}
function endTutorial(){
  if(tutDone) return;
  tutDone = true;
  removeHand();
  clearGhostWires();
}

/* ---- 10s idle hint: whatever the game is waiting on, the hand shows it ----
   Re-arms itself, so as long as the child stays idle the hand keeps helping. */
let idleHintTimer = null;
function armIdleHint(){
  clearTimeout(idleHintTimer);
  idleHintTimer = setTimeout(showIdleHint, 10000);
}
function showIdleHint(){
  armIdleHint();                                  // keep watching
  if(handEl || stage<1 || dragging) return;       // a hint is already up, or nothing started yet
  // 1) an action button is waiting → tap it (answer choices never get a hand)
  if(actionbar.querySelector(".btn")){ showHandTapOnAction(); return; }
  if(choicesEl.classList.contains("show")) return;   // let the child read and pick freely
  if(!board) return;
  // 2) "stop the glow" step → tap the wire to pull
  if(stage===3 && !pathQuestionAnswered && wires.length){ hintRemoveWire(); return; }
  // 3) circuit built but the switch is off → tap the switch
  if(switchVisible && !switchOn && cur.switchWouldComplete){
    const sw = board.querySelector("#switch");
    if(sw){ const r = sw.getBoundingClientRect();
      const c = toVB({clientX:r.left+r.width/2, clientY:r.top+r.height/2});
      showHandTapVB(c.x, c.y); return; }
  }
  // 4) building → demo the next missing join (first pair whose both dots are free)
  if(!cur.lit){
    const pairs = switchVisible ? [["bp","l1"],["l2","s1"],["s2","bn"]] : [["bp","l1"],["bn","l2"]];
    const next = pairs.find(([a,b])=>!occupiedBy(a) && !occupiedBy(b));
    if(next) showHandDrag(next[0], next[1]);
  }
}
/* nudge for "stop the glow": glow one wire so the child sees a wire is the thing to pull */
function hintRemoveWire(){
  clearWireHints();
  const w = wires.find(x=>TERMS[x.a].comp==="battery" || TERMS[x.b].comp==="battery") || wires[0];
  if(w && w.base){
    w.base.classList.add("hintwire");
    // hand taps the middle of the glowing wire — "pull this one"
    try{ const p = w.base.getPointAtLength(w.base.getTotalLength()/2); showHandTapVB(p.x, p.y); }catch(e){}
  }
}
function removeWire(w){
  const i = wires.indexOf(w);
  if(i>=0) wires.splice(i,1);
  if(w.g && w.g.parentNode) w.g.parentNode.removeChild(w.g);
  updatePile();
}
function clearAllWires(){
  wires.slice().forEach(removeWire);
  setSelected(null);
  markCandidates(null, false);
}
/* After a wrong build is pointed out, the wires clear themselves a beat later so the
   child always starts the next try on a clean bench. The predicate re-checks that the
   build is STILL wrong when the timer fires (skips if the child already fixed it). */
let wrongClearTimer = null;
function scheduleWrongClear(stillWrong){
  clearTimeout(wrongClearTimer);
  wrongClearTimer = setTimeout(function tick(){
    if(cur.lit) return;
    if(dragging){ wrongClearTimer = setTimeout(tick, 1200); return; }   // mid-drag: check again shortly
    if(stillWrong && !stillWrong()) return;
    clearAllWires();
    refreshCircuit();
  }, 2400);
}
/* battery split: one battery end wired to the switch, the other to the LED, and the
   LED and switch NOT joined to each other. A complete loop that merely has its switch
   OFF has the same battery signature — that build is CORRECT, never a split. */
function batterySplit(){
  if(cur.lit || cur.switchWouldComplete) return false;
  const wp = occupiedBy("bp"), wn = occupiedBy("bn");
  if(!wp || !wn) return false;
  const oc = w => TERMS[w.a].comp==="battery" ? TERMS[w.b].comp : TERMS[w.a].comp;
  const ends = new Set([oc(wp), oc(wn)]);
  if(!(ends.has("switch") && ends.has("bulb"))) return false;
  return !wires.some(w=>{
    const c1 = TERMS[w.a].comp, c2 = TERMS[w.b].comp;
    return (c1==="bulb" && c2==="switch") || (c1==="switch" && c2==="bulb");
  });
}

/* ---- draw a wire: press a terminal, bend the line any way, release on another ---- */
function setSelected(id){
  if(selectedTerm && TERMS[selectedTerm].dot) TERMS[selectedTerm].dot.classList.remove("sel");
  selectedTerm = id;
  if(id && TERMS[id].dot) TERMS[id].dot.classList.add("sel");
}
function markCandidates(fromId, on){
  Object.keys(TERMS).forEach(id=>{
    const dot = TERMS[id].dot; if(!dot) return;
    if(!switchVisible && TERMS[id].comp==="switch"){ dot.classList.remove("cand"); return; }
    const ok = on && fromId && id!==fromId && !occupiedBy(id) && TERMS[id].comp!==TERMS[fromId].comp;
    dot.classList.toggle("cand", !!ok);
  });
}
/* near-miss fallback: a press close to (but not on) a free terminal still starts a wire */
function onBoardDown(e){
  if(dragging) return;
  const vb = toVB(e);
  const id = nearestTerm(vb, 15, {});
  if(id && !occupiedBy(id)){ e.preventDefault(); ac(); startWireFrom(id, e); }
}
function startWireFrom(id, e){
  endTutorial();                         // the child is doing it themselves now
  removeHand();                          // any tap/redraw hint hand has served its purpose
  noteInteraction();
  const existing = occupiedBy(id);
  if(existing){
    // grab this wire's end off the terminal and redraw it freehand from the other end
    setSelected(null);
    const other = (existing.a===id) ? existing.b : existing.a;
    removeWire(existing);
    refreshCircuit();
    dragging = { from:other, pts:[], moved:true, startPt:toVB(e) };
  } else {
    if(wires.length >= MAX_WIRES && !selectedTerm){ wigglePile(); snd.bounce(); return; }
    // tap-tap accessibility: a terminal was already selected → join the pair
    if(selectedTerm && selectedTerm!==id){
      tryConnect(selectedTerm, id, []);
      setSelected(null); markCandidates(null, false);
      return;
    }
    if(selectedTerm===id){ setSelected(null); markCandidates(null, false); return; }
    dragging = { from:id, pts:[], moved:false, startPt:toVB(e) };
  }
  markCandidates(dragging.from, true);
  tempPath = mkPath("wtemp", pathFromPoints([termCenterVB(dragging.from), toVB(e)]));
  wireLayer.appendChild(tempPath);
  window.addEventListener("pointermove", onDragMove);
  window.addEventListener("pointerup", onDragEnd);
  window.addEventListener("pointercancel", onDragEnd);
}
function onDragMove(e){
  if(!dragging) return;
  const p = toVB(e);
  if(Math.hypot(p.x-dragging.startPt.x, p.y-dragging.startPt.y) > 8) dragging.moved = true;
  if(dragging.moved){
    const last = dragging.pts[dragging.pts.length-1];
    if(!last || Math.hypot(p.x-last.x, p.y-last.y) > 7) dragging.pts.push(p);   // record the bend
  }
  if(tempPath) tempPath.setAttribute("d", pathFromPoints([termCenterVB(dragging.from), ...dragging.pts, p]));
}
function onDragEnd(e){
  window.removeEventListener("pointermove", onDragMove);
  window.removeEventListener("pointerup", onDragEnd);
  window.removeEventListener("pointercancel", onDragEnd);
  if(tempPath && tempPath.parentNode) tempPath.parentNode.removeChild(tempPath);
  tempPath = null;
  if(!dragging) return;
  const d = dragging; dragging = null;
  markCandidates(d.from, false);
  if(!d.moved){
    // a simple tap → select it, then tap another terminal to connect
    setSelected(d.from);
    markCandidates(d.from, true);
    return;
  }
  const target = nearestTerm(toVB(e), 22, { freeOnly:true, excludeComp:TERMS[d.from].comp });
  if(target){ tryConnect(d.from, target, d.pts); }
  else { snd.pop(); refreshCircuit(); }   // released in space → the wire goes back to the pile
}
function tryConnect(a, b, pts){
  if(TERMS[a].comp === TERMS[b].comp){ snd.bounce(); nudgeOnMistake(); return; }   // same piece: no loop there
  if(occupiedBy(a) || occupiedBy(b)){ snd.bounce(); return; }
  if(wires.length >= MAX_WIRES){ snd.bounce(); return; }
  addWire(a, b, pts);
  snd.connect();
  refreshCircuit();
  // both parts wired up but still dark (and not the polarity case, which has its own
  // coaching line) → that's a mistake, so offer the next nudge
  if(stage===1 && !cur.lit && !cur.wrongPolarity && wires.length>=2) nudgeOnMistake();
}

/* ---- switch ---- */
function onSwitchTap(){
  if(stage < 1) return;
  removeHand();                          // the tap hint served its purpose
  noteInteraction();
  switchOn = !switchOn;
  const sEl = board.querySelector("#switch");
  sEl.classList.toggle("on", switchOn);
  sEl.querySelector(".switch-badge").textContent = switchOn ? "ON" : "OFF";
  sEl.querySelector(".cimg").setAttribute("src", switchOn ? IMG.switchOn : IMG.switch);
  if(switchOn) snd.click(); else snd.off();
  refreshCircuit();
  onSwitchFlipped();
}

/* ---- circuit evaluation: is there a closed path through the bulb? ---- */
function evalCircuit(){
  const edges = wires.map(w=>({a:w.a, b:w.b, kind:"wire"}));
  edges.push({a:"l1", b:"l2", kind:"bulb"});
  if(switchOn) edges.push({a:"s1", b:"s2", kind:"switch"});
  let lit=false, switchInLoop=false, closedLoop=false, wrongPolarity=false, badLoop=false;
  const used = new Set();
  // Walk from the battery + terminal. A loop only lights when we cross the bulb
  // entering at its + terminal (l1) — i.e. battery + meets LED +, and − meets −.
  (function walk(node, hasBulb, hasSwitch, polOK){
    if(node==="bn"){
      if(hasBulb){
        closedLoop = true;
        if(polOK){ lit = true; if(hasSwitch) switchInLoop = true; }
        else { wrongPolarity = true; }
      } else { badLoop = true; }   // battery looped back without the LED — a wrong circuit
      return;
    }
    for(let i=0;i<edges.length;i++){
      if(used.has(i)) continue;
      const e = edges[i];
      const nxt = e.a===node ? e.b : (e.b===node ? e.a : null);
      if(!nxt) continue;
      let np = polOK;
      if(e.kind==="bulb") np = (node==="l1");   // entered the LED at its + terminal → correct polarity
      used.add(i);
      walk(nxt, hasBulb||e.kind==="bulb", hasSwitch||e.kind==="switch", np);
      used.delete(i);
    }
  })("bp", false, false, false);
  const switchWasOn = switchOn;
  switchOn = true;
  const edgesWithSwitch = wires.map(w=>({a:w.a, b:w.b, kind:"wire"}));
  edgesWithSwitch.push({a:"l1", b:"l2", kind:"bulb"}, {a:"s1", b:"s2", kind:"switch"});
  let switchWouldComplete = false;
  const usedWithSwitch = new Set();
  (function walkSwitch(node, hasBulb, hasSwitch, polOK){
    if(node==="bn"){
      if(hasBulb && hasSwitch && polOK) switchWouldComplete = true;
      return;
    }
    for(let i=0;i<edgesWithSwitch.length;i++){
      if(usedWithSwitch.has(i)) continue;
      const e = edgesWithSwitch[i];
      const nxt = e.a===node ? e.b : (e.b===node ? e.a : null);
      if(!nxt) continue;
      let np = polOK;
      if(e.kind==="bulb") np = (node==="l1");
      usedWithSwitch.add(i);
      walkSwitch(nxt, hasBulb||e.kind==="bulb", hasSwitch||e.kind==="switch", np);
      usedWithSwitch.delete(i);
    }
  })("bp", false, false, false);
  switchOn = switchWasOn;
  return { lit, switchInLoop, switchWouldComplete, closedLoop, wrongPolarity, badLoop };
}
function refreshCircuit(){
  const prev = cur;
  cur = evalCircuit();
  board.classList.toggle("live", cur.lit);
  const bulbEl = board.querySelector("#bulb");
  bulbEl.classList.toggle("lit", cur.lit);
  // the whole bench panel answers the build: green glow = joined correctly, red = wrong.
  // The green is a moment of feedback, not a state — it fades after 5s.
  const panel = board.parentNode;
  if(panel && panel.classList.contains("bench-panel")){
    if(cur.lit && !prev.lit){
      panel.classList.add("panel-good");
      clearTimeout(panelGoodTimer);
      panelGoodTimer = setTimeout(()=>panel.classList.remove("panel-good"), 5000);
    } else if(!cur.lit){
      clearTimeout(panelGoodTimer);
      panel.classList.remove("panel-good");
    }
    panel.classList.toggle("panel-bad", !cur.lit && !!(cur.wrongPolarity || cur.badLoop));
  }
  // terminal dots: quiet once occupied, invite while free (during build stages)
  const inviting = (stage>=1 && stage<=6);
  Object.keys(TERMS).forEach(id=>{
    const dot = TERMS[id].dot; if(!dot) return;
    if(!switchVisible && TERMS[id].comp==="switch"){ dot.classList.remove("busy","pulse","cand","sel"); return; }
    const busy = !!occupiedBy(id);
    dot.classList.toggle("busy", busy);
    dot.classList.toggle("pulse", !busy && inviting);
  });
  polarityFeedback(prev, cur);
  if(cur.lit && !prev.lit) onGlow();
  if(!cur.lit && prev.lit) onDark();
  afterCircuitRefresh();
}
/* Wrong-terminal coaching, applied everywhere the child wires the bench:
   a fully closed loop that runs battery + into the LED − (and vice-versa) will
   not glow — Kabir/Meera ask the child to check the signs and connect + to +.
   A correct connection that lights the bulb earns a short reinforcement. */
function polarityFeedback(prev, cur){
  const nowWrong = cur.wrongPolarity && !cur.lit;
  const wasWrong = prev.wrongPolarity && !prev.lit;
  if(nowWrong && !wasWrong){
    polarityHelpShown = true;
    setDialogue([
      {who:"Kabir", text:"Careful! Check the signs on the battery and the LED, then connect + to + and − to −.", kabir:"kabirThink"},
    ]);
    // in the switch stage a reversed loop also counts as a wrong try toward the auto-guide
    if(stage===5){ s5wrong++; if(s5wrong>=2) showSwitchGuide(); }
    // every build: after the child sees the red glow and hears the prompt, the wrong
    // wires clear by themselves so they can draw again fresh
    scheduleWrongClear(()=> cur.wrongPolarity && !cur.lit);
    return;
  }
  if(cur.lit && !prev.lit && polarityHelpShown && !polarityPraisedThisBuild && stage<5){
    polarityPraisedThisBuild = true;
    // they fixed a reversed loop — reinforce why it glows now (concept card, so it
    // sits alongside the stage dialogue instead of interrupting it). Switch stages
    // keep their own card ("Switch =") — no polarity card there.
    showConcept("The LED glows when", "its + meets the battery's +, and − meets −.", 6000);
  }
}
function setFlowMode(mode){
  board.classList.remove("mode-light","mode-faint","mode-stream");
  board.classList.add("mode-"+mode);
}

function onGlow(){
  if(!firstGlowDone){

    setTimeout(()=>bulbEl.classList.remove("firstglow"), 900);
  }
  if(stage===1){
    clearTimeout(nudgeTimer);

    stage = 2; s2broke = false; s2nudged = false;
    setCompanions("kabirHappy","meeraHappy");
    setDialogue([
      {who:"Kabir", text:"It only glows when the path goes all the way round.", kabir:"kabirHappy"},
    ], armS2Nudge);
  }
  else if(stage===2 && s2broke){
    clearTimeout(s2NudgeTimer);
    snd.success();
    stage = 3;
    setFlowMode("faint");                                     // faint dots drift along the loop
    setCompanions("kabirThink","meeraThink");
    setDialogue([
      {who:"Meera", text:"But what is this invisible thing flowing round?", meera:"meeraThink"},
      {who:"Kabir", text:"Something is moving inside the wire… and coming out as light.", kabir:"kabirThink"},
    ], ()=>{

    s4sub = 2;

  else if(stage===4 && s4sub===3 && switchOn && cur.lit){

  else if(stage===5){
    if(cur.switchInLoop){

    } else if(!s5nudged){

      setDialogue([

function makePartCard(part, interactive){

/* Switch stage coaching: if the child wires the switch to only ONE other part, Meera
   names the part that's missing. After two wrong tries the dotted connections appear
   and Kabir invites them to trace the joins. */
let s5promptKey = null, s5wrong = 0, switchGuideShown = false;
function showSwitchGuide(){
  if(switchGuideShown || stage!==5) return;
  switchGuideShown = true;
  // no dotted answer lines — the hand demonstrates the joins, one wire at a time,
  // along the same relaxed path a drawn wire would take
  setDialogue([{who:"Kabir", text:"Let's connect them now.", kabir:"kabirHappy"}]);
  // wrong wires melt away first (never a correct loop just waiting for its switch),
  // then the hand shows the first missing join
  scheduleWrongClear(()=> !cur.lit && !cur.switchWouldComplete);
  setTimeout(()=>{ if(stage===5 && !cur.lit && !handEl) showIdleHint(); }, 3000);
}
function switchStageCoach(){
  if(stage!==5 && stage!==6) return;
  if(cur.lit){ s5promptKey = null; return; }
  // a correct loop that only needs the switch tapped ON is NOT a wrong build —
  // afterCircuitRefresh already coaches "tap the switch"
  if(cur.switchWouldComplete){ s5promptKey = null; return; }
  // battery split: one battery end wired to the switch, the other to the LED — the
  // three parts hang off the battery instead of forming one loop
  if(batterySplit()){
    if(s5promptKey!=="splitBattery"){
      s5promptKey = "splitBattery";
      if(stage===5 && !switchGuideShown){
        s5wrong++;
        if(s5wrong>=2){ showSwitchGuide(); return; }
      }
      // no auto-clear here: a split is a half-finished build, not a dead end —
      // the child still has a wire left to close the loop themselves
      setDialogue([{who:"Kabir", text:"Connect all the points of power source, LED and switch with each other.", kabir:"kabirThink"}]);
    }
    return;
  }
  if(stage===6){ s5promptKey = null; return; }   // stage 6 gets only the split-battery coaching above
  // wait until BOTH of the switch's pins are wired — only then is the attempt complete
  // enough to point out which part was left out
  if(!(occupiedBy("s1") && occupiedBy("s2"))){ s5promptKey = null; return; }
  const comps = new Set();
  wires.forEach(w=>{ comps.add(TERMS[w.a].comp); comps.add(TERMS[w.b].comp); });
  let key = null, text = null;
  if(comps.has("switch") && comps.has("battery") && !comps.has("bulb")){
    key = "needLED"; text = "Not working! Let's add the LED.";
  } else if(comps.has("switch") && comps.has("bulb") && !comps.has("battery")){
    key = "needBattery"; text = "Not working! Let's add the battery.";
  }
  if(key && key!==s5promptKey){
    s5promptKey = key;
    if(switchGuideShown) return;
    s5wrong++;
    if(s5wrong>=2){ showSwitchGuide(); return; }
    setDialogue([{who:"Meera", text, meera:"meeraThink"}]);
    const k = key;
    scheduleWrongClear(()=> s5promptKey===k && !cur.lit);   // wrong build clears for a fresh try
  }
  if(!key) s5promptKey = null;
}
function afterCircuitRefresh(){

    ]);

}

/* ============ Back / Undo / Next navigation ============ */
const CHAPTERS = [startStage1, startStage2, startStage3, startStage4, startStage5, startStage7];
/* The Next tab only appears once the current screen's steps are complete —
   markStageDone() is called at each stage's completion beat. */
let stageDone = false;
function markStageDone(){ stageDone = true; updateNav(); }
function setChapter(k){ chapterIdx = k; stageDone = false; updateNav(); }
function updateNav(){
  const back = $("#nav-back"), next = $("#nav-next"), undo = $("#nav-undo");
  if(back) back.disabled = chapterIdx <= 0;
  if(next){
    next.style.display = stageDone ? "" : "none";
    next.disabled = chapterIdx >= CHAPTERS.length-1;
  }
  if(undo) undo.disabled = !(board && wires.length);
}
function goChapter(i){
  i = Math.max(0, Math.min(CHAPTERS.length-1, i));
  stopVoice(); clearDlgTimer(); clearAction(); clearChoices(); hideConcept(); clearWireHints();
  clearTimeout(wrongClearTimer);         // a pending auto-clear belongs to the old chapter
  clearTimeout(pendingActionTimer);      // so does a pending delayed button
  armIdleHint();
  $("#certificate").classList.remove("show");
  CHAPTERS[i]();
}
const navNextBtn = $("#nav-next");   // the Next tab was removed from the navbar; stages advance on their own
if(navNextBtn) navNextBtn.addEventListener("click", ()=>{ snd.click(); goChapter(chapterIdx+1); });
$("#nav-undo").addEventListener("click", ()=>{
  if(!wires.length) return;
  snd.pop();
  const wasLit = cur.lit;
  removeWire(wires[wires.length-1]);   // pull back the most recent wire
  clearWireHints();
  refreshCircuit();                    // may itself speak (e.g. onDark breaks the glow)
  updateNav();
  // Step the coach back in time with the undo: if the refresh didn't already say
  // something and we're not mid question/concept, re-show the current build prompt
  // so a stale forward line (like the "Careful!" polarity hint) doesn't linger.
  const busy = choicesEl.classList.contains("show") || conceptEl.classList.contains("show");
  const spokeOnRefresh = wasLit && !cur.lit;   // onDark handled this transition
  if(!cur.lit && !busy && !spokeOnRefresh && lastGuide){
    setDialogue(lastGuide.map(l=>Object.assign({}, l)));
  }
});

/* keep the Undo button's enabled state in step with the wire count */
const _updatePile = updatePile;
updatePile = function(){ _updatePile(); updateNav(); };

/* ============ Entry gate & boot ============ */
/* Play the entry-scene video as the background. Under reduced-motion we drop the
   clip and let the CSS nebula/dust sky behind it stand in. */
(function makeEntryVideo(){
  const v = document.getElementById("eb-video");
  if(!v) return;
  const reduce = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  if(reduce){ v.remove(); return; }
  v.src = encodeURI("videos/the glow box mystery entry scene.mp4");
  const p = v.play && v.play(); if(p && p.catch) p.catch(()=>{});   // ignore autoplay-block errors
})();
/* Build the night sky behind the video (also the full background under reduced-motion):
   tiny twinkling star dust, milky-way bands, drifting nebulas. No moon. */
(function makeEntrySky(){
  const wrap = $("#estars");
  if(!wrap) return;
  const reduce = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  // hundreds of tiny background stars — a dense field of star dust, faintly tinted
  const DUST_TINTS = ["#ffffff","#ffffff","#cfe9ff","#ffd9ec","#e7dbff"];
  function dustSpeck(x, y, sz, o){
    const d = document.createElement("div"); d.className = "eb-star";
    d.style.width = d.style.height = sz.toFixed(2)+"px";
    d.style.left = x.toFixed(2)+"%";
    d.style.top  = y.toFixed(2)+"%";
    d.style.background = DUST_TINTS[Math.floor(Math.random()*DUST_TINTS.length)];
    d.style.setProperty("--o", o.toFixed(2));
    d.style.animationDuration = (2.4+Math.random()*4).toFixed(2)+"s";
    d.style.animationDelay = (Math.random()*5).toFixed(2)+"s";
    wrap.appendChild(d);
  }
  for(let i=0;i<500;i++){
    dustSpeck(Math.random()*100, Math.random()*100,
              0.7 + Math.random()*1.9, 0.22 + Math.random()*0.6);
  }
  // the milky-way stream: a thick ribbon of extra-fine dust hugging the same
  // diagonal as the hazy band (upper-right → lower-left, like the poster)
  for(let i=0;i<240;i++){
    const t = Math.random();                                   // position along the band
    const spread = (Math.random()+Math.random()+Math.random())/3 - 0.5;  // bell-ish across it
    const x = -6 + t*112;
    const y = 60 - t*26 + spread*30;
    if(y<-2 || y>102) continue;
    dustSpeck(x, y, 0.6 + Math.random()*1.4, 0.3 + Math.random()*0.65);
  }
  // a second, fainter galaxy arm of dust crossing the other diagonal
  for(let i=0;i<170;i++){
    const t = Math.random();
    const spread = (Math.random()+Math.random()+Math.random())/3 - 0.5;
    const x = -6 + t*112;
    const y = 22 + t*30 + spread*26;
    if(y<-2 || y>102) continue;
    dustSpeck(x, y, 0.6 + Math.random()*1.3, 0.26 + Math.random()*0.55);
  }
  // extra galaxy-dust pockets: dense clusters spread over the WHOLE sky
  const POCKETS = [
    {cx:7,  cy:7,  rx:17, ry:13, n:68},    // upper-left corner
    {cx:93, cy:7,  rx:17, ry:13, n:68},    // upper-right corner
    {cx:9,  cy:93, rx:19, ry:12, n:68},    // lower-left corner
    {cx:91, cy:93, rx:19, ry:12, n:68},    // lower-right corner
    {cx:50, cy:97, rx:36, ry:9,  n:88},    // all along the bottom edge
    {cx:50, cy:4,  rx:32, ry:8,  n:72},    // along the top edge
    {cx:28, cy:44, rx:16, ry:14, n:55},    // mid-left field
    {cx:74, cy:58, rx:16, ry:14, n:55},    // mid-right field
  ];
  POCKETS.forEach(p=>{
    for(let i=0;i<p.n;i++){
      const g1 = (Math.random()+Math.random()+Math.random())/3 - 0.5;   // bell-ish falloff
      const g2 = (Math.random()+Math.random()+Math.random())/3 - 0.5;
      const x = p.cx + g1*2*p.rx;
      const y = p.cy + g2*2*p.ry;
      if(x<-2 || x>102 || y<-2 || y>102) continue;
      dustSpeck(x, y, 0.6 + Math.random()*1.3, 0.28 + Math.random()*0.6);
    }
  });
  // (the big spiked glow stars were removed — the sky is nebulas + dust only)
  if(reduce) return;
  // firefly sparkles
  for(let i=0;i<12;i++){
    const f = document.createElement("div"); f.className = "eb-fly";
    f.style.left = (Math.random()*100).toFixed(1)+"%";
    f.style.top  = (40+Math.random()*55).toFixed(1)+"%";
    f.style.setProperty("--dx",(Math.random()*60-30).toFixed(0)+"px");
    f.style.setProperty("--dy",(-20-Math.random()*60).toFixed(0)+"px");
    f.style.setProperty("--d",(6+Math.random()*8).toFixed(1)+"s");
    f.style.animationDelay = (Math.random()*6).toFixed(1)+"s";
    wrap.appendChild(f);
  }
  // occasional shooting star while the opening screen is showing
  (function scheduleShoot(){
    setTimeout(()=>{
      const entry = $("#entry");
      if(entry && !entry.classList.contains("gone")){
        const s = document.createElement("div"); s.className = "eb-shoot";
        s.style.left = (Math.random()*40).toFixed(0)+"%";
        s.style.top  = (Math.random()*30).toFixed(0)+"%";
        s.addEventListener("animationend", ()=>s.remove());
        wrap.appendChild(s);
        scheduleShoot();
      }
    }, 9000 + Math.random()*8000);
  })();
})();
let started = false;
function startActivity(skipEntryTransition=false){
  if(started) return;
  started = true;
  ac();
  loadVoices();
  const entry = $("#entry");
  if(skipEntryTransition){
    entry.classList.add("gone");
    entry.style.display="none";
  }else{
    entry.classList.add("gone");
    setTimeout(()=>{ entry.style.display="none"; }, 650);
  }
  startPartsIntro();
}
$("#entry-btn").addEventListener("click", ()=>{ snd.click(); startActivity(); });

/* Iframe contract with the constellation game (index.html): report ls-ready on
   load. An early click on the parent's matching loading fallback can request a
   direct start; acknowledge only after the duplicate entry screen is hidden. */
if(window.self !== window.top){
  window.addEventListener("message", e=>{
    if(e.data==="ls-start"){
      startActivity(true);
      try{ window.parent.postMessage("ls-started","*"); }catch(err){}
    }
  });
  window.addEventListener("load", ()=>{
    try{ window.parent.postMessage("ls-ready","*"); }catch(e){}
  });
}
</script>
